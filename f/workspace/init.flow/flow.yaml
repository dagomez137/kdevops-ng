summary: "Workspace Init"
description: |
  One-time (idempotent) bootstrap, run from the UI after Windmill is up. Provisions the
  durable Bares (default `workers/system/bare/kernel/linux.git` and
  `workers/system/bare/qemu-project/qemu.git`) that every worker cuts cheap detached
  worktrees off (`f/kernel/build`, `f/qemu/build`). Each Bare tracks its real upstream
  but borrows objects from the local `/mirror`, and keeps `refs/heads/*` for developer
  pushes. Thin flow over `f/workspace/fetch` — override or extend the source list there;
  re-run it any time to refresh.

  Also provisions the kdevops-managed VM SSH key (`f/workspace/ssh_key`): one
  keypair under `workers/shared/ssh/` that every guest trusts, so after a one-time
  `Include` line in `~/.ssh/config` a plain `ssh <vm>` works. Returns that line.

  TODO: also provision the `nixos-flake` devShell and `linux-config-fragments` here
  (currently the host `setup-workspace.sh` does that — future git subtree).
value:
  modules:
    - id: fetch
      summary: Clone/refresh the shared sources
      value:
        type: script
        path: f/workspace/fetch
        input_transforms:
          mirrors:
            type: javascript
            expr: flow_input.mirrors
          peers:
            type: javascript
            expr: flow_input.peers
          refresh:
            type: javascript
            expr: flow_input.refresh
    - id: ssh_key
      summary: Provision the VM SSH key + host ssh-config
      skip_if:
        expr: flow_input.setup_ssh === false
      value:
        type: script
        path: f/workspace/ssh_key
        input_transforms:
          regenerate:
            type: javascript
            expr: flow_input.regenerate_ssh_key
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - mirrors
    - peers
    - refresh
    - setup_ssh
    - regenerate_ssh_key
  properties:
    mirrors:
      type: array
      description: Mirrors to provision Bares from. Empty = the built-in kernel + QEMU defaults.
      default: []
      items:
        type: object
        properties:
          name:
            type: string
          mirror:
            type: string
          namespace:
            type: string
          canonical:
            type: string
        required:
          - name
          - mirror
          - namespace
          - canonical
    peers:
      type: array
      description: "ssh-host aliases of other workbench hosts to add as <peer> remotes on each Bare, for cross-host dev branches (`git push <peer> <branch>`). List peer hosts, not self; empty = single-host."
      default: []
      items:
        type: string
    refresh:
      type: boolean
      description: Fetch new refs/tags on already-present Bares (default on).
      default: true
    setup_ssh:
      title: Setup SSH
      type: boolean
      description: Provision the kdevops-managed VM SSH key + `~/.ssh`-includable config (default on). Off = skip; existing key untouched.
      default: true
    regenerate_ssh_key:
      title: Regenerate SSH Key
      type: boolean
      description: Force a fresh VM keypair even if one exists. Invalidates the authorized key already baked into every built closure — rebuild closures after.
      default: false
  required: []
