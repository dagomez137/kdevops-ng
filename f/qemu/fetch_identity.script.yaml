summary: "QEMU: fetch a build identity's install tree from a peer builder"
description: >
  Pull a build identity's whole install tree from a peer host into the Nix
  store,

  before the expensive compile, so the following `reuse_check` reports `present`
  and the

  build is skipped. Reads the peer's `store-index` entry over ssh to learn the
  install

  tree's Nix store path, pulls it with `nix copy` over the `transfer` devShell,
  and

  indexes it locally. The tree is consumed in place from the store, with no
  copy.

  Same-host (no remote) is a no-op. Returns `fetched` plus the resolved
  `prefix`.
lock: '!inline f/qemu/fetch_identity.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - prefix
    - remote
    - remote_index
  properties:
    prefix:
      type: string
      description: Local per-identity install prefix to populate (`destdir/<identity>`).
    remote:
      type: string
      description: SSH host of the peer builder; empty fetches nothing (same-host).
      default: ''
    remote_index:
      type: string
      description: The peer builder's `store-index` directory, read over ssh to learn
        the install tree's store path; empty fetches nothing.
      default: ''
  required:
    - prefix
