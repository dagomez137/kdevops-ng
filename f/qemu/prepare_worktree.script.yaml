summary: "QEMU: prepare a build worktree"
description: |
  Resolve a build slot and lay down a detached worktree of the shared QEMU mirror
  (`workers/shared/qemu/qemu`, a `--shared` clone of `/mirror/qemu.git`) at
  `qemu_ref`, refreshing the clone first so newly-mirrored refs/tags are usable.
  Thin wrapper over `f/common/worktree`. The slot holds `qemu` (source), `build`
  (out-of-tree), and `destdir` (`--prefix`).

  - `shared=false` (default) reuses this worker's own tree
    `workers/<WORKER_INDEX>/qemu` for every ref — isolated builds on different
    workers run in parallel without contending.
  - `shared=true` lays down a shared, persistent named tree
    `workers/shared/ws/qemu/<name>`: `<name>` is the custom `workspace` string if
    given, else a slug of `b4_series`, else the flow job id.

  Returns `worktree`, `build_dir`, `destdir`, `commit`, `version`, `qemu_ref`, `name`.
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - qemu_ref
    - shared
    - workspace
    - b4_series
    - wipe_build
    - clean_destdir
  properties:
    qemu_ref:
      title: QEMU Ref
      type: string
      description: Branch, tag or commit in the shared /mirror/qemu.git to check out.
      default: v11.0.0
    shared:
      type: boolean
      description: Off = this worker's own workers/<worker>/qemu tree (fast, parallel across workers). On = a shared persistent named tree under workers/shared/ws/qemu/<name> any worker can pick up.
      default: false
    workspace:
      type: string
      description: Name for the shared tree (workers/shared/ws/qemu/<name>). Empty = name from the b4 series, else the job id.
      default: ""
      showExpr: "fields.shared === true"
    b4_series:
      title: b4 Series
      type: string
      description: Optional lore series (message-id/URL) to apply on top via `b4 shazam`.
      default: ""
    wipe_build:
      type: boolean
      description: Wipe the build dir before building (default off = incremental reuse).
      default: false
    clean_destdir:
      type: boolean
      description: Wipe the install `destdir` first (default off). Leave off so an install never wipes binaries a running QEMU/systemd VM uses.
      default: false
  required: []
