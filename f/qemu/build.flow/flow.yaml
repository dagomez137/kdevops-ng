summary: "QEMU Build"
description: |
  Build a custom QEMU from source, reproducibly, inside the `nixos-flake#build`
  devShell over a detached worktree of the shared `/mirror/qemu.git`. Mirrors
  `f/kernel/build`; the distro `install-deps` the kdevops QEMU role performs is
  gone, because the devShell already carries QEMU's build toolchain
  (`inputsFrom = [ pkgs.qemu ]`: meson, ninja, GCC, pkg-config, glib, pixman).

  Steps (pinned to one worker via `same_worker`, so each sees the previous
  step's files):

  1. `prepare_worktree` — resolve the slot and check out `qemu_ref`.
  2. `configure` — out-of-tree `meson subprojects download`, then
     `configure --target-list --prefix=<slot>/destdir --disable-download`.
  3. `compile` — `make --jobs=$(nproc)` (drives ninja).
  4. `install` — `make install` into `<slot>/destdir`.
  5. `publish` — add this identity's install tree to the Nix store so a peer can
     fetch it; only after a real install (skipped on reuse).
  6. `collect` — merge the step results into one manifest.

  - `shared=false` (default) reuses this worker's own tree
    `workers/<worker>/qemu` for every ref, so isolated builds on different workers
    run in parallel without contending.
  - `shared=true` lays down a shared, persistent named tree
    `workers/shared/ws/qemu/<name>` (by `workspace` string, else the `b4_series`
    slug, else the job id) that any worker can pick up.

  Returns a manifest (`qemu_binary`, `version`, `target_list`, `commit`,
  `qemu_ref`, `destdir`, …) so QEMU/systemd can consume the built emulator the same way it
  consumes `f/kernel/build`. See `docs/windmill/qemu-build-flow.md`.
value:
  same_worker: true
  modules:
    - id: prepare_worktree
      summary: Resolve slot + check out worktree
      value:
        type: script
        path: f/qemu/prepare_worktree
        input_transforms:
          qemu_ref:
            type: javascript
            expr: flow_input.worktree?.qemu_ref
          shared:
            type: javascript
            expr: flow_input.worker?.shared
          workspace:
            type: javascript
            expr: flow_input.worker?.workspace
          b4_series:
            type: javascript
            expr: flow_input.worktree?.b4_series
          reuse_worktree:
            type: javascript
            expr: flow_input.worktree?.reuse_worktree
          wipe_build:
            type: javascript
            expr: flow_input.worker?.wipe_build
          clean_destdir:
            type: javascript
            expr: flow_input.installation?.clean_destdir
      retry:
        constant:
          attempts: 2
          seconds: 5
      timeout:
        type: static
        value: 600
    - id: identity
      summary: compute build identity + per-identity install prefix
      value:
        type: script
        path: f/qemu/identity
        input_transforms:
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          target_list:
            type: javascript
            expr: flow_input.configuration?.target_list
          configure_args:
            type: javascript
            expr: flow_input.configuration?.configure_args
          compiler:
            type: javascript
            expr: flow_input.build?.compiler
      timeout:
        type: static
        value: 120
    - id: fetch_identity
      summary: fetch this identity's install tree from a peer builder
      skip_if:
        expr: '!flow_input.prebuilt?.remote || !flow_input.prebuilt?.remote_index'
      value:
        type: script
        path: f/qemu/fetch_identity
        input_transforms:
          prefix:
            type: javascript
            expr: results.identity.prefix
          remote:
            type: javascript
            expr: flow_input.prebuilt?.remote
          remote_index:
            type: javascript
            expr: flow_input.prebuilt?.remote_index
      timeout:
        type: static
        value: 1800
    - id: reuse_check
      summary: reuse if this identity is already installed
      value:
        type: script
        path: f/qemu/reuse_check
        input_transforms:
          prefix:
            type: javascript
            expr: results.identity.prefix
      timeout:
        type: static
        value: 120
    - id: configure
      summary: configure (out-of-tree, --disable-download)
      skip_if:
        expr: '(flow_input.configuration?.skip_configure === true) || (results.reuse_check?.present === true && flow_input.installation?.reuse !== false)'
      value:
        type: script
        path: f/qemu/configure
        input_transforms:
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          destdir:
            type: javascript
            expr: results.identity.prefix
          target_list:
            type: javascript
            expr: flow_input.configuration?.target_list
          compiler:
            type: javascript
            expr: flow_input.build?.compiler
          reproducible:
            type: javascript
            expr: flow_input.build?.reproducible
          ccache:
            type: javascript
            expr: flow_input.build?.ccache
          ccache_max_size:
            type: javascript
            expr: flow_input.build?.ccache_max_size
          configure_args:
            type: javascript
            expr: flow_input.configuration?.configure_args
      retry:
        constant:
          attempts: 2
          seconds: 10
      timeout:
        type: static
        value: 900
    - id: compile
      summary: make --jobs=$(nproc)
      skip_if:
        expr: 'results.reuse_check?.present === true && flow_input.installation?.reuse !== false'
      value:
        type: script
        path: f/qemu/compile
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
      retry:
        constant:
          attempts: 2
          seconds: 10
      timeout:
        type: static
        value: 3600
    - id: devtools
      summary: compile_commands.json (clangd)
      # Default-on: skip only when explicitly disabled (an unset input must not skip).
      skip_if:
        expr: '(flow_input.devtools?.compile_commands === false) || (results.reuse_check?.present === true && flow_input.installation?.reuse !== false)'
      value:
        type: script
        path: f/qemu/devtools
        input_transforms:
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          compile_commands:
            type: javascript
            expr: flow_input.devtools?.compile_commands
      timeout:
        type: static
        value: 60
    - id: install
      summary: make install -> destdir
      # Default-on: skip only when explicitly disabled (an unset input must not skip).
      skip_if:
        expr: '(flow_input.installation?.install === false) || (results.reuse_check?.present === true && flow_input.installation?.reuse !== false)'
      value:
        type: script
        path: f/qemu/install
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          destdir:
            type: javascript
            expr: results.identity.prefix
          target_list:
            type: javascript
            expr: flow_input.configuration?.target_list
      timeout:
        type: static
        value: 900
    - id: publish
      summary: publish this identity's install tree to the Nix store
      skip_if:
        expr: 'results.reuse_check?.present === true && flow_input.installation?.reuse !== false'
      value:
        type: script
        path: f/qemu/publish
        input_transforms:
          prefix:
            type: javascript
            expr: results.identity.prefix
      timeout:
        type: static
        value: 600
    - id: collect
      summary: Merge step results into one manifest
      value:
        type: rawscript
        language: bun
        content: |
          // Pure flow glue: merge the typed step results into one manifest. Every
          // field is sourced from the step results so the manifest reflects the
          // effective build, and QEMU/systemd reads the same shape regardless of provider.
          export async function main(
            prepare: any,
            identity: any,
            configure: any,
            devtools: any,
            install: any,
            reuse: any,
          ) {
            return {
              worker: prepare?.worker ?? null,
              qemu_ref: prepare?.qemu_ref ?? null,
              commit: prepare?.commit ?? null,
              version: prepare?.version ?? null,
              target_list: configure?.target_list ?? null,
              compiler: configure?.compiler ?? null,
              identity: identity?.identity ?? null,
              prefix: identity?.prefix ?? null,
              worktree: prepare?.worktree ?? null,
              build_dir: prepare?.build_dir ?? null,
              destdir: install?.destdir ?? identity?.prefix ?? prepare?.destdir ?? null,
              qemu_binary: install?.qemu_binary ?? reuse?.qemu_binary ?? null,
              qemu_binaries: install?.qemu_binaries ?? null,
              compile_commands: devtools?.compile_commands ?? null,
            };
          }
        input_transforms:
          prepare:
            type: javascript
            expr: results.prepare_worktree
          identity:
            type: javascript
            expr: results.identity
          configure:
            type: javascript
            expr: results.configure
          devtools:
            type: javascript
            expr: results.devtools
          install:
            type: javascript
            expr: results.install
          reuse:
            type: javascript
            expr: results.reuse_check
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worker
    - worktree
    - configuration
    - build
    - devtools
    - installation
    - prebuilt
  properties:
    worker:
      title: Worker
      type: object
      description: Worktree placement and build-dir reuse.
      default: {}
      order:
        - shared
        - workspace
        - wipe_build
      properties:
        shared:
          type: boolean
          description: Off = this worker's own workers/<worker>/qemu tree (fast, parallel across workers). On = a shared persistent named tree under workers/shared/ws/qemu/<name> any worker can pick up.
          default: false
        workspace:
          type: string
          description: Name for the shared tree (workers/shared/ws/qemu/<name>). Empty = name from the b4 series, else the job id.
          default: ""
          showExpr: "fields.shared === true"
        wipe_build:
          type: boolean
          description: Wipe the build dir before building (default off = incremental reuse).
          default: false
    worktree:
      title: Worktree
      type: object
      description: Source ref and optional patch series to check out.
      default: {}
      order:
        - reuse_worktree
        - qemu_ref
        - b4_series
      properties:
        reuse_worktree:
          title: Reuse Worktree
          type: boolean
          description: Build the named worktree exactly as it stands — skip fetch, checkout and `b4 shazam` so a hand-checked-out local branch survives. Ignores `qemu_ref`/`b4 Series`; the tree must already exist (lay it down once with this off). Pair with `shared` + a `workspace` name in the Worker group.
          default: false
        qemu_ref:
          title: QEMU Ref
          type: string
          description: Branch, tag or commit in the shared /mirror/qemu.git to build. Ignored when `reuse_worktree` is on.
          default: v11.0.0
          showExpr: "fields.reuse_worktree !== true"
        b4_series:
          title: b4 Series
          type: string
          description: Optional lore series (message-id/URL) to apply on top of the checkout via `b4 shazam`. Ignored when `reuse_worktree` is on.
          default: ""
          showExpr: "fields.reuse_worktree !== true"
    configuration:
      title: Configuration
      type: object
      description: What QEMU is configured to build — targets and configure flags.
      default: {}
      order:
        - target_list
        - configure_args
        - skip_configure
      properties:
        target_list:
          type: array
          description: QEMU emulator targets to build (`--target-list`). *-softmmu = system emulation (VMs); *-linux-user/*-bsd-user = user-mode.
          default:
            - x86_64-softmmu
          items:
            type: string
            enum:
              - aarch64_be-linux-user
              - aarch64-bsd-user
              - aarch64-linux-user
              - aarch64-softmmu
              - alpha-linux-user
              - alpha-softmmu
              - arm-bsd-user
              - armeb-linux-user
              - arm-linux-user
              - arm-softmmu
              - avr-softmmu
              - hexagon-linux-user
              - hppa-linux-user
              - hppa-softmmu
              - i386-bsd-user
              - i386-linux-user
              - i386-softmmu
              - loongarch64-linux-user
              - loongarch64-softmmu
              - m68k-linux-user
              - m68k-softmmu
              - microblazeel-linux-user
              - microblaze-linux-user
              - microblaze-softmmu
              - mips64el-linux-user
              - mips64el-softmmu
              - mips64-linux-user
              - mips64-softmmu
              - mipsel-linux-user
              - mipsel-softmmu
              - mips-linux-user
              - mipsn32el-linux-user
              - mipsn32-linux-user
              - mips-softmmu
              - or1k-linux-user
              - or1k-softmmu
              - ppc64le-linux-user
              - ppc64-linux-user
              - ppc64-softmmu
              - ppc-linux-user
              - ppc-softmmu
              - riscv32-linux-user
              - riscv32-softmmu
              - riscv64-bsd-user
              - riscv64-linux-user
              - riscv64-softmmu
              - rx-softmmu
              - s390x-linux-user
              - s390x-softmmu
              - sh4eb-linux-user
              - sh4eb-softmmu
              - sh4-linux-user
              - sh4-softmmu
              - sparc32plus-linux-user
              - sparc64-linux-user
              - sparc64-softmmu
              - sparc-linux-user
              - sparc-softmmu
              - tricore-softmmu
              - x86_64-bsd-user
              - x86_64-linux-user
              - x86_64-softmmu
              - xtensaeb-linux-user
              - xtensaeb-softmmu
              - xtensa-linux-user
              - xtensa-softmmu
        configure_args:
          type: string
          description: Extra configure flags appended verbatim. Older QEMU may need `--disable-werror` against the bleeding-edge nixpkgs toolchain.
          default: ""
        skip_configure:
          type: boolean
          description: Skip configure and recompile the existing build dir (incremental rebuild of an already-configured workspace).
          default: false
    build:
      title: Build
      type: object
      description: Compile knobs — toolchain, reproducibility and ccache.
      default: {}
      order:
        - compiler
        - reproducible
        - ccache
        - ccache_max_size
      properties:
        compiler:
          type: string
          description: Toolchain to build QEMU with (pinned via configure `--cc/--cxx`, which beats the devShell's `CC`). GCC is clean; clang adds `-Qunused-arguments`.
          default: gcc
          enum:
            - gcc
            - clang
        reproducible:
          type: boolean
          description: Reproducible build — add one `-ffile-prefix-map=<prefix>=/qemu` to `--extra-cflags`/`--extra-cxxflags` so the host build path stops leaking into the binary.
          default: true
        ccache:
          type: boolean
          description: Compile through ccache (`--cc="ccache <cc>"`, shared `ccache.conf`).
          default: true
        ccache_max_size:
          type: integer
          description: ccache max cache size in GiB (written to ccache.conf max_size).
          default: 10
          showExpr: "fields.ccache !== false"
    devtools:
      title: Developer tools
      type: object
      description: Optional IDE artifacts produced after compile.
      default: {}
      order:
        - compile_commands
      properties:
        compile_commands:
          type: boolean
          description: Copy meson's `compile_commands.json` into the source root (clangd/IDE index).
          default: true
    installation:
      title: Install
      type: object
      description: Install the emulator and manage the destdir.
      default: {}
      order:
        - reuse
        - install
        - clean_destdir
      properties:
        reuse:
          type: boolean
          description: Skip configure/compile/install when this build identity is already installed under its prefix (reuse the prior build). Off forces a rebuild without wiping the destdir.
          default: true
        install:
          type: boolean
          description: Install the built emulator into destdir (make install). Off = build only (e.g. a dev worktree).
          default: true
        clean_destdir:
          type: boolean
          description: Wipe the install `destdir` first (default off). Leave off so an install never wipes binaries a running QEMU/systemd VM uses.
          default: false
    prebuilt:
      title: Prebuilt
      type: object
      description: Cross-host build host to pull a prebuilt identity from before building. When a peer already published this build identity to the Nix store, its whole install tree is fetched into the per-identity prefix so the build is reused instead of repeated.
      default: {}
      order:
        - remote
        - remote_index
      properties:
        remote:
          type: string
          description: SSH host of the peer QEMU builder to fetch this build identity's install tree from. Empty (default) builds locally with no fetch.
          default: ""
        remote_index:
          type: string
          description: The peer builder's `store-index` directory (its `WORKERS_DIR/shared/store-index`), read over ssh to learn the install tree's Nix store path. Empty (default) builds locally with no fetch.
          default: ""
  required: []
