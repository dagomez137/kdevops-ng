summary: Build QEMU
description: |-
  Build a custom QEMU from source, reproducibly, inside the `nixos-flake#build`
  devShell over this worker's warm `main` worktree cut from the durable Bare.
  Mirrors `f/kernel/build`; the distro `install-deps` the kdevops QEMU role
  performs is gone, because the devShell already carries QEMU's build toolchain
  (`inputsFrom = [ pkgs.qemu ]`: meson, ninja, GCC, pkg-config, glib, pixman).

  Steps (pinned to one worker via `same_worker`, so each sees the previous
  step's files):

  1. `prepare_worktree`: resolve the slot and check out `qemu_ref`. 2.
  `configure`: out-of-tree `meson subprojects download`, then `configure
  --target-list --prefix=<worktree>/destdir --disable-download`. 3. `compile`:
  `make --jobs=$(nproc)` (drives ninja). 4. `install`: `make install` into
  `<worktree>/destdir`. 5. `publish`: add this identity's install tree to the
  Nix store so a peer can fetch it; only after a real install (skipped on
  reuse). 6. `collect`: merge the step results into one manifest.

  Each worker builds in its own warm `main` worktree
  (`workers/<worker>/main/qemu`), synced to `qemu_ref` every run so rebuilds
  stay incremental and isolated builds on different workers run in parallel.
  `recreate_worktree` forces a fresh checkout; `wipe_build` forces a clean
  build.

  Returns a manifest (`qemu_binary`, `version`, `target_list`, `commit`,
  `qemu_ref`, `destdir`, …) so QEMU/systemd can consume the built emulator the
  same way it consumes `f/kernel/build`. See `docs/flows/qemu-build.rst`.
value:
  modules:
    - id: prepare_worktree
      summary: Resolve slot + check out worktree
      value:
        type: script
        input_transforms:
          b4_series:
            type: javascript
            expr: flow_input.worktree?.b4_series
          qemu_ref:
            type: javascript
            expr: flow_input.worktree?.qemu_ref
          recreate_worktree:
            type: javascript
            expr: flow_input.worktree?.recreate_worktree
          wipe_build:
            type: javascript
            expr: flow_input.worktree?.wipe_build
        path: f/qemu/prepare_worktree
      retry:
        constant:
          attempts: 2
          seconds: 5
      timeout:
        type: static
        value: 600
    - id: identity
      summary: compute build identity + per-identity install prefix
      value:
        type: script
        input_transforms:
          compiler:
            type: javascript
            expr: flow_input.build?.compiler
          configure_args:
            type: javascript
            expr: flow_input.configuration?.configure_args
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          target_list:
            type: javascript
            expr: flow_input.configuration?.target_list
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/qemu/identity
      timeout:
        type: static
        value: 120
    - id: fetch_identity
      summary: fetch this identity's install tree from a peer builder
      value:
        type: script
        input_transforms:
          prefix:
            type: javascript
            expr: results.identity.prefix
          use_peers:
            type: javascript
            expr: flow_input.reuse?.use_peers
        path: f/qemu/fetch_identity
      skip_if:
        expr: flow_input.reuse?.use_peers === false
      timeout:
        type: static
        value: 1800
    - id: reuse_check
      summary: reuse if this identity is already installed
      value:
        type: script
        input_transforms:
          prefix:
            type: javascript
            expr: results.identity.prefix
        path: f/qemu/reuse_check
      timeout:
        type: static
        value: 120
    - id: configure
      summary: configure (out-of-tree, --disable-download)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          ccache:
            type: javascript
            expr: flow_input.build?.ccache
          ccache_max_size:
            type: javascript
            expr: flow_input.build?.ccache_max_size
          compiler:
            type: javascript
            expr: flow_input.build?.compiler
          configure_args:
            type: javascript
            expr: flow_input.configuration?.configure_args
          destdir:
            type: javascript
            expr: results.identity.prefix
          reproducible:
            type: javascript
            expr: flow_input.build?.reproducible
          target_list:
            type: javascript
            expr: flow_input.configuration?.target_list
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/qemu/configure
      retry:
        constant:
          attempts: 2
          seconds: 10
      skip_if:
        expr: (flow_input.configuration?.skip_configure === true) ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 900
    - id: compile
      summary: make --jobs=$(nproc)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
        path: f/qemu/compile
      retry:
        constant:
          attempts: 2
          seconds: 10
      skip_if:
        expr: results.reuse_check?.present === true && flow_input.reuse?.reuse
          !== false
      timeout:
        type: static
        value: 3600
    - id: devtools
      summary: compile_commands.json (clangd)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          compile_commands:
            type: javascript
            expr: flow_input.devtools?.compile_commands
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/qemu/devtools
      skip_if:
        expr: (flow_input.devtools?.compile_commands === false) ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 60
    - id: install
      summary: make install -> destdir
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          destdir:
            type: javascript
            expr: results.identity.prefix
          target_list:
            type: javascript
            expr: flow_input.configuration?.target_list
        path: f/qemu/install
      skip_if:
        expr: (flow_input.installation?.install === false) ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 900
    - id: publish
      summary: publish this identity's install tree to the Nix store
      value:
        type: script
        input_transforms:
          prefix:
            type: javascript
            expr: results.identity.prefix
        path: f/qemu/publish
      skip_if:
        expr: results.reuse_check?.present === true && flow_input.reuse?.reuse
          !== false
      timeout:
        type: static
        value: 600
    - id: collect
      summary: Merge step results into one manifest
      value:
        type: rawscript
        content: '!inline merge_step_results_into_one_manifest.inline_script.ts'
        input_transforms:
          configure:
            type: javascript
            expr: results.configure
          devtools:
            type: javascript
            expr: results.devtools
          identity:
            type: javascript
            expr: results.identity
          install:
            type: javascript
            expr: results.install
          prepare:
            type: javascript
            expr: results.prepare_worktree
          publish:
            type: javascript
            expr: results.publish
          reuse:
            type: javascript
            expr: results.reuse_check
        lock: '!inline merge_step_results_into_one_manifest.inline_script.lock'
        language: bun
  same_worker: true
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worktree
    - configuration
    - reuse
    - build
    - devtools
    - installation
  properties:
    build:
      type: object
      description: 'Compile knobs: toolchain, reproducibility and ccache.'
      default: {}
      order:
        - compiler
        - reproducible
        - ccache
        - ccache_max_size
      properties:
        ccache:
          type: boolean
          description: |-
            Compile through ccache (`--cc="ccache <cc>"`, shared `ccache.conf`).
          default: true
        ccache_max_size:
          type: integer
          description: |-
            ccache max cache size in GiB (written to ccache.conf max_size).
          default: 10
          showExpr: fields.ccache !== false
        compiler:
          type: string
          description: |-
            Toolchain to build QEMU with (pinned via configure `--cc/--cxx`,
            which beats the devShell's `CC`). GCC is clean; clang adds
            `-Qunused-arguments`.
          default: gcc
          enum:
            - gcc
            - clang
        reproducible:
          type: boolean
          description: |-
            Reproducible build: add one `-ffile-prefix-map=<prefix>=/qemu` to
            `--extra-cflags`/`--extra-cxxflags` so the host build path stops
            leaking into the binary.
          default: true
      title: Build
    configuration:
      type: object
      description: |-
        What QEMU is configured to build: targets and configure flags.
      default: {}
      order:
        - target_list
        - configure_args
        - skip_configure
      properties:
        configure_args:
          type: string
          description: |-
            Extra configure flags appended verbatim. Older QEMU may need
            `--disable-werror` against the bleeding-edge nixpkgs toolchain.
          default: ''
        skip_configure:
          type: boolean
          description: |-
            Skip configure and recompile the existing build dir (incremental
            rebuild: the build dir is already configured).
          default: false
        target_list:
          type: array
          description: |-
            QEMU emulator targets to build (`--target-list`). *-softmmu = system
            emulation (VMs); *-linux-user/*-bsd-user = user-mode.
          default:
            - x86_64-softmmu
          items:
            type: string
            enum:
              - aarch64_be-linux-user
              - aarch64-bsd-user
              - aarch64-linux-user
              - aarch64-softmmu
              - alpha-linux-user
              - alpha-softmmu
              - arm-bsd-user
              - armeb-linux-user
              - arm-linux-user
              - arm-softmmu
              - avr-softmmu
              - hexagon-linux-user
              - hppa-linux-user
              - hppa-softmmu
              - i386-bsd-user
              - i386-linux-user
              - i386-softmmu
              - loongarch64-linux-user
              - loongarch64-softmmu
              - m68k-linux-user
              - m68k-softmmu
              - microblazeel-linux-user
              - microblaze-linux-user
              - microblaze-softmmu
              - mips64el-linux-user
              - mips64el-softmmu
              - mips64-linux-user
              - mips64-softmmu
              - mipsel-linux-user
              - mipsel-softmmu
              - mips-linux-user
              - mipsn32el-linux-user
              - mipsn32-linux-user
              - mips-softmmu
              - or1k-linux-user
              - or1k-softmmu
              - ppc64le-linux-user
              - ppc64-linux-user
              - ppc64-softmmu
              - ppc-linux-user
              - ppc-softmmu
              - riscv32-linux-user
              - riscv32-softmmu
              - riscv64-bsd-user
              - riscv64-linux-user
              - riscv64-softmmu
              - rx-softmmu
              - s390x-linux-user
              - s390x-softmmu
              - sh4eb-linux-user
              - sh4eb-softmmu
              - sh4-linux-user
              - sh4-softmmu
              - sparc32plus-linux-user
              - sparc64-linux-user
              - sparc64-softmmu
              - sparc-linux-user
              - sparc-softmmu
              - tricore-softmmu
              - x86_64-bsd-user
              - x86_64-linux-user
              - x86_64-softmmu
              - xtensaeb-linux-user
              - xtensaeb-softmmu
              - xtensa-linux-user
              - xtensa-softmmu
      title: Configuration
    devtools:
      type: object
      description: Optional IDE artifacts produced after compile.
      default: {}
      order:
        - compile_commands
      properties:
        compile_commands:
          type: boolean
          description: |-
            Copy meson's `compile_commands.json` into the source root
            (clangd/IDE index).
          default: true
      title: Developer tools
    installation:
      type: object
      description: Install the emulator and manage the destdir.
      default: {}
      order:
        - install
      properties:
        install:
          type: boolean
          description: |-
            Install the built emulator into destdir (make install). Off = build
            only (e.g. a dev worktree).
          default: true
      title: Install
    reuse:
      type: object
      description: |-
        Where a finished build of this identity may come from instead of
        recompiling: a local hit (this build identity's install prefix or this
        host's Nix store) or a registered peer's published install tree. The
        identity is always computed, so an identical build can be fetched or
        reused instead of repeated.
      default: {}
      order:
        - reuse
        - use_peers
      properties:
        reuse:
          type: boolean
          description: |-
            Skip configure, compile and install when this build identity is
            already installed under its prefix, or present in this host's Nix
            store (where a local build published it, or `fetch_identity` left a
            peer's). This is the Store transport's local hit, not a binary
            cache. Reuse points at that copy; off forces a rebuild without
            wiping the destdir.
          default: true
        use_peers:
          type: boolean
          description: |-
            Before building, fetch this build identity's install tree from a
            registered peer's Nix store when one already published it (the peers
            registry at `$SYSTEM_DIR/peers`), so the local reuse hit lands.
            Takes effect only with Reuse on; off builds from this host alone.
          default: true
          title: Use Peers
      title: Reuse
    worktree:
      type: object
      description: Source ref, optional patch series, and warm-tree lifecycle.
      default: {}
      order:
        - qemu_ref
        - b4_series
        - recreate_worktree
        - wipe_build
      properties:
        b4_series:
          type: string
          description: |-
            Optional lore series (message-id/URL) to apply on top of the
            checkout via `b4 shazam`, published to the Bare as `b4/<slug>`.
          default: ''
          title: b4 Series
        qemu_ref:
          type: string
          description: |-
            Branch, tag or commit in the Bare to build (a tag, an upstream ref
            via the mirror, or a developer branch).
          default: v11.0.0
          title: QEMU Ref
        recreate_worktree:
          type: boolean
          description: |-
            Lay a fresh detached checkout (rm the warm tree, its build dir and
            destdir too, first) instead of reusing it. Default off keeps the
            warm tree for incremental rebuilds.
          default: false
          title: Recreate Worktree
        wipe_build:
          type: boolean
          description: |-
            Wipe the build dir before building (default off = incremental
            reuse). Hidden when Recreate Worktree is on, which already removes
            the build dir as a child of the worktree.
          default: false
          showExpr: fields.recreate_worktree !== true
      title: Worktree
  required: []
