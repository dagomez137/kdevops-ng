summary: "QEMU: dev tooling (compile_commands.json)"
description: |
  Copy meson's auto-generated `compile_commands.json` from the build dir into the
  source root, so clangd and IDEs find the index for the out-of-tree build. meson
  writes it at configure time — there is no generator to run (unlike the kernel),
  and a real copy (not a symlink into a transient build dir) is what clangd
  reliably picks up. Reads `worktree`/`build_dir` from a prior `prepare_worktree` step.
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worktree
    - build_dir
    - compile_commands
  properties:
    worktree:
      type: string
      description: QEMU source worktree (from prepare_worktree); the symlink lands here.
    build_dir:
      type: string
      description: Out-of-tree build dir holding meson's `compile_commands.json` (from prepare_worktree).
    compile_commands:
      type: boolean
      description: Symlink `compile_commands.json` into the source root for clangd.
      default: true
  required:
    - worktree
    - build_dir
