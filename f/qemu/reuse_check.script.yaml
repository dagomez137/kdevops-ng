summary: "QEMU: reuse if the build identity is already installed"
description: |
  Probe the per-identity prefix (`destdir/<identity>`) for an installed QEMU:
  `<prefix>/bin` holding `qemu-system-*` emulators. When present the build flow skips
  configure/compile/install and the manifest points at it, reusing the prior build.
  Filesystem only — no devShell, robust if the prefix does not exist. Returns
  `present` plus the resolved `prefix`/`qemu_binary`.
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - prefix
  properties:
    prefix:
      type: string
      description: Per-identity install prefix to probe (`destdir/<identity>`).
  required:
    - prefix
