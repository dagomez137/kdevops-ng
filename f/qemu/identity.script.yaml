summary: Compute a QEMU build identity
description: |-
  Hash the inputs that fix a QEMU build's bytes (the target list, the configure
  flags, the compiler, the toolchain, which is the `build-qemu` devShell's
  derivation path, and the source commit) into a 12-hex identity, and return the
  per-identity install root as `prefix`, version-first (the version from
  `<worktree>/VERSION`): `destdir/<version>-<label>-<identity>` when a readable
  label is given (the `qemu-<version>-<label>-<identity>` store key follows),
  else `destdir/<version>-<identity>`. The configure and install steps use that
  prefix as `--prefix`, so identical inputs install under one prefix and a built
  identity can be fetched or reused instead of rebuilt. Host-independent: only
  the input strings are hashed, never a host path. The label is cosmetic, so the
  returned `identity` stays the bare hash. Returns
  `identity`/`prefix`/`destdir`.
lock: '!inline f/qemu/identity.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worktree
    - destdir
    - target_list
    - configure_args
    - compiler
    - label
  properties:
    compiler:
      type: string
      description: |-
        Toolchain QEMU is built with (gcc/clang); hashed into the digest.
      default: gcc
    configure_args:
      type: string
      description: Extra configure flags; hashed verbatim into the digest.
      default: ''
    destdir:
      type: string
      description: |-
        Slot install root; the per-identity prefix is
        `destdir/<version>-<identity>`.
    label:
      type: string
      description: |-
        Readable build-identity name prefixed to the install prefix and store
        key (from prepare_worktree); cosmetic, not hashed.
      default: ''
    target_list:
      type: array
      description: |-
        QEMU emulator targets (`--target-list`); comma-joined into the digest.
      default: []
      items:
        type: string
    worktree:
      type: string
      description: |-
        Source worktree to read the build commit from (`git rev-parse HEAD`).
  required:
    - worktree
    - destdir
