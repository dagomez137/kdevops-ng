summary: 'QEMU: compute a build identity and key the install prefix on it'
description: |-
  Hash the inputs that fix a QEMU build's bytes (the target list, the configure
  flags, the compiler, the toolchain, which is the `build-qemu` devShell's
  derivation path, and the source commit) into a 12-hex identity, and return the
  per-identity install root `destdir/<identity>` as `prefix`. The configure and
  install steps use that prefix as `--prefix`, so identical inputs install under
  one prefix and a built identity can be fetched or reused instead of rebuilt.
  Host-independent: only the input strings are hashed, never a host path.
  Returns `identity`/`prefix`/`destdir`.
lock: '!inline f/qemu/identity.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worktree
    - destdir
    - target_list
    - configure_args
    - compiler
  properties:
    compiler:
      type: string
      description: |-
        Toolchain QEMU is built with (gcc/clang); hashed into the digest.
      default: gcc
    configure_args:
      type: string
      description: Extra configure flags; hashed verbatim into the digest.
      default: ''
    destdir:
      type: string
      description: |-
        Slot install root; the per-identity prefix is `destdir/<identity>`.
    target_list:
      type: array
      description: |-
        QEMU emulator targets (`--target-list`); comma-joined into the digest.
      default: []
      items:
        type: string
    worktree:
      type: string
      description: |-
        Source worktree to read the build commit from (`git rev-parse HEAD`).
  required:
    - worktree
    - destdir
