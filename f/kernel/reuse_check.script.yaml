summary: Reuse if already built
description: |-
  Probe for the artifacts named by this build identity (the baked
  kernelrelease): `boot/<image>-<release>` and `lib/modules/<release>`, first in
  the destdir, then in the Nix store via the `store-index` entry (where
  `fetch_identity` leaves a peer's build). When both are present the build flow
  skips compile/install/modules and the manifest points at them, reusing the
  prior build. Returns `present` plus the resolved `bzImage`/`boot`/`modules`
  (under the destdir or the store path) and `destdir`.
lock: '!inline f/kernel/reuse_check.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - destdir
    - uts_release
  properties:
    destdir:
      type: string
      description: Install root to probe (the slot `destdir`).
    uts_release:
      type: string
      description: The build identity (baked kernelrelease) to look for.
  required:
    - destdir
    - uts_release
