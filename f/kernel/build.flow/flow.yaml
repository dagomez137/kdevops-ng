summary: Build the Linux kernel
description: |-
  First-class kernel build, composed from reusable step-scripts so each unit is
  independently runnable and testable. Builds inside the `nixos-flake#build`
  devShell over this worker's warm `main` worktree cut from the durable Bare,
  with `make --jobs=$(nproc)` so the container cgroup governs CPU and N
  concurrent builds self-balance across the workers.

  The build is content-addressed: `configure` always bakes a Build Identity, a
  hash of the config, toolchain, make flags and commit, into `kernelrelease`, so
  an identical build is fetched or reused instead of recompiled.

  Steps, pinned to one worker via `same_worker` so each sees the previous step's
  files:

  1. `prepare_worktree`: resolve the worker slot and check out `git_ref`,
  optionally applying a `b4` series.

  2. `build_flags`: resolve the make flags (GCC or clang/LLVM toolchain,
  reproducibility, ccache).

  3. `configure`: generate `.config` by `config_method`, then bake the Build
  Identity into `kernelrelease`. `preset` (the default) applies a predefined
  whole-kernel config such as `imageless_defconfig` via `KCONFIG_ALLCONFIG`;
  `make` runs a list of config goals such as `defconfig` or
  `["defconfig","kvm_guest.config"]`; `fragments` merges from the curated
  `linux-config-fragments` library in canonical order.

  4. `fetch_identity`: with `use_peers` on, fetch this identity's run layer from
  a registered peer's Nix store so a local reuse hit can land.

  5. `reuse_check`: report whether this identity is already built, in the worker
  destdir or this host's Nix store. A hit short-circuits compile, install and
  publish.

  6. `compile`: `make` (default goal: `vmlinux`, the arch boot image and the
  modules). Skipped on a reuse hit.

  7. `devtools`: generate dev-tooling artifacts (compile_commands.json, GDB
  helpers, rust-project.json), each optional and on by default.

  8. `install`: install the kernel image into the destdir, only when `install`
  is set and not reused.

  9. `install_modules`: `modules_install` into the destdir plus the canonical
  source symlink, only when `modules_install` is set (skip for an all-built-in
  kernel).

  10. `publish`: add this identity's run layer to the Nix store so a peer can
  fetch it, only after a real install (skipped on reuse).

  11. `publish_devel`: add this identity's devel layer (the build dir's `.cmd`
  files, headers and scripts, minus binaries) to the Nix store so `fetch_devel`
  can index a worktree from it, only after a real build (skipped on reuse).

  12. `deploy_worktree`: lay the developer-group worktree at the built ref, only
  when a developer worktree is requested.

  13. `fetch_devel`: materialize this build's devel layer into that developer
  worktree and regenerate its clangd index.

  14. `collect`: merge the step results into one manifest.

  Each worker builds in its own warm `main` worktree
  (`workers/<worker>/main/linux`), synced to `git_ref` every run so rebuilds
  stay incremental and isolated builds on different workers run in parallel.
  `recreate_build_worktree` forces a fresh checkout; `wipe_build` forces a clean
  build.

  Returns a manifest (`commit`, `uts_release`, `bzImage`, `build_dir`, `config`,
  `config_method`, `destdir`, and the build provenance `linux_compiler`,
  `uts_version`, `uts_machine`, `linux_compile_by`, `linux_compile_host`) so
  downstream flows such as VM boot can consume it.
value:
  modules:
    - id: prepare_worktree
      summary: Resolve slot + check out worktree
      value:
        type: script
        input_transforms:
          b4_series:
            type: javascript
            expr: flow_input.worktree?.b4_series
          git_ref:
            type: javascript
            expr: flow_input.worktree?.git_ref
          recreate_build_worktree:
            type: javascript
            expr: flow_input.worktree?.recreate_build_worktree
          wipe_build:
            type: javascript
            expr: flow_input.worktree?.wipe_build
        path: f/kernel/prepare_worktree
      retry:
        constant:
          attempts: 2
          seconds: 5
      timeout:
        type: static
        value: 300
    - id: build_flags
      summary: Resolve make flags (toolchain/reproducible/ccache)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          ccache:
            type: javascript
            expr: flow_input.build?.ccache
          ccache_max_size:
            type: javascript
            expr: flow_input.build?.ccache_max_size
          commit:
            type: javascript
            expr: results.prepare_worktree.commit
          compiler:
            type: javascript
            expr: flow_input.build?.compiler
          make_flags:
            type: javascript
            expr: flow_input.build?.make_flags
          reproducible:
            type: javascript
            expr: flow_input.build?.reproducible
          timestamp_from_commit:
            type: javascript
            expr: flow_input.build?.timestamp_from_commit
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/kernel/build_flags
      timeout:
        type: static
        value: 60
    - id: configure
      summary: Configure .config (method-selected)
      value:
        type: branchone
        branches:
          - summary: curated fragments
            modules:
              - id: configure_fragments
                value:
                  type: script
                  input_transforms:
                    allnoconfig_base:
                      type: javascript
                      expr: flow_input.configuration?.allnoconfig_base
                    build_dir:
                      type: javascript
                      expr: results.prepare_worktree.build_dir
                    fragments:
                      type: javascript
                      expr: flow_input.configuration?.fragments
                    make_flags:
                      type: javascript
                      expr: results.build_flags.make_flags
                    worktree:
                      type: javascript
                      expr: results.prepare_worktree.worktree
                  path: f/kernel/configure_fragments
                retry:
                  constant:
                    attempts: 2
                    seconds: 10
                timeout:
                  type: static
                  value: 900
            expr: flow_input.configuration?.config_method == "fragments"
            parallel: true
            skip_failure: true
          - summary: make config goals
            modules:
              - id: configure_make
                value:
                  type: script
                  input_transforms:
                    build_dir:
                      type: javascript
                      expr: results.prepare_worktree.build_dir
                    defconfig:
                      type: javascript
                      expr: flow_input.configuration?.defconfig
                    make_flags:
                      type: javascript
                      expr: results.build_flags.make_flags
                    worktree:
                      type: javascript
                      expr: results.prepare_worktree.worktree
                  path: f/kernel/configure_make
                retry:
                  constant:
                    attempts: 2
                    seconds: 10
                timeout:
                  type: static
                  value: 900
            expr: flow_input.configuration?.config_method == "make"
            parallel: true
            skip_failure: true
        default:
          - id: configure_preset
            value:
              type: script
              input_transforms:
                build_dir:
                  type: javascript
                  expr: results.prepare_worktree.build_dir
                make_flags:
                  type: javascript
                  expr: results.build_flags.make_flags
                preset:
                  type: javascript
                  expr: flow_input.configuration?.preset
                worktree:
                  type: javascript
                  expr: results.prepare_worktree.worktree
              path: f/kernel/configure_preset
            retry:
              constant:
                attempts: 2
                seconds: 10
            timeout:
              type: static
              value: 900
      skip_if:
        expr: flow_input.configuration?.config_method === "skip"
    - id: fetch_identity
      summary: fetch this identity's run layer from a peer builder
      value:
        type: script
        input_transforms:
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          use_peers:
            type: javascript
            expr: flow_input.reuse?.use_peers
          uts_release:
            type: javascript
            expr: results.configure.kernelrelease
        path: f/kernel/fetch_identity
      skip_if:
        expr: flow_input.reuse?.use_peers === false
      timeout:
        type: static
        value: 1800
    - id: reuse_check
      summary: reuse if this identity is already installed
      value:
        type: script
        input_transforms:
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          uts_release:
            type: javascript
            expr: results.configure.kernelrelease
        path: f/kernel/reuse_check
      timeout:
        type: static
        value: 120
    - id: compile
      summary: make <targets>
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          make_flags:
            type: javascript
            expr: results.build_flags.make_flags
          targets:
            type: javascript
            expr: flow_input.build?.targets
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/kernel/compile
      retry:
        constant:
          attempts: 2
          seconds: 10
      skip_if:
        expr: results.reuse_check?.present === true && flow_input.reuse?.reuse
          !== false
      timeout:
        type: static
        value: 3600
    - id: devtools
      summary: dev artifacts (clangd, GDB, rust-analyzer)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          compile_commands:
            type: javascript
            expr: flow_input.devtools?.compile_commands
          make_flags:
            type: javascript
            expr: results.build_flags.make_flags
          rust_analyzer:
            type: javascript
            expr: flow_input.devtools?.rust_analyzer
          scripts_gdb:
            type: javascript
            expr: flow_input.devtools?.scripts_gdb
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/kernel/devtools
      skip_if:
        expr: (flow_input.devtools?.compile_commands === false &&
          flow_input.devtools?.scripts_gdb === false &&
          flow_input.devtools?.rust_analyzer === false) ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 900
    - id: install
      summary: make install (image, optional)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          make_flags:
            type: javascript
            expr: results.build_flags.make_flags
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/kernel/install
      skip_if:
        expr: flow_input.installation?.install === false ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 600
    - id: install_modules
      summary: make modules_install (optional)
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          make_flags:
            type: javascript
            expr: results.build_flags.make_flags
          source_symlink:
            type: javascript
            expr: flow_input.installation?.source_symlink
          worktree:
            type: javascript
            expr: results.prepare_worktree.worktree
        path: f/kernel/install_modules
      skip_if:
        expr: flow_input.installation?.modules_install === false ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 1800
    - id: publish
      summary: publish this identity's run layer to the Nix store
      value:
        type: script
        input_transforms:
          destdir:
            type: javascript
            expr: results.prepare_worktree.destdir
          uts_release:
            type: javascript
            expr: results.configure.kernelrelease
        path: f/kernel/publish
      skip_if:
        expr: flow_input.installation?.install === false ||
          (results.reuse_check?.present === true &&
          flow_input.reuse?.reuse !== false)
      timeout:
        type: static
        value: 600
    - id: publish_devel
      summary: publish this identity's devel layer to the Nix store
      value:
        type: script
        input_transforms:
          build_dir:
            type: javascript
            expr: results.prepare_worktree.build_dir
          uts_release:
            type: javascript
            expr: results.configure.kernelrelease
        path: f/kernel/publish_devel
      skip_if:
        expr: results.reuse_check?.present === true && flow_input.reuse?.reuse
          !== false
      timeout:
        type: static
        value: 600
    - id: deploy_worktree
      summary: lay the developer group worktree at the built ref
      value:
        type: script
        input_transforms:
          projects:
            type: javascript
            expr: '[{ project: "linux", git_ref: results.prepare_worktree.b4_branch
              || flow_input.worktree?.git_ref, b4_series: "" }]'
          recreate_worktree:
            type: javascript
            expr: flow_input.worktree?.recreate_developer_worktree
          worktree_group:
            type: javascript
            expr: flow_input.worktree?.worktree_group
        path: f/workbench/worktree/init
      skip_if:
        expr: flow_input.worktree?.deploy_developer_worktree !== true
      timeout:
        type: static
        value: 300
    - id: fetch_devel
      summary: fetch this build's devel layer into the developer worktree
      value:
        type: script
        input_transforms:
          uts_release:
            type: javascript
            expr: results.configure.kernelrelease
          worktree:
            type: javascript
            expr: results.deploy_worktree.worktrees[0].worktree
        path: f/kernel/fetch_devel
      skip_if:
        expr: flow_input.worktree?.deploy_developer_worktree !== true
      timeout:
        type: static
        value: 1800
    - id: collect
      summary: Merge step results into one manifest
      value:
        type: rawscript
        content: '!inline merge_step_results_into_one_manifest.inline_script.ts'
        input_transforms:
          modules:
            type: javascript
            expr: results.install_modules
          compile:
            type: javascript
            expr: results.compile
          configure:
            type: javascript
            expr: results.configure
          devtools:
            type: javascript
            expr: results.devtools
          install:
            type: javascript
            expr: results.install
          prepare:
            type: javascript
            expr: results.prepare_worktree
          publish:
            type: javascript
            expr: results.publish
          reuse:
            type: javascript
            expr: results.reuse_check
        lock: '!inline merge_step_results_into_one_manifest.inline_script.lock'
        language: bun
  same_worker: true
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worktree
    - configuration
    - reuse
    - build
    - devtools
    - installation
  properties:
    build:
      type: object
      description: 'Compile knobs: targets, toolchain, reproducibility, ccache.'
      default: {}
      order:
        - targets
        - make_flags
        - compiler
        - reproducible
        - timestamp_from_commit
        - ccache
        - ccache_max_size
      properties:
        ccache:
          type: boolean
          description: |-
            Compile through ccache (`CC="ccache <cc>"`, shared `CCACHE_DIR`).
          default: true
        ccache_max_size:
          type: integer
          description: |-
            ccache max cache size in GiB (written to ccache.conf max_size).
          default: 10
          showExpr: fields.ccache !== false
        compiler:
          type: string
          description: |-
            Toolchain to build with: GCC, or clang/LLVM (LLVM=1 with the
            devShell's unwrapped clang).
          default: gcc
          enum:
            - gcc
            - clang
        make_flags:
          type: string
          description: |-
            Extra make variables/flags, space-separated, appended verbatim (e.g.
            "W=1 KCFLAGS=-O2").
          default: ''
        reproducible:
          type: boolean
          description: |-
            Reproducible build (fixed `KBUILD_BUILD_TIMESTAMP`/`USER`/`HOST`,
            `LOCALVERSION=`).
          default: true
        targets:
          type: string
          description: |-
            Space-separated make targets. Empty (default) builds the default
            goal: vmlinux, the boot image, and modules.
          default: ''
        timestamp_from_commit:
          type: boolean
          description: |-
            Derive `KBUILD_BUILD_TIMESTAMP` from the commit date instead of the
            fixed default.
          default: false
      title: Build
    configuration:
      type: object
      description: How the kernel `.config` is produced.
      default: {}
      order:
        - config_method
        - preset
        - defconfig
        - fragments
        - allnoconfig_base
      properties:
        allnoconfig_base:
          type: boolean
          description: |-
            [method=fragments] Default unset symbols to n (allnoconfig base) for
            a minimal, explicit config.
          default: true
          showExpr: fields.config_method === 'fragments'
        config_method:
          type: string
          description: |-
            How to generate .config: preset (a predefined whole-kernel config),
            make (config goals), fragments (curated multiselect), or skip (reuse
            the .config already in the build dir).
          default: preset
          enum:
            - preset
            - make
            - fragments
            - skip
        defconfig:
          type: array
          description: |-
            [method=make] Config make goals, applied in order (defconfig,
            x86_64_defconfig, tinyconfig, ...). *.config fragments merge onto
            the base.
          default:
            - defconfig
          items:
            type: string
            enum:
              - defconfig
              - x86_64_defconfig
              - i386_defconfig
              - alldefconfig
              - allyesconfig
              - allmodconfig
              - allnoconfig
              - tinyconfig
              - randconfig
              - kvm_guest.config
              - hardening.config
              - debug.config
              - rust.config
              - xen.config
              - nopm.config
          showExpr: fields.config_method === 'make'
        fragments:
          type: array
          description: |-
            [method=fragments] Curated fragments to merge (canonical order
            applied; builtin/* go last).
          default:
            - core/64bit.config
            - core/modules.config
            - core/core.config
            - core/systemd.config
            - core/initrd.config
            - core/localversion-noauto.config
            - core/acpi-poweroff.config
            - core/boot-config.config
            - core/iommu-pci.config
            - core/vfio.config
            - core/cgroup-extras.config
            - arch/x86_64.config
            - mem/damon.config
            - security/security.config
            - security/crypto-core.config
            - security/ebpf.config
            - security/lsm-modules.config
            - fs/ext4.config
            - fs/xfs.config
            - fs/xfs-advanced.config
            - fs/xfs-debug.config
            - fs/overlayfs.config
            - fs/encryption.config
            - storage/block-layer.config
            - storage/block-devices.config
            - storage/block-test-devices.config
            - storage/dm-targets.config
            - storage/md-raid.config
            - storage/nvme.config
            - storage/zoned.config
            - storage/scsi-debug.config
            - virt/virtio-net.config
            - virt/virtio-fs.config
            - virt/virtio-extras.config
            - virt/vsock.config
            - virt/kvm.config
            - rust/rust.config
            - rust/rust-samples.config
            - rust/modversions.config
            - rust/gendwarfksyms.config
            - perf/perf-amd.config
            - debug/debug-heavy.config
            - builtin/virt/virtio-fs.config
          items:
            type: string
            enum:
              - arch/arm64_16k_pages.config
              - arch/arm64_4k_pages.config
              - arch/arm64_64k_pages.config
              - arch/arm64.config
              - arch/x86_64.config
              - arch/x86-extras.config
              - builtin/arch/arm64.config
              - builtin/core/efi.config
              - builtin/core/systemd.config
              - builtin/core/vfio.config
              - builtin/fs/9p.config
              - builtin/fs/btrfs.config
              - builtin/fs/exfat.config
              - builtin/fs/ext4.config
              - builtin/fs/fat.config
              - builtin/fs/nfs.config
              - builtin/fs/overlayfs.config
              - builtin/fs/xfs.config
              - builtin/net/moby.config
              - builtin/net/netfilter-nat.config
              - builtin/net/nftables.config
              - builtin/perf/perf-amd.config
              - builtin/rust/rust-samples.config
              - builtin/security/crypto-algorithms.config
              - builtin/security/crypto-core.config
              - builtin/security/security.config
              - builtin/storage/block-test-devices.config
              - builtin/storage/dm-targets.config
              - builtin/storage/md-raid.config
              - builtin/storage/nvme.config
              - builtin/storage/nvme-fabrics.config
              - builtin/virt/kvm.config
              - builtin/virt/virtio-fs.config
              - builtin/virt/virtio-net.config
              - builtin/virt/vsock.config
              - core/64bit.config
              - core/acpi-extras.config
              - core/acpi-poweroff.config
              - core/boot-config.config
              - core/cgroup-extras.config
              - core/compression.config
              - core/core.config
              - core/cpufreq.config
              - core/crash.config
              - core/efi.config
              - core/hardening.config
              - core/initrd.config
              - core/iommu-pci.config
              - core/localversion.config
              - core/localversion-noauto.config
              - core/mitigations.config
              - core/modules.config
              - core/preempt.config
              - core/systemd.config
              - core/vfio.config
              - debug/blktrace.config
              - debug/codetagging.config
              - debug/debug-heavy.config
              - debug/gdb.config
              - debug/kasan.config
              - debug/kmemleak.config
              - debug/modules-debug.config
              - fs/9p.config
              - fs/btrfs.config
              - fs/encryption.config
              - fs/exfat.config
              - fs/ext4.config
              - fs/f2fs.config
              - fs/fat.config
              - fs/iso9660.config
              - fs/nfs.config
              - fs/nfsd-advanced.config
              - fs/nls.config
              - fs/overlayfs.config
              - fs/xfs-advanced.config
              - fs/xfs.config
              - fs/xfs-debug.config
              - mem/damon.config
              - mem/ksm.config
              - mem/numa.config
              - mem/zram.config
              - net/moby.config
              - net/netfilter-nat.config
              - net/netfilter-xtables.config
              - net/nftables.config
              - perf/perf-amd.config
              - rust/gendwarfksyms.config
              - rust/modversions.config
              - rust/rust.config
              - rust/rust-samples.config
              - security/crypto-accel.config
              - security/crypto-algorithms.config
              - security/crypto-core.config
              - security/ebpf.config
              - security/ima-full.config
              - security/lsm-modules.config
              - security/security.config
              - storage/block-devices.config
              - storage/block-layer.config
              - storage/block-test-devices.config
              - storage/cxl.config
              - storage/dm-targets.config
              - storage/md-raid.config
              - storage/nvdimm.config
              - storage/nvme.config
              - storage/nvme-fabrics.config
              - storage/nvme-tls.config
              - storage/scsi-debug.config
              - storage/zoned.config
              - test/kunit.config
              - test/modules-testing.config
              - test/selftests.config
              - test/xarray.config
              - test/xarray-no-multi.config
              - virt/kvm.config
              - virt/virtio-extras.config
              - virt/virtio-fs.config
              - virt/virtio-net.config
              - virt/vsock.config
          showExpr: fields.config_method === 'fragments'
        preset:
          type: string
          description: |-
            [method=preset] Predefined whole-kernel config from the library
            (applied via KCONFIG_ALLCONFIG).
          default: imageless_defconfig
          enum:
            - imageless_defconfig
          showExpr: fields.config_method === 'preset'
      title: Configuration
    devtools:
      type: object
      description: Optional IDE/debug artifacts produced after compile.
      default: {}
      order:
        - compile_commands
        - scripts_gdb
        - rust_analyzer
      properties:
        compile_commands:
          type: boolean
          description: |-
            Generate `compile_commands.json` (clangd/IDE C index) in the source
            tree.
          default: true
        rust_analyzer:
          type: boolean
          description: |-
            Generate `rust-project.json` (rust-analyzer) when `CONFIG_RUST=y`.
          default: true
        scripts_gdb:
          type: boolean
          description: |-
            Build kernel GDB helpers (`vmlinux-gdb.py` + `lx-*`) into the build
            dir.
          default: true
          title: Scripts GDB
      title: Developer tools
    installation:
      type: object
      description: Optional install steps and their destination.
      default: {}
      order:
        - install
        - modules_install
        - source_symlink
      properties:
        install:
          type: boolean
          description: |-
            Install the built kernel image into the slot `destdir` (`make
            install`).
          default: true
        modules_install:
          type: boolean
          description: |-
            Install kernel modules into the slot `destdir` (make
            modules_install). Skip for an all-built-in kernel.
          default: true
        source_symlink:
          type: boolean
          description: |-
            Add the canonical /lib/modules/<release>/source symlink after
            modules_install.
          default: true
      title: Install
    reuse:
      type: object
      description: |-
        Where a finished build of this identity may come from instead of
        recompiling: a local hit (this worker's destdir or this host's Nix
        store) or a registered peer's published run layer. The identity is
        always computed, so an identical build can be fetched or reused instead
        of rebuilt.
      default: {}
      order:
        - reuse
        - use_peers
      properties:
        reuse:
          type: boolean
          description: |-
            Skip compile and install when this build identity is already built
            and present: in the worker destdir, or in this host's Nix store
            (where a local build published it, or `fetch_identity` left a
            peer's). This is the Store transport's local hit, not a binary
            cache. Reuse points the manifest at that copy; off forces a rebuild.
          default: true
        use_peers:
          type: boolean
          description: |-
            Before building, fetch this build identity's run layer (image and
            modules) from a registered peer's Nix store when one already
            published it (the peers registry at `$SYSTEM_DIR/peers`), so the
            local reuse hit lands. Takes effect only with Reuse on; off builds
            from this host alone.
          default: true
          title: Use Peers
      title: Reuse
    worktree:
      type: object
      description: Source ref, optional patch series, and warm-tree lifecycle.
      default: {}
      order:
        - git_ref
        - recreate_build_worktree
        - wipe_build
        - b4_series
        - deploy_developer_worktree
        - worktree_group
        - recreate_developer_worktree
      properties:
        b4_series:
          type: string
          description: |-
            Optional lore series (message-id/URL) to apply on top of the
            checkout via `b4 shazam`, published to the Bare as `b4/<slug>`.
          default: ''
          title: b4 Series
        deploy_developer_worktree:
          type: boolean
          description: |-
            After the build, lay or refresh a developer group worktree under
            WORKTREES_DIR and fetch this build's devel layer into it for clangd,
            rust-analyzer and GDB indexing. The build itself is unaffected by
            this toggle.
          default: false
          title: Deploy Developer Worktree
        git_ref:
          type: string
          description: |-
            Branch, tag or commit in the Bare to build (a tag, an upstream ref
            via the mirror, or a developer branch).
          default: v7.1-rc7
        recreate_build_worktree:
          type: boolean
          description: |-
            Re-cut the worker's build-site checkout (rm the warm tree, its build
            dir and destdir too, first) instead of reusing it. This hits only
            the worker sandbox and never a developer worktree. Default off keeps
            the warm tree for incremental rebuilds.
          default: false
          title: Recreate Build Worktree
        recreate_developer_worktree:
          type: boolean
          description: |-
            Re-cut the developer group worktree (rm the existing checkout first)
            instead of reusing it. This hits only the developer worktree and
            never the worker build site.
          default: false
          showExpr: fields.deploy_developer_worktree === true
          title: Recreate Developer Worktree
        wipe_build:
          type: boolean
          description: |-
            Wipe the build dir before building (default off = incremental
            reuse). Hidden when Recreate Build Worktree is on, which already
            removes the build dir as a child of the worktree.
          default: false
          showExpr: fields.recreate_build_worktree !== true
        worktree_group:
          type: string
          description: |-
            Developer group to deploy into, at WORKTREES_DIR/<group>/linux. Used
            only when Deploy Developer Worktree is on.
          default: vanilla
          showExpr: fields.deploy_developer_worktree === true
          title: Developer Group
      title: Worktree
  required: []
