summary: "Kernel: fetch a build identity's run layer from a peer builder"
description: |-
  Pull a build identity's run layer (the artifacts named by the baked
  kernelrelease) from a peer host into the Nix store, before the expensive
  compile, so the following `reuse_check` reports `present` and the build is
  skipped. Reads the peer's `store-index` entry over ssh to learn the run
  layer's Nix store path, pulls it with `nix copy` over the `transfer` devShell,
  and indexes it locally. The run layer, the boot artifacts
  (`boot/<image>-<release>`, `System.map-<release>`, `config-<release>`) and the
  `lib/modules/<release>/` tree, is consumed in place from the store, with no
  copy. Same-host (no remote) is a no-op. Returns `fetched` plus the resolved
  `uts_release`/`destdir`.
lock: '!inline f/kernel/fetch_identity.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - destdir
    - uts_release
    - remote
    - remote_index
  properties:
    destdir:
      type: string
      description: Local install root to populate (the slot `destdir`).
    remote:
      type: string
      description: |-
        SSH host of the peer builder; empty fetches nothing (same-host).
      default: ''
    remote_index:
      type: string
      description: |-
        The peer builder's `store-index` directory, read over ssh to learn the
        run layer's store path; empty fetches nothing.
      default: ''
    uts_release:
      type: string
      description: |-
        The build identity (baked kernelrelease) whose run layer to fetch.
  required:
    - destdir
    - uts_release
