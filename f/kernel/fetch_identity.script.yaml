summary: Fetch a run layer from a peer
description: |-
  Pull a build identity's run layer (the artifacts named by the baked
  kernelrelease) from a registered peer into the Nix store, before the expensive
  compile, so the following `reuse_check` reports `present` and the build is
  skipped. Sweeps the registered peers (`$SYSTEM_DIR/peers`) and, for the first
  that carries the identity, reads its `store-index` entry over ssh to learn the
  run layer's Nix store path, pulls it with `nix copy` over the `transfer`
  devShell, and indexes it locally. The run layer, the boot artifacts
  (`boot/<image>-<release>`, `System.map-<release>`, `config-<release>`) and the
  `lib/modules/<release>/` tree, is consumed in place from the store, with no
  copy. `use_peers` off, or no peer carrying it, is a no-op. Returns `fetched`
  plus the resolved `uts_release`/`destdir`.
lock: '!inline f/kernel/fetch_identity.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - destdir
    - uts_release
    - use_peers
  properties:
    destdir:
      type: string
      description: Local install root to populate (the slot `destdir`).
    use_peers:
      type: boolean
      description: |-
        Sweep the registered peers (`$SYSTEM_DIR/peers`) and fetch this run
        layer from the first that published it. Off builds locally with no
        fetch.
      default: true
      title: Use Peers
    uts_release:
      type: string
      description: |-
        The build identity (baked kernelrelease) whose run layer to fetch.
  required:
    - destdir
    - uts_release
