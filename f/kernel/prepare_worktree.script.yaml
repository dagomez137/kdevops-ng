summary: Prepare a kernel build worktree
description: |-
  Lay down this worker's warm `main` kernel worktree
  (`workers/<WORKER_INDEX>/main/linux`) detached at `git_ref`, cut from the
  durable Bare at `$SYSTEM_DIR/bare/linux.git` and refreshed from the mirror
  first so newly-mirrored refs/tags are usable. Thin wrapper over
  `f/common/worktree`. The same tree is reused for every ref and across runs
  (parallel across workers); `recreate_build_worktree` lays a fresh checkout.
  `build` and `destdir` are children of the source checkout.

  Returns `worktree`, `build_dir`, `destdir`, `commit`, `worker`, `project`,
  `git_ref`, `label` (the readable build-identity label derived from the ref and
  any series, or the override), and `b4_branch` (the `b4/<slug>` branch
  published to the Bare when `b4_series` is set, else null).
lock: '!inline f/kernel/prepare_worktree.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - git_ref
    - b4_series
    - label
    - recreate_build_worktree
    - wipe_build
  properties:
    b4_series:
      type: string
      description: |-
        Optional lore series (message-id/URL) to apply on top via `b4 am`.
      default: ''
      title: b4 Series
    label:
      type: string
      description: |-
        Custom build-identity name (replaces the auto-derived vanilla/series
        name); empty derives it from the ref and any series.
      default: ''
      maxLength: 40
    git_ref:
      type: string
      description: |-
        Branch, tag or commit in the Bare to check out (a tag, an upstream ref
        via the mirror, or a developer branch).
      default: v7.1-rc7
    recreate_build_worktree:
      type: boolean
      description: |-
        Re-cut the worker's build-site checkout (rm the warm tree, its build dir
        and destdir too, first) instead of reusing it. This hits only the worker
        sandbox and never a developer worktree. Default off keeps the warm tree
        for incremental rebuilds.
      default: false
      title: Recreate Build Worktree
    wipe_build:
      type: boolean
      description: |-
        Wipe the build dir before building (default off = incremental reuse).
      default: false
  required: []
