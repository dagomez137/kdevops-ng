summary: Prepare a kernel build worktree
description: |-
  Lay down this worker's warm `main` kernel worktree
  (`workers/<WORKER_INDEX>/linux/main`) detached at `git_ref`, cut from the
  durable Bare at `$SYSTEM_DIR/bare/linux.git` and refreshed from the mirror
  first so newly-mirrored refs/tags are usable. Thin wrapper over
  `f/common/worktree`. The same tree is reused for every ref and across runs
  (parallel across workers); `recreate_worktree` lays a fresh checkout. `build`
  and `destdir` are children of the source checkout.

  Returns `worktree`, `build_dir`, `destdir`, `commit`, `worker`, `project`,
  `worktree_group`, `git_ref`, and `b4_branch` (the `b4/<slug>` branch published
  to the Bare when `b4_series` is set, else null).
lock: '!inline f/kernel/prepare_worktree.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - git_ref
    - worktree_group
    - b4_series
    - recreate_worktree
    - wipe_build
    - clean_destdir
  properties:
    b4_series:
      type: string
      description: |-
        Optional lore series (message-id/URL) to apply on top via `b4 shazam`.
      default: ''
      title: b4 Series
    clean_destdir:
      type: boolean
      description: |-
        Wipe the install destdir first (default off). Leave off so an install
        never wipes modules a running QEMU/systemd VM has mounted over virtiofs.
      default: false
    git_ref:
      type: string
      description: |-
        Branch, tag or commit in the Bare to check out (a tag, an upstream ref
        via the mirror, or a developer branch).
      default: v7.1-rc7
    recreate_worktree:
      type: boolean
      description: |-
        Lay a fresh detached checkout (rm the warm tree, its build dir and
        destdir too, first) instead of reusing it. Default off keeps the warm
        tree for incremental rebuilds.
      default: false
      title: Recreate Worktree
    wipe_build:
      type: boolean
      description: |-
        Wipe the build dir before building (default off = incremental reuse).
      default: false
    worktree_group:
      type: string
      description: |-
        Worktree-group this build belongs to (default vanilla; system/workers
        are reserved).
      default: vanilla
      title: Worktree group
  required: []
