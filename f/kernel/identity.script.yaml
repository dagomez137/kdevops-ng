summary: 'Shared helper: bake a build identity into kernelrelease'
description: |-
  Library module imported by the configure steps (`from f.kernel.identity import
  bake_identity`). Not a runnable step on its own. `bake_identity()` hashes the
  inputs that fix a build's bytes: the `.config`, the build devShell's flake,
  the make flags, and the source commit, and appends the digest to
  `CONFIG_LOCALVERSION`, so `make kernelrelease` (and the booted `uname -r`)
  report a unique `7.1.0-rc7-<hash>`. Used by `f/kernel/configure_make`,
  `configure_fragments` and `configure_preset`.
lock: '!inline f/kernel/identity.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order: []
  properties: {}
  required: []
