    allnoconfig_base:
      type: boolean
      description: Default unset symbols to n (allnoconfig base) for a minimal, explicit config. Off = alldefconfig base.
      default: true
    make_flags:
      type: string
      description: Toolchain make flags from `build_flags` (`LLVM=1` for clang); applied to config detection.
      default: ""
    build_identity:
      type: boolean
      description: Bake a hash of the build inputs into kernelrelease (unique per config/toolchain/flags) so identical builds can be fetched or reused instead of rebuilt.
      default: true
  required:
