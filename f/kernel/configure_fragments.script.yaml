summary: "Kernel: configure via curated fragments"
description: |
  Configure method **fragments** — generate a `.config` by selecting from the
  curated `linux-config-fragments` library and merging the picks with the kernel
  tree's `scripts/kconfig/merge_config.sh`. You pick **which** fragments; the step
  imposes a **canonical order** (core structural first, then by category, builtin
  `=y` overrides last) so the result is deterministic regardless of selection
  order.

  Fragments default tristate symbols to `=m`; pick a matching `builtin/...` entry
  to force that feature built-in (`=y`) instead — it always merges last so
  last-wins applies. With `allnoconfig_base` (default) unset symbols default to
  `n` for a minimal, explicit config. The library is provisioned at
  `workers/shared/linux-config-fragments` by `f/workspace/init`.

  One of the interchangeable configure steps (see also `configure_make` and
  `configure_preset`). This is the guided multiselect over the curated library.
  Returns `kernelrelease`, the `.config` path, `method`, and the `fragments` used.

  > The fragment list below is a static snapshot of the library (117 entries).
  > Regenerate it when the library changes, as paths relative to `kernel/configs/`,
  > sorted: `cd workers/shared/linux-config-fragments/kernel/configs && find . -name '*.config' | sed 's|^\./||' | sort`.
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - worktree
    - build_dir
    - fragments
    - allnoconfig_base
    - make_flags
    - build_identity
  properties:
    worktree:
      type: string
      description: Kernel source worktree (from prepare_worktree).
    build_dir:
      type: string
      description: Out-of-tree build directory, passed as make O= (from prepare_worktree).
    fragments:
      type: array
      description: Curated config fragments to merge (canonical order is applied; builtin/* go last). Pick builtin/<x> to force feature <x> built-in.
      default:
        - core/64bit.config
        - core/modules.config
        - core/core.config
        - core/systemd.config
        - core/initrd.config
        - core/localversion-noauto.config
        - core/acpi-poweroff.config
        - core/boot-config.config
        - core/iommu-pci.config
