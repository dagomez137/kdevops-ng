summary: "Kernel: resolve make flags (toolchain / reproducible / ccache)"
description: |
  Resolve the toolchain, reproducible-build and ccache knobs into one make-flags
  string that every later make step consumes, so the toolchain stays consistent
  (the kernel requires the same `LLVM=` on configure and compile).

  - `compiler` GCC (default) or clang â†’ `LLVM=1` for clang.
  - `reproducible` (default on) â†’ `KBUILD_BUILD_TIMESTAMP` (a real fixed date, or the
    commit date when `timestamp_from_commit` is set), `KBUILD_BUILD_USER`/`HOST`,
    `LOCALVERSION=`, plus one `-fdebug-prefix-map=<prefix>/=` in `KCFLAGS`/`KAFLAGS`
    (the common parent of `worktree` and `build_dir`) so the build path stops leaking
    into DWARF.
  - `ccache` (default on) â†’ `CC="ccache <cc>"`; the devShell points `CCACHE_DIR` at a
    shared cache.

  Appends any raw `make_flags` (merging the prefix map into a user `KCFLAGS=`/
  `KAFLAGS=` rather than emitting a second, fighting assignment). Reads
  `worktree`/`build_dir`/`commit` from `prepare_worktree`. Returns `make_flags`.
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - compiler
    - reproducible
    - timestamp_from_commit
    - ccache
    - ccache_max_size
    - make_flags
    - worktree
    - build_dir
    - commit
  properties:
    compiler:
      type: string
      description: Toolchain to build with. clang is pending the nixos-flake LLVM flags - see docs/windmill/clang-kernel-build-findings.md.
      default: gcc
      enum:
        - gcc
    reproducible:
      type: boolean
      description: Set `KBUILD_BUILD_TIMESTAMP`/`USER`/`HOST` and `LOCALVERSION` for a reproducible build.
      default: true
    timestamp_from_commit:
      type: boolean
      description: Derive `KBUILD_BUILD_TIMESTAMP` from the commit date instead of the fixed default.
      default: false
    ccache:
      type: boolean
      description: Compile through ccache (`CC="ccache <cc>"`, shared `CCACHE_DIR`).
      default: true
    ccache_max_size:
      type: integer
      description: ccache max cache size in GiB (written to ccache.conf max_size).
      default: 10
    make_flags:
      type: string
      description: Extra make variables/flags, space-separated, appended verbatim.
      default: ""
    worktree:
      type: string
      description: Kernel source worktree (from prepare_worktree); used for `timestamp_from_commit` and the reproducible `-fdebug-prefix-map`.
      default: ""
    build_dir:
      type: string
      description: Out-of-tree build dir (from prepare_worktree); paired with `worktree` for the reproducible `-fdebug-prefix-map` common-parent prefix.
      default: ""
    commit:
      type: string
      description: Commit to date (from prepare_worktree); only used for timestamp_from_commit.
      default: ""
  required: []
