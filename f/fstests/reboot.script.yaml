summary: 'xfstests: cold power-cycle a guest and wait for it to come back'
description: |
  Run-global startup step: cold power-cycle a guest by restarting its host
  `qemu-system@<vm>.service` unit, then block until a fresh boot reaches
  `running`/`degraded`: clears leaked kernel state, stuck D-state tasks, and
  dirty page cache before a run. Off by default.

  A HOST power-cycle, not a guest `systemctl reboot`: it can't hang on a wedged
  guest (SIGKILL on the unit's stop timeout) and fully resets device/kernel
  state. The device wipe is a SEPARATE step (`f/fstests/wipe`); run this before
  it so the wipe acts on a fresh boot.

  Returns `{vm, rebooted}` (`+ boot_id`, `system_state` when it rebooted).
lock: '!inline f/fstests/reboot.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
    - reboot_guest
    - reboot_timeout
    - poll_interval
  properties:
    poll_interval:
      type: integer
      description: Seconds between is-system-running polls while waiting for the guest
        to come back.
      default: 5
      title: Poll Interval
    reboot_guest:
      type: boolean
      description: Power-cycle the guest and wait for it to come back. Off = no-op
        (returns `rebooted=false`).
      default: false
      title: Reboot Guest
    reboot_timeout:
      type: integer
      description: Seconds to wait for the guest to come back after the power-cycle
        before failing.
      default: 300
      title: Reboot Timeout
    vm_name:
      type: object
      description: Booted VM to power-cycle (its host `qemu-system@<vm>` unit).
      format: dynselect-list_vms
      title: VM Name
  required:
    - vm_name
tag: vm-run
