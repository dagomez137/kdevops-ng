summary: "xfstests check"
description: |
  Run xfstests `./check` against an already-booted, fstests-ready guest — the
  Windmill equivalent of an xfstests `./check` run. The guest is produced
  separately by `f/qsu/bringup` with `closure.test_suites=["fstests"]`, a writable
  `fstests` virtiofs share mounted at `/var/lib/xfstests`, and ≥2 NVMe drives
  (≥4 for a btrfs pool); this flow drives many sections against it without
  rebooting.

  Steps mirror xfstests/systemd vocabulary 1:1:

  1. `discover` — gate the guest over vsock (`systemctl --host <vm>
     is-system-running`, the `xfstests@.service` template present, `./check`
     executable) and enumerate its `/dev/nvme*n1` devices and supported `FSTYP`.
  2. `render_config` — write the `HOST_OPTIONS` config (`local.config`) and the
     `check.env` `EnvironmentFile` onto the host side of the share; its `[section]`
     names drive the loop.
  3. for each `section`, sequentially (sections share `TEST_DEV`/`SCRATCH_DEV`):
     `start` (`systemctl --host <vm> start --no-block xfstests@<section>`) →
     `wait` (poll `show --property=Result,ExecMainStatus,ActiveState` to terminal,
     crash-check the host `qemu-system@<vm>`) → `collect` (parse the `-R xunit`
     report from the share).
  4. `report` — aggregate the per-section results into one summary.

  Every step is `tag: vm` (the dedicated worker that reaches the guest over the
  vsock-SSH transport). Returns the `report` summary.
value:
  modules:
    - id: discover
      summary: Gate the guest + enumerate devices (f/fstests/discover)
      value:
        type: script
        path: f/fstests/discover
        tag_override: vm
        input_transforms:
          vm_name:
            type: javascript
            expr: flow_input.vm_name
    - id: render_config
      summary: Write local.config + check.env on the share (f/fstests/render_config)
      value:
        type: script
        path: f/fstests/render_config
        tag_override: vm
        input_transforms:
          vm_name:
            type: javascript
            expr: flow_input.vm_name
          kernel_version:
            type: javascript
            expr: results.discover.kernel_version
          local_config:
            type: javascript
            expr: flow_input.check?.local_config
          sections:
            type: javascript
            expr: flow_input.sections
          clean_results:
            type: javascript
            expr: flow_input.clean_results
          logwrites:
            type: javascript
            expr: flow_input.logwrites
          devices:
            type: javascript
            expr: results.discover.devices
          test_selection:
            type: javascript
            expr: flow_input.check.test_selection
          groups:
            type: javascript
            expr: flow_input.check.groups
          exclude_group:
            type: javascript
            expr: flow_input.check.exclude_group
          exclude:
            type: javascript
            expr: flow_input.check.exclude
          report:
            type: javascript
            expr: flow_input.check?.report
          randomize:
            type: javascript
            expr: flow_input.check?.randomize
          tests:
            type: javascript
            expr: flow_input.check.tests
          iterations:
            type: javascript
            expr: flow_input.check?.iterations
          loop_on_fail:
            type: javascript
            expr: flow_input.check?.loop_on_fail
          stop_on_fail:
            type: javascript
            expr: flow_input.check?.stop_on_fail
          test_timeout:
            type: javascript
            expr: flow_input.service?.test_timeout
          test_timeouts:
            type: javascript
            expr: flow_input.service?.test_timeouts
    - id: reboot
      summary: Reboot the guest before the run, optional (f/fstests/reboot)
      value:
        type: script
        path: f/fstests/reboot
        tag_override: vm-run
        input_transforms:
          vm_name:
            type: javascript
            expr: flow_input.vm_name
          reboot_guest:
            type: javascript
            expr: flow_input.reboot_guest
          reboot_timeout:
            type: javascript
            expr: flow_input.service?.reboot_timeout
          poll_interval:
            type: javascript
            expr: flow_input.service?.poll_interval
    - id: sections
      summary: Run each [section] sequentially (start → wait → collect)
      value:
        type: forloopflow
        parallel: false
        skip_failures: false
        iterator:
          type: javascript
          expr: results.render_config.sections
        modules:
          - id: wipe
            summary: Wipe test/scratch devices before this section (f/fstests/wipe)
            value:
              type: script
              path: f/fstests/wipe
              tag_override: vm
              input_transforms:
                vm_name:
                  type: javascript
                  expr: flow_input.vm_name
                devices:
                  type: javascript
                  expr: results.discover.devices
                wipe_devices:
                  type: javascript
                  expr: flow_input.wipe_devices
          - id: prepare
            summary: Create mount points + format TEST_DEV per FSTYP (f/fstests/prepare)
            value:
              type: script
              path: f/fstests/prepare
              tag_override: vm
              input_transforms:
                vm_name:
                  type: javascript
                  expr: flow_input.vm_name
                section:
                  type: javascript
                  expr: flow_input.iter.value
                mkfs_test_dev:
                  type: javascript
                  expr: flow_input.mkfs_test_dev
          - id: start
            summary: Start xfstests@<section> detached (f/fstests/start)
            value:
              type: script
              path: f/fstests/start
              tag_override: vm
              input_transforms:
                vm_name:
                  type: javascript
                  expr: flow_input.vm_name
                section:
                  type: javascript
                  expr: flow_input.iter.value
          - id: wait
            summary: Poll the unit to terminal + crash-check (f/fstests/wait)
            value:
              type: script
              path: f/fstests/wait
              tag_override: vm-run
              input_transforms:
                vm_name:
                  type: javascript
                  expr: flow_input.vm_name
                section:
                  type: javascript
                  expr: flow_input.iter.value
                timeout:
                  type: javascript
                  expr: flow_input.service?.timeout
                poll_interval:
                  type: javascript
                  expr: flow_input.service?.poll_interval
                stream_logs:
                  type: javascript
                  expr: flow_input.service?.stream_logs
          - id: collect
            summary: Parse the section's xunit report (f/fstests/collect)
            value:
              type: script
              path: f/fstests/collect
              tag_override: vm
              input_transforms:
                vm_name:
                  type: javascript
                  expr: flow_input.vm_name
                section:
                  type: javascript
                  expr: flow_input.iter.value
                kernel_version:
                  type: javascript
                  expr: results.discover.kernel_version
    - id: report
      summary: Aggregate per-section results (f/fstests/report)
      value:
        type: script
        path: f/fstests/report
        tag_override: vm
        input_transforms:
          per_section:
            type: javascript
            expr: results.sections
          vm_name:
            type: javascript
            expr: flow_input.vm_name
  failure_module:
    id: stop
    summary: Stop xfstests@<section>.service on failure or cancel (f/fstests/stop)
    value:
      type: script
      path: f/fstests/stop
      tag_override: vm
      input_transforms:
        vm_name:
          type: javascript
          expr: flow_input.vm_name
        sections:
          type: javascript
          expr: results?.render_config?.sections ?? []
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
    - sections
    - mkfs_test_dev
    - wipe_devices
    - clean_results
    - logwrites
    - reboot_guest
    - check
    - service
  properties:
    vm_name:
      title: VM Name
      type: object
      format: dynselect-list_vms
      description: Guest to drive over vsock (the `f/qsu/boot` ssh alias). The dropdown lists all guests; it must be fstests-ready (`closure.test_suites=["fstests"]`, the `fstests` share at `/var/lib/xfstests`, ≥2 NVMe) — `discover` gates that.
    sections:
      title: Sections
      type: object
      format: dynmultiselect-list_sections
      description: "Which xfstests `[section]`s actually run — chosen from the `local.config` set (the full default matrix unless you've edited it in the Check group). **Empty = run ALL of them**; pick one or more to run ONLY those (resolved against the full matrix regardless of the Edit toggle)."
      default: []
    mkfs_test_dev:
      title: Format TEST_DEV
      type: boolean
      description: "Per section, reformat `TEST_DEV` with that section's `FSTYP` before the run (`./check` mkfs's only `SCRATCH_DEV`, never `TEST_DEV`). Lets a run switch filesystems without rebuilding the guest."
      default: true
    wipe_devices:
      title: Wipe Devices
      type: boolean
      description: "`wipefs --all` + `blkdiscard --force` every test/scratch NVMe at the start of EACH section, before its mount points are created. The `blkdiscard` TRIM deflates the thin-provisioned qcow2 backing, so it doesn't inflate across sections and a device filled by a prior section stops reporting `No space left on device`. Safe by default — TEST_DEV/SCRATCH_DEV data is disposable."
      default: true
    clean_results:
      title: Clean Results
      type: boolean
      description: "Before the run, DELETE each selected section's results directory (`.out.bad`, `result.xml`, cores, and any kept `.NNNN` rotations) for a clean start. Off = keep prior runs (rotated to `.NNNN`)."
      default: false
    logwrites:
      title: Log-writes Device
      type: boolean
      description: "Reserve the last NVMe as `LOGWRITES_DEV` (the dm-log-writes replay log) for every section, so the crash-consistency tests (generic/455,457,470,471,482,642…) run instead of `notrun (requires $LOGWRITES_DEV)`. Costs one device — the scratch pool shrinks by one; needs >=3 devices (>=4 for an external-device section), sections a drive short are skipped. On by default; turn off to put every device in the scratch pool."
      default: true
    reboot_guest:
      title: Reboot Guest
      type: boolean
      description: "Reboot the guest once before the run and wait for it to come back (clears leaked kernel state, stuck D-state tasks). Off by default. (The per-section device wipe is separate — see Wipe Devices.)"
      default: false
    check:
      title: Check
      type: object
      description: The `./check` flags (verbatim), composed into `$XFSTESTS_CHECK_ARGS` (the per-section `-s` is supplied by the unit).
      default: {}
      order:
        - test_selection
        - groups
        - tests
        - exclude_group
        - exclude
        - edit_local_config
        - local_config
        - report
        - randomize
        - iterations
        - stop_on_fail
        - loop_on_fail
      properties:
        test_selection:
          title: Test selection
          type: string
          description: "Choose what each section runs: by xfstests **groups** (`-g`, e.g. `auto`/`quick`) or by an explicit **tests** list (e.g. `generic/001`). The two are mutually exclusive in `./check`'s typical use (a `-g` group and a positional testlist UNION, swamping the list), so pick one mode — the other field hides."
          default: groups
          enum:
            - groups
            - tests
        groups:
          title: Groups (-g)
          type: object
          format: dynmultiselect-list_groups
          showExpr: "fields.test_selection === 'groups'"
          description: "xfstests `./check -g group[,group...]`: include tests from these groups (multiple allowed, run as a union). Sourced from the selected guest's xfstests group registry (`doc/group-names.txt`). Empty falls back to each section's default set."
          default:
            - auto
        tests:
          title: Tests
          type: string
          showExpr: "fields.test_selection === 'tests'"
          description: "xfstests `./check [options] testlist`: the trailing positional testlist, space-separated (e.g. `generic/001 generic/002`)."
          default: ""
        exclude_group:
          title: Exclude Group (-x)
          type: string
          showExpr: "fields.test_selection === 'groups'"
          description: "xfstests `./check -x group[,group...]`: exclude tests from these groups (e.g. `dangerous`)."
          default: ""
        exclude:
          title: Exclude File (-X)
          type: string
          showExpr: "fields.test_selection === 'groups'"
          description: "xfstests `./check -X exclude_file`: exclude individual tests — a guest path to an expunge/exclude list."
          default: ""
        edit_local_config:
          title: Edit local.config
          type: boolean
          description: "Reveal the editable `local.config` below — hidden by default because it's the large full block/sector × feature matrix. Toggle on ONLY to edit/trim that config; leaving it off still uses the full matrix as the section set. Either way, **Sections** picks which sections actually run (empty = all)."
          default: false
        local_config:
          title: local.config
          type: string
          showExpr: "fields.edit_local_config === true"
          description: "The xfstests `local.config` (README.config-sections), one `[section]` per profile — edit it to add/remove sections or tweak `MKFS_OPTIONS`/`MOUNT_OPTIONS`. Device-agnostic: `render_config` injects `TEST_DEV`/`SCRATCH_DEV`/mount points per section. The top-level Sections dropdown lists what this declares."
          default: |
            [xfs_bs1k_ss512]
            FSTYP=xfs
            MKFS_OPTIONS="-b size=1024 -s size=512"

            [xfs_bs1k_ss1k]
            FSTYP=xfs
            MKFS_OPTIONS="-b size=1024 -s size=1024"

            [xfs_bs2k_ss512]
            FSTYP=xfs
