        report:
          title: Report (-R)
          type: string
          description: "xfstests `./check -R fmt[,fmt]`: generate report in formats specified. Supported formats: `xunit`, `xunit-quiet`. `xunit` writes `result.xml` under `RESULT_BASE/<section>`, which `collect` parses."
          default: xunit
        randomize:
          title: Randomize (-r)
          type: boolean
          description: "xfstests `./check -r`: randomize test order."
          default: false
        iterations:
          title: Iterations (-i/-I)
          type: integer
          description: "xfstests `./check -i <n>` (or `-I <n>` when Stop on Failure is on): iterate the test list <n> times — interleaved across passes, NOT each test n times in a row, so the xunit gets one `<testcase>` per test per pass. For flaky/regression confirmation. 1 = once (default)."
          default: 1
        stop_on_fail:
          title: Stop on Failure (-I)
          type: boolean
          description: "When Iterations > 1, iterate with xfstests `./check -I <n>` (iterate but STOP at the first test failure) instead of `-i <n>` (run all <n> passes). On by default. Turn off to run every pass regardless of failures. Distinct from and independent of Loop on Fail (-L), which reruns a FAILED test to measure flakiness; the two may be combined (xfstests stops iterating after the loop measurement)."
          default: true
        loop_on_fail:
          title: Loop on Fail (-L)
          type: integer
          description: "xfstests `./check -L <n>`: loop tests <n> times following a failure, measuring aggregate pass/fail metrics — the % goes to the journal/check.log, not the xunit. 0 = off (default)."
          default: 0
    service:
      title: Service
      type: object
      description: "Timeouts for the run: `wait`'s section polling (`timeout`/`poll_interval`), the per-test watchdog (`test_timeout`/`test_timeouts` — the unit is `TimeoutStartSec=infinity`, so a hung test would otherwise block forever), and the `reboot` step's post-reboot wait (`reboot_timeout`)."
      default: {}
      order:
        - timeout
        - poll_interval
        - stream_logs
        - test_timeout
        - test_timeouts
        - reboot_timeout
      properties:
        timeout:
          title: Section Timeout
          type: integer
          description: Seconds to poll a section's unit to a terminal state; on expiry `wait` aborts the section (`systemctl stop xfstests@<section>`).
          default: 86400
        poll_interval:
          title: Poll Interval
          type: integer
          description: Seconds between `wait`'s unit-status polls and log drains (and the `reboot` step's post-reboot polls when `Reboot Guest` is on).
          default: 15
        stream_logs:
          title: Stream Logs
          type: boolean
          description: "Each poll, print the guest's new unit + kernel journal (merged, from boot) into the job log, so progress and dmesg are visible live. Off = only a bounded tail at the end."
          default: true
        test_timeout:
          title: Per-test Timeout
          type: integer
          description: "Per-test watchdog (seconds): `check` sets it as each test's scope `RuntimeMaxSec`, so a hung test is killed and the run continues. 0 = no limit. Needs the patched xfstests (`TEST_TIMEOUT`)."
          default: 0
        test_timeouts:
          title: Per-test Timeout Overrides
          type: object
          description: 'Per-test overrides, mapping a test to seconds, e.g. {"generic/017": 900}. Empty = the global Per-test Timeout applies.'
          default: {}
        reboot_timeout:
          title: Reboot Timeout
          type: integer
          description: "Seconds to wait for the guest after a reboot before failing; raise it for a slow-booting guest. Used only when `Reboot Guest` is on."
          default: 300
  required:
    - vm_name
  x-windmill-dyn-select-lang: python3
  x-windmill-dyn-select-code: |
    import os
    import re
    from pathlib import Path


    def list_vms(filterText: str = "", **_: object) -> list:
        # All guests, from their render sidecars (the source f/qsu/bringup lists).
        d = Path(os.environ["WORKERS_DIR"]) / "shared/vm"
        vms = sorted(p.name.removesuffix(".vars.json") for p in d.glob("*.vars.json")) if d.is_dir() else []
        return [{"label": v, "value": v} for v in vms if filterText.lower() in v.lower()]


    _SECTION = re.compile(r"^\s*\[([^\]]+)\]")


    def list_sections(filterText: str = "", check: dict = None, **_: object) -> list:
        # Auto-discover the [section] names from the Check group's local.config textarea;
        # empty falls back to the full shipped XFS matrix. Re-runs as the field edits.
        cfg = ((check or {}).get("local_config") or "").strip()
        if not cfg:
            try:
                from f.fstests.common import xfs_catalog_text
                cfg = xfs_catalog_text()
            except Exception:
                return []
        names: list = []
        for line in cfg.splitlines():
            m = _SECTION.match(line)
            if m and m.group(1) not in names:
                names.append(m.group(1))
        return [{"label": s, "value": s} for s in names if filterText.lower() in s.lower()]


    def list_groups(vm_name: str = "", filterText: str = "", **_: object) -> list:
        # The guest's xfstests group registry (doc/group-names.txt), resolved from the
        # guest's closure in the local nix store — this dynselect runs on a DEFAULT
        # worker (no vsock to the guest) but mounts /nix and the reuse sidecars.
        # `groups` is nested under `check`, yet vm_name (a top-level input) reaches this
        # helper because the run form spreads root args into nested dynselect helpers.
        # Never raises — a missing vm_name/closure yields a small auto/quick fallback.
        try:
            from f.fstests.common import list_groups as _list_groups
            return _list_groups(vm_name, filterText)
        except Exception:
            return [
                {"label": "auto — run automatically (~5 min cap)", "value": "auto"},
                {"label": "quick — under 30s each", "value": "quick"},
            ]
