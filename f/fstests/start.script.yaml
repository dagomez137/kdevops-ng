summary: Start a section on a guest
description: |-
  Start `xfstests@<section>.service` on a booted guest over vsock-SSH with
  `--no-block`. The unit is `Type=oneshot`, so a blocking `start` would not
  return until the whole section finished (hours); `--no-block` returns
  immediately and `f/fstests/wait` polls for the outcome. After starting, reads
  back `ActiveState` and asserts it is `activating`/`active`, so a start that
  never took fails here.

  Returns `{vm, section, unit, active_state}`.
lock: '!inline f/fstests/start.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
    - section
  properties:
    section:
      type: string
      description: |-
        xfstests config-section name (the `[section]` header) to start as
        `xfstests@<section>.service`.
    vm_name:
      type: object
      description: Booted VM to start the xfstests section on, over vsock-SSH.
      format: dynselect-list_vms
      title: VM Name
  required:
    - vm_name
    - section
tag: vm
