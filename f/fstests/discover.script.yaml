summary: "xfstests: discover a booted guest's readiness over vsock-SSH"
description: |
  Reach a booted guest over vsock-SSH and report whether it is ready to run
  xfstests, and on what. Checks `systemctl --host <vm> is-system-running` is
  `running`/`degraded`, that `xfstests@.service` is installed and
  `/usr/lib/xfstests/check` is present, then enumerates the NVMe data disks
  (`/dev/nvme*n1`) and the kernel's supported filesystems (`/proc/filesystems`).

  Returns `{vm, host, booted, fstests_ready, devices, fstyp_supported}`. Two NVMe
  disks are the minimum (TEST + SCRATCH); a btrfs pool wants four — surfaced, not
  hard-failed. Fails fast with a clear message if the guest is not xfstests-ready.
  Read-only; mutates nothing on the guest.
kind: script
tag: vm
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
  properties:
    vm_name:
      title: VM Name
      type: object
      description: Booted VM to probe over vsock-SSH for xfstests readiness.
      format: dynselect-list_vms
  required:
    - vm_name
