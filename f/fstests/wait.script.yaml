summary: Wait for a section to finish
description: |-
  Poll `xfstests@<section>.service` on a booted guest over vsock-SSH until its
  `ActiveState` settles to `inactive` (the `Type=oneshot` success terminus) or
  `failed`, or the timeout elapses. The outcome is read from `Result` (systemd's
  enum: `success`/`exit-code`/`signal`/`core-dump`/`timeout`/...) and
  `ExecMainStatus` (the `./check` exit code, 0 = all passed).

  Each poll also crash-checks the host: if `qemu-system@<vm>.service` (the host
  `systemd --user` unit running QEMU) has gone `failed`, the guest panicked;
  polling stops and `crashed` is set. On completion a bounded tail of the
  guest's unit journal is dumped to the job log.

  Returns `{vm, section, result, exec_status, active_state, crashed,
  timed_out}`.
lock: '!inline f/fstests/wait.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
    - section
    - timeout
    - poll_interval
  properties:
    poll_interval:
      type: integer
      description: |-
        Seconds between polls of the unit's `ActiveState` (and the host crash
        check).
      default: 15
    section:
      type: string
      description: |-
        xfstests config-section name (the `[section]` header) whose
        `xfstests@<section>.service` to poll.
    timeout:
      type: integer
      description: |-
        Maximum seconds to wait for the section to finish before giving up
        (`timed_out`).
      default: 86400
    vm_name:
      type: object
      description: Booted VM whose xfstests section to wait on, over vsock-SSH.
      format: dynselect-list_vms
      title: VM Name
  required:
    - vm_name
    - section
tag: vm
