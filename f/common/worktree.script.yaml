summary: "Shared helper: prepare this worker's warm main worktree off the Bare"
description: |
  Library module imported by the build-prepare steps
  (`from f.common.worktree import prepare`). Not a runnable step on its own.
  `prepare()` lays down one warm, detached `main` worktree per (worker, namespace)
  off the durable Bare at `$SYSTEM_DIR/bare/<namespace>/<canonical>.git`,
  refreshing upstream refs into the Bare first, and can apply a lore series on top
  via `b4 shazam`. Used by `f/kernel/prepare_worktree` and `f/qemu/prepare_worktree`.
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order: []
  properties: {}
  required: []
