summary: "Shared helper: prepare this worker's warm main worktree off the Bare"
description: |-
  Library module imported by the build-prepare steps (`from f.common.worktree
  import prepare`). Not a runnable step on its own. `prepare()` lays down one
  detached worktree of a project off the durable Bare at
  `$SYSTEM_DIR/bare/<project>.git`. A worker build resolves its warm `main`
  worktree under its sandbox (`workers/<WORKER_INDEX>/<project>/main`); a
  developer worktree resolves under `<workbench>/<worktree-group>/<project>`
  (default group `vanilla`; `system` and `workers` are reserved). It refreshes
  upstream refs into the Bare first, and can apply a lore series on top via `b4
  shazam`. Used by `f/kernel/prepare_worktree`, `f/qemu/prepare_worktree`, and
  `f/workbench/worktree/init`.
lock: '!inline f/common/worktree.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order: []
  properties: {}
  required: []
