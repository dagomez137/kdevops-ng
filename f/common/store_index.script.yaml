summary: Inspect and prune the build catalog
description: |-
  Read and maintain the build Store's catalog: the
  `SYSTEM_DIR/store-index/` symlinks (`kernel-<release>`,
  `kernel-devel-<release>`, `qemu-<identity>`) that point at each published
  identity's Nix store path and double as its GC root. `list` shows the local
  catalog (and a peer's when `remote`/`remote_index` are set) with sizes and
  validity; `inspect` reports the selected identities; `forget` drops their GC
  roots so `nix store gc` can reclaim them (needs `confirm`); `prune` drops
  every entry whose store path was already collected.
lock: '!inline f/common/store_index.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - action
    - names
    - remote
    - remote_index
    - confirm
  properties:
    action:
      type: string
      description: What to do with the catalog.
      default: list
      enum:
        - list
        - inspect
        - forget
        - prune
    names:
      type: object
      format: dynmultiselect-list_catalog
      title: Catalog Entries
      default: []
      description: |-
        The catalog entries to act on (required for `inspect` and `forget`).
        `forget` removes every selected entry at once. The dropdown lists the
        live entries (`kernel-`, `kernel-devel-`, `qemu-`); values are the plain
        entry names, so a script may still pass any names. The single `name`
        string is also accepted, so earlier callers keep working.
    confirm:
      type: boolean
      description: "Required for `forget`: removing an identity's GC root."
      default: false
    remote:
      type: string
      description: |-
        SSH host of a peer whose catalog to also list / inspect against. Empty
        stays local.
      default: ''
    remote_index:
      type: string
      description: |-
        The peer's `store-index` directory, read over ssh. Empty stays local.
      default: ''
  required: []
