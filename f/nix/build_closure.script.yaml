summary: Build the imageless closure and read bootspec
description: |-
  Build the imageless NixOS system closure (`nix build
  path:<config_dir>#toplevel --out-link <config_dir>/result`) and read its
  standard NixOS bootspec (RFC-0125) from `<toplevel>/boot.json`.

  Returns the `toplevel` store path plus `init` and `initrd` (from
  `org.nixos.bootspec.v1`): the boot artefacts a VM needs. Reads `config_dir`
  from a prior `render_config`/`lock_config` step.
lock: '!inline f/nix/build_closure.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - config_dir
  properties:
    config_dir:
      type: string
      description: Per-VM config directory (from render_config).
  required:
    - config_dir
