summary: Lock a per-VM imageless config
description: |-
  Materialise `flake.lock` for a per-VM imageless config so the closure builds
  reproducibly: `nix flake lock path:<config_dir>` pins the vendored
  `nixos-flake` path input (nixpkgs follows it). The `path:` flakeref copies the
  whole config dir into the store, so the files do not need to be git-tracked.

  Set `update` to re-pin the vendored nixos-flake after it has changed (`nix
  flake update --flake path:<config_dir> nixos-flake`). Reads `config_dir` from
  a prior `render_config` step.
lock: '!inline f/nix/lock_config.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - config_dir
    - update
  properties:
    config_dir:
      type: string
      description: Per-VM config directory (from render_config).
    update:
      type: boolean
      description: |-
        Refresh the nixos-flake input pin instead of only filling missing lock
        entries.
      default: false
  required:
    - config_dir
