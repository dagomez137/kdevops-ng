summary: "Workbench: create a developer worktree of a project"
description: |
  Create or refresh a developer's own worktree of a project within a
  worktree-group. Thin wrapper over `f/common/worktree` with `developer=True`. The
  worktree lands at `<workbench>/<worktree_group>/<project>` (default group
  `vanilla`), a plain detached checkout cut from the durable Bare at
  `$SYSTEM_DIR/bare/<project>.git`, which borrows the local mirror's objects so the
  checkout is cheap and shares the workers' object graph. `system` and `workers` are
  reserved group names. A developer worktree is a plain checkout (no out-of-tree
  `build` or `destdir`); reuse it across refs or pass `recreate_worktree` for a fresh
  one, and apply a lore series on top with `b4_series`.

  Returns `project`, `worktree_group`, `developer`, `ref`, `commit`, `worktree`,
  `b4_series`, and `b4_branch` (the `b4/<slug>` branch published to the Bare when
  `b4_series` is set, else null).
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - project
    - git_ref
    - worktree_group
    - b4_series
    - recreate_worktree
  properties:
    project:
      title: Project
      type: string
      description: Project to check out (the Bare name, e.g. linux or qemu).
    git_ref:
      type: string
      description: Branch, tag or commit in the Bare to check out (a tag, an upstream ref via the mirror, or a developer branch).
    worktree_group:
      title: Worktree group
      type: string
      description: Worktree-group this checkout belongs to (default vanilla; system/workers are reserved).
      default: vanilla
    b4_series:
      title: b4 Series
      type: string
      description: Optional lore series (message-id/URL) to apply on top via `b4 shazam`.
      default: ""
    recreate_worktree:
      title: Recreate Worktree
      type: boolean
      description: Lay a fresh detached checkout (rm the existing worktree first) instead of reusing it. Default off keeps the existing tree.
      default: false
  required:
    - project
    - git_ref
