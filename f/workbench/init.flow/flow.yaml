summary: Initialize the workbench
description: |-
  One-time (idempotent) bootstrap, run from the UI after Windmill is up.
  Provisions the durable Bares (default `$SYSTEM_DIR/bare/linux.git` and
  `$SYSTEM_DIR/bare/qemu.git`) that every worker cuts cheap detached worktrees
  off (`f/kernel/build`, `f/qemu/build`). Each Bare tracks its real upstream but
  borrows objects from the local mirror (`$MIRRORS_DIR`), and keeps
  `refs/heads/*` for developer pushes. Thin flow over `f/workbench/fetch`: pick
  the projects and their deploy options; re-run it any time to refresh.

  Also provisions the kdevops-managed VM SSH key (`f/workbench/ssh_key`): one
  keypair under `$SYSTEM_DIR/ssh/` that every guest trusts, so after a one-time
  `Include` line in `~/.ssh/config` a plain `ssh <vm>` works. Returns that line.

  Finally provisions the mirror refresh timers (`f/workbench/mirror`): a
  `git-mirror@<repo>.{service,timer}` per mirror under `$SYSTEM_DIR/mirror`,
  force-refreshing each from upstream on a self-pacing loop.
value:
  modules:
    - id: fetch
      summary: Clone/refresh the shared sources
      value:
        type: script
        input_transforms:
          linux:
            type: javascript
            expr: flow_input.linux
          peers:
            type: javascript
            expr: flow_input.peers
          projects:
            type: javascript
            expr: flow_input.projects
          qemu:
            type: javascript
            expr: flow_input.qemu
          refresh:
            type: javascript
            expr: flow_input.refresh
        path: f/workbench/fetch
    - id: ssh_key
      summary: Provision the VM SSH key + host ssh-config
      value:
        type: script
        input_transforms:
          regenerate:
            type: javascript
            expr: flow_input.regenerate_ssh_key
        path: f/workbench/ssh_key
      skip_if:
        expr: flow_input.setup_ssh === false
    - id: mirror
      summary: Provision the git-mirror refresh timers
      value:
        type: script
        input_transforms:
          linux:
            type: javascript
            expr: flow_input.linux
          projects:
            type: javascript
            expr: flow_input.projects
          qemu:
            type: javascript
            expr: flow_input.qemu
        path: f/workbench/mirror
        tag_override: vm
      skip_if:
        expr: flow_input.setup_mirrors === false
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - projects
    - linux
    - qemu
    - peers
    - refresh
    - setup_ssh
    - regenerate_ssh_key
    - setup_mirrors
  properties:
    linux:
      type: object
      description: How to deploy and refresh the Linux kernel mirror.
      default: {}
      order:
        - trees
        - source
        - protocol
        - on_boot
        - on_inactive
      properties:
        trees:
          type: array
          description: |-
            Trees to integrate into the merged linux.git as remotes (torvalds is
            always the base).
          default:
            - torvalds
            - linux-next
            - linux-stable
            - modules
            - axboe
          items:
            type: string
            enum:
              - torvalds
              - linux-next
              - linux-stable
              - linux-stable-rc
              - modules
              - mcgrof
              - mcgrof-next
              - axboe
              - vfs
              - cel
              - jlayton
              - cxl
              - xfs
          title: Trees
        source:
          type: string
          description: |-
            Upstream host: kernel.org (the canonical source) or googlesource
            (the Google read-only mirror, for when kernel.org is unreachable).
          default: kernel.org
          enum:
            - kernel.org
            - googlesource
          title: Source
        protocol:
          type: string
          description: |-
            Transport to git.kernel.org: https (the safe default) or git
            (faster, but often firewalled).
          default: https
          enum:
            - https
            - git
          showExpr: fields.source !== 'googlesource'
          title: Transport
        on_boot:
          type: string
          description: |-
            First refresh this long after boot (systemd `OnBootSec`, e.g. `10m`,
            `1h`).
          default: 10m
          title: On Boot
        on_inactive:
          type: string
          description: |-
            Next refresh this long after the previous one finishes (systemd
            `OnUnitInactiveSec`).
          default: 10m
          title: On Inactive
      showExpr: fields.projects.includes('linux')
      title: Linux
    peers:
      type: array
      description: |-
        Other workbench hosts to add as <peer> remotes on each Bare, for
        cross-host dev branches (`git push <peer> <branch>`) and
        prebuilt-identity fetch from their store-index. List peer hosts, not
        self; empty = single-host.
      default: []
      items:
        type: object
        order:
          - host
          - store_index
        properties:
          host:
            type: string
            description: |-
              SSH host alias of the peer workbench host.
            title: SSH Host
          store_index:
            type: string
            description: |-
              The peer's `WORKERS_DIR/shared/store-index` directory, read over
              ssh to resolve a prebuilt build identity. The default assumes the
              peer uses the default build-area layout.
            default: ~/.local/state/windmill/workbench/workers/shared/store-index
            title: Store Index Dir
        required:
          - host
    projects:
      type: array
      description: |-
        Which projects to mirror, each its own merged bare under `MIRRORS_DIR`.
        Selecting one reveals its deploy options below.
      default:
        - linux
        - qemu
      items:
        type: string
        enum:
          - linux
          - qemu
      title: Projects
    qemu:
      type: object
      description: How to deploy and refresh the QEMU mirror.
      default: {}
      order:
        - source
        - protocol
        - on_boot
        - on_inactive
      properties:
        source:
          type: string
          description: |-
            Upstream host: GitLab (the canonical QEMU project repo) or GitHub
            (its read-only mirror, for when GitLab is unreachable).
          default: GitLab
          enum:
            - GitLab
            - GitHub
          title: Source
        protocol:
          type: string
          description: |-
            Transport to GitLab: https (the safe default) or git (faster, but
            often firewalled).
          default: https
          enum:
            - https
            - git
          showExpr: fields.source !== 'GitHub'
          title: Transport
        on_boot:
          type: string
          description: |-
            First refresh this long after boot (systemd `OnBootSec`, e.g. `10m`,
            `1h`).
          default: 10m
          title: On Boot
        on_inactive:
          type: string
          description: |-
            Next refresh this long after the previous one finishes (systemd
            `OnUnitInactiveSec`).
          default: 10m
          title: On Inactive
      showExpr: fields.projects.includes('qemu')
      title: QEMU
    refresh:
      type: boolean
      description: Fetch new refs/tags on already-present Bares (default on).
      default: true
    regenerate_ssh_key:
      type: boolean
      description: |-
        Force a fresh VM keypair even if one exists. Invalidates the authorized
        key already baked into every built closure; rebuild closures after.
      default: false
      title: Regenerate SSH Key
    setup_mirrors:
      type: boolean
      description: |-
        Install + enable the `git-mirror@<repo>` refresh timers for the mirrors
        under `$SYSTEM_DIR/mirror` (default on). Off = skip; existing timers
        untouched.
      default: true
      title: Setup Mirrors
    setup_ssh:
      type: boolean
      description: |-
        Provision the kdevops-managed VM SSH key + `~/.ssh`-includable config
        (default on). Off = skip; existing key untouched.
      default: true
      title: Setup SSH
  required: []
