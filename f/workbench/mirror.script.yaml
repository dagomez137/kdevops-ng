summary: Provision git-mirror refresh timers
description: |-
  Install the `git-mirror@.{service,timer}` template pair into the host `systemd
  --user` manager and enable one instance per mirror repo, so each local
  `MIRRORS_DIR/<repo>.git` is force-refreshed from its upstream `origin` (`git
  remote update --prune`) on a self-pacing loop: `OnBootSec` after boot, then
  `OnUnitInactiveSec` after each run finishes. Each project sets its own cadence
  through a per-instance `.timer.d` drop-in, so instances pace and fail
  independently (a slow `linux` fetch never delays `qemu`).

  `git` is the flake's own (a stable gc-rooted path), so the host unit needs
  nothing on PATH. A repo with no mirror on disk is skipped, not enabled. Runs
  on a `vm` worker (it drives the host user manager over the user bus, like the
  qsu steps).

  Returns the enabled/skipped repos and the resolved git + mirror dir. Check
  with `systemctl --user list-timers 'git-mirror@*'`.
lock: '!inline f/workbench/mirror.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - projects
    - linux
    - qemu
  properties:
    projects:
      type: array
      description: |-
        Which projects to mirror, each its own merged bare under `MIRRORS_DIR`.
        Selecting one reveals its deploy options below.
      default:
        - linux
        - qemu
      items:
        type: string
        enum:
          - linux
          - qemu
      title: Projects
    linux:
      type: object
      description: How to deploy and refresh the Linux kernel mirror.
      default: {}
      order:
        - trees
        - source
        - protocol
        - on_boot
        - on_inactive
      properties:
        trees:
          type: array
          description: |-
            Trees to integrate into the merged linux.git as remotes (torvalds is
            always the base).
          default:
            - torvalds
            - linux-next
            - linux-stable
            - modules
            - axboe
          items:
            type: string
            enum:
              - torvalds
              - linux-next
              - linux-stable
              - linux-stable-rc
              - modules
              - mcgrof
              - mcgrof-next
              - axboe
              - vfs
              - cel
              - jlayton
              - cxl
              - xfs
          title: Trees
        source:
          type: string
          description: |-
            Upstream host: kernel.org (the canonical source) or googlesource
            (the Google read-only mirror, for when kernel.org is unreachable).
          default: kernel.org
          enum:
            - kernel.org
            - googlesource
          title: Source
        protocol:
          type: string
          description: |-
            Transport to git.kernel.org: https (the safe default) or git
            (faster, but often firewalled).
          default: https
          enum:
            - https
            - git
          showExpr: fields.source !== 'googlesource'
          title: Transport
        on_boot:
          type: string
          description: |-
            First refresh this long after boot (systemd `OnBootSec`, e.g. `10m`,
            `1h`).
          default: 10m
          title: On Boot
        on_inactive:
          type: string
          description: |-
            Next refresh this long after the previous one finishes (systemd
            `OnUnitInactiveSec`).
          default: 10m
          title: On Inactive
      showExpr: fields.projects.includes('linux')
      title: Linux
    qemu:
      type: object
      description: How to deploy and refresh the QEMU mirror.
      default: {}
      order:
        - source
        - protocol
        - on_boot
        - on_inactive
      properties:
        source:
          type: string
          description: |-
            Upstream host: GitLab (the canonical QEMU project repo) or GitHub
            (its read-only mirror, for when GitLab is unreachable).
          default: GitLab
          enum:
            - GitLab
            - GitHub
          title: Source
        protocol:
          type: string
          description: |-
            Transport to GitLab: https (the safe default) or git (faster, but
            often firewalled).
          default: https
          enum:
            - https
            - git
          showExpr: fields.source !== 'GitHub'
          title: Transport
        on_boot:
          type: string
          description: |-
            First refresh this long after boot (systemd `OnBootSec`, e.g. `10m`,
            `1h`).
          default: 10m
          title: On Boot
        on_inactive:
          type: string
          description: |-
            Next refresh this long after the previous one finishes (systemd
            `OnUnitInactiveSec`).
          default: 10m
          title: On Inactive
      showExpr: fields.projects.includes('qemu')
      title: QEMU
  required: []
tag: vm
