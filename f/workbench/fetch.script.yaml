summary: "Workbench fetch: provision the durable Bare repos from local mirrors"
description: |
  Provision the durable **Bare** main repos every build worktree is cut from. Each
  Bare at `WORKERS_DIR/system/bare/<namespace>/<canonical>.git` is a `git init --bare`
  repo that **borrows** the local bare **mirror**'s objects via its alternates file (no
  objects copied, no upstream network). A `mirror` remote fetches the mirror's heads
  into `refs/remotes/mirror/*`; `refs/heads/*` is left empty, reserved for developer
  pushes. `origin`'s URL is set to the **preferred upstream** for an explicit
  `git fetch origin` (ADR-0001: the Bare is the working repo).

  `upstreams` is a **list** of candidate clone URLs (git / https / googlesource /
  github) — the first is preferred. Many servers block `git://`, so for a kernel.org
  mirror the list auto-derives `https://git.kernel.org/…` then
  `https://kernel.googlesource.com/…` then the raw `git://…`; set `upstreams` (or the
  single `upstream`) explicitly to add e.g. a github URL. Idempotent.

  An entry may carry extra `remotes` — each its own upstream, borrowing objects from
  its own local mirror and fetched into `refs/remotes/<name>/*` (the default kernel
  Bare carries `linux-next`, `linux-stable`, `linux-modules`); works on preexisting
  Bares too (alternates are reconciled).

  Returns a manifest of each Bare (`bare`, `upstreams`, `origin`, `action`, `head`,
  `remotes`).
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - mirrors
    - peers
    - refresh
  properties:
    mirrors:
      type: array
      description: Mirrors to provision Bares from. Empty = the built-in kernel + QEMU defaults.
      default:
        - name: kernel
          mirror: /mirror/linux.git
          namespace: kernel
          canonical: linux
          remotes:
            - name: linux-next
              mirror: /mirror/linux-next.git
            - name: linux-stable
              mirror: /mirror/linux-stable.git
            - name: linux-modules
              mirror: /mirror/linux-modules.git
        - name: qemu
          mirror: /mirror/qemu.git
          namespace: qemu-project
          canonical: qemu
      items:
        type: object
        properties:
          name:
            type: string
            description: Short label for the mirror (used in the log/manifest).
          mirror:
            type: string
            description: Local bare mirror to borrow objects from (e.g. /mirror/linux.git).
          namespace:
            type: string
            description: Project-namespace for the Bare (e.g. kernel, qemu-project) — never equal to the canonical name.
          canonical:
            type: string
            description: Upstream source-directory name (e.g. linux, qemu). The Bare lives at system/bare/<namespace>/<canonical>.git.
          upstreams:
            type: array
            description: Candidate upstream URLs, preferred first (git/https/googlesource/github). Empty = auto-derive https/googlesource/git from the mirror's origin.
            items:
              type: string
          upstream:
            type: string
            description: Single upstream URL (back-compat shorthand for a one-item upstreams list).
          remotes:
            type: array
            description: Extra remotes, each borrowing objects from its own local mirror.
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Remote name (e.g. linux-next).
                mirror:
                  type: string
                  description: Local bare mirror to borrow objects from.
                upstreams:
                  type: array
                  description: Candidate upstream URLs for this remote, preferred first. Empty = auto-derive.
                  items:
                    type: string
                upstream:
                  type: string
                  description: Single upstream URL (back-compat shorthand).
              required:
                - name
                - mirror
        required:
          - name
          - mirror
          - namespace
          - canonical
    peers:
      type: array
      description: "ssh-host aliases of other workbench hosts. Each becomes a <peer> remote on every Bare (ssh://<peer>/<WORKERS_DIR>/system/bare/<ns>/<canonical>.git, same layout), so a developer can `git push <peer> <branch>` a dev branch cross-host for that host's worker to build. List peer hosts, not self; empty = single-host."
      default: []
      items:
        type: string
    refresh:
      type: boolean
      description: Fetch new refs/tags on already-present Bares (default on). Off = create-if-absent only.
      default: true
  required: []
