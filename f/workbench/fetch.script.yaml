summary: Provision the Bare repos from mirrors
description: |-
  Provision the durable **Bare** main repos every build worktree is cut from,
  one per selected mirror **project** (`linux`, `qemu`). Each Bare at
  `SYSTEM_DIR/bare/<project>.git` is a `git init --bare` repo that **borrows**
  the local merged **mirror**'s objects via its alternates file (no objects
  copied, no upstream network). A `mirror` remote copies the mirror's heads into
  `refs/remotes/mirror/*` and each extra tree through unchanged; `refs/heads/*`
  is left empty, reserved for developer pushes. `origin`'s URL is the project's
  primary upstream, for an explicit `git fetch origin` (ADR-0001: the Bare is
  the working repo).

  Pick the projects to mirror, then each one's deploy options in its own group:
  for `linux`, the curated **Trees** to integrate into the merged linux.git plus
  a **Source** host and **Transport**; for `qemu`, a **Source** host and
  **Transport**. `peers` lists other workbench hosts to wire as cross-host push
  remotes. Idempotent.

  Returns a manifest of each Bare (`bare`, `origin`, `trees`, `action`, `head`,
  `peers`).
lock: '!inline f/workbench/fetch.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - projects
    - linux
    - qemu
    - peers
    - refresh
  properties:
    projects:
      type: array
      description: |-
        Which projects to mirror, each its own merged bare under `MIRRORS_DIR`.
        Selecting one reveals its deploy options below.
      default:
        - linux
        - qemu
      items:
        type: string
        enum:
          - linux
          - qemu
      title: Projects
    linux:
      type: object
      description: How to deploy the Linux kernel mirror.
      default: {}
      order:
        - trees
        - source
        - protocol
      properties:
        trees:
          type: array
          description: |-
            Trees to integrate into the merged linux.git as remotes (torvalds is
            always the base).
          default:
            - torvalds
            - linux-next
            - linux-stable
            - modules
            - axboe
          items:
            type: string
            enum:
              - torvalds
              - linux-next
              - linux-stable
              - linux-stable-rc
              - modules
              - mcgrof
              - mcgrof-next
              - axboe
              - vfs
              - cel
              - jlayton
              - cxl
              - xfs
          title: Trees
        source:
          type: string
          description: |-
            Upstream host: kernel.org (the canonical source) or googlesource
            (the Google read-only mirror, for when kernel.org is unreachable).
          default: kernel.org
          enum:
            - kernel.org
            - googlesource
          title: Source
        protocol:
          type: string
          description: |-
            Transport to git.kernel.org: https (the safe default) or git
            (faster, but often firewalled).
          default: https
          enum:
            - https
            - git
          showExpr: fields.source !== 'googlesource'
          title: Transport
      showExpr: fields.projects.includes('linux')
      title: Linux
    qemu:
      type: object
      description: How to deploy the QEMU mirror.
      default: {}
      order:
        - source
        - protocol
      properties:
        source:
          type: string
          description: |-
            Upstream host: GitLab (the canonical QEMU project repo) or GitHub
            (its read-only mirror, for when GitLab is unreachable).
          default: gitlab
          format: dynselect-list_qemu_sources
          title: Source
        protocol:
          type: string
          description: |-
            Transport to GitLab: https (the safe default) or git (faster, but
            often firewalled).
          default: https
          enum:
            - https
            - git
          showExpr: fields.source !== 'github'
          title: Transport
      showExpr: fields.projects.includes('qemu')
      title: QEMU
    peers:
      type: array
      description: |-
        Other workbench hosts. Each host becomes a <peer> remote on every Bare
        (ssh://<peer>/<SYSTEM_DIR>/bare/<project>.git, same layout), so a
        developer can `git push <peer> <branch>` a dev branch cross-host for
        that host's worker to build, and its store-index lets a build fetch a
        prebuilt identity from it. List peer hosts, not self; empty =
        single-host.
      default: []
      items:
        type: object
        order:
          - host
          - store_index
        properties:
          host:
            type: string
            description: |-
              SSH host alias of the peer workbench host.
            title: SSH Host
          store_index:
            type: string
            description: |-
              The peer's `SYSTEM_DIR/store-index` directory, read over ssh to
              resolve a prebuilt build identity. The default assumes the peer
              uses the default build-area layout.
            default: ~/.local/state/windmill/workbench/system/store-index
            title: Store Index Dir
        required:
          - host
    refresh:
      type: boolean
      description: |-
        Fetch new refs/tags on already-present Bares (default on). Off =
        create-if-absent only.
      default: true
  required: []
