summary: 'Workbench: provision the VM SSH key + host ssh-config'
description: >
  Provision the kdevops-managed VM SSH key under `SYSTEM_DIR/ssh/` and the

  `~/.ssh`-includable `config`. One ed25519 keypair is the access credential for

  every imageless guest: `f/nix/render_config` bakes the public key into each

  closure's `authorizedKeys` and `f/qsu/boot` writes a per-VM
  `config.d/<vm>.conf`,

  so after a one-time `Include` line in `~/.ssh/config` a plain `ssh <vm>`
  reaches

  the guest over vsock with this key: no operator-managed key.


  Idempotent: keeps an existing key (set `regenerate` to force a new one, which

  invalidates the key already baked into every built closure). Returns the key

  paths, the authorized public key, and the `Include` line to add.
lock: '!inline f/workbench/ssh_key.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - regenerate
  properties:
    regenerate:
      type: boolean
      description: Force a fresh keypair even if one exists. Invalidates the
        authorized key already baked into every built closure; rebuild closures
        after.
      default: false
      title: Regenerate
  required: []
