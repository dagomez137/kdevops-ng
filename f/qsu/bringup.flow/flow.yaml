summary: Bring up a VM
description: 'Build and/or reuse a kernel, a NixOS closure and QEMU, then boot a VM from them. Each artifact component has a mode: kernel/closure are build|reuse, QEMU is build|reuse|nixpkgs. `build` runs that build subflow; kernel/QEMU `reuse` picks a published artifact from this host''s Nix-store index; closure `reuse` replays the init/initrd a refreshed VM recorded; QEMU `nixpkgs` boots the store QEMU. The final VM group is the target: a new VM, or refresh a deployed one in place (boot restarts it with the new render). Source and target are orthogonal: pick a new store kernel AND refresh an existing VM with it. Generated by scripts/gen-bringup.py from the subflows; do not hand-edit.'
value:
  modules:
  - id: resolve
    summary: Resolve reuse artifacts + host operator (f/qsu/resolve)
    value:
      type: script
      path: f/qsu/resolve
      input_transforms:
        kernel_index:
          type: javascript
          expr: 'flow_input.kernel?.mode === "reuse" ? (flow_input.kernel?.kernel_pick || "") : ""'
        qemu_index:
          type: javascript
          expr: 'flow_input.qemu?.mode === "reuse" ? (flow_input.qemu?.qemu_pick || "") : ""'
        closure_reuse:
          type: javascript
          expr: flow_input.closure?.mode === "reuse"
        vm_name:
          type: javascript
          expr: 'flow_input.vm?.vm_target === "refresh" ? flow_input.vm?.refresh_vm : flow_input.vm?.vm_name'
  - id: build_kernel
    summary: Build the kernel (f/kernel/build)
    skip_if:
      expr: flow_input.kernel?.mode !== "build"
    value:
      type: flow
      path: f/kernel/build
      input_transforms:
        worktree:
          type: javascript
          expr: flow_input.kernel?.worktree
        configuration:
          type: javascript
          expr: flow_input.kernel?.configuration
        build:
          type: javascript
          expr: flow_input.kernel?.build
        devtools:
          type: javascript
          expr: flow_input.kernel?.devtools
        installation:
          type: javascript
          expr: flow_input.kernel?.installation
        prebuilt:
          type: javascript
          expr: flow_input.kernel?.prebuilt
  - id: build_nix
    summary: Build the NixOS closure (f/nix/build)
    skip_if:
      expr: flow_input.closure?.mode !== "build"
    value:
      type: flow
      path: f/nix/build
      input_transforms:
        guest:
          type: javascript
          expr: '({...flow_input.closure?.guest, vm_name: (flow_input.closure?.guest?.vm_name || (flow_input.vm?.vm_target === "refresh" ? flow_input.vm?.refresh_vm : flow_input.vm?.vm_name)), home_dir: ((flow_input.closure?.guest?.home_dir || "").trim() || ("/home/" + (results.resolve?.host_user || "kdevops")))})'
        closure:
          type: javascript
          expr: '({...flow_input.closure?.closure, test_suites: flow_input.closure?.closure?.test_suites ?? []})'
        lock:
          type: javascript
          expr: flow_input.closure?.lock
  - id: build_qemu
    summary: Build QEMU (f/qemu/build)
    skip_if:
      expr: flow_input.qemu?.mode !== "build"
    value:
      type: flow
      path: f/qemu/build
      input_transforms:
        worktree:
          type: javascript
          expr: flow_input.qemu?.worktree
        configuration:
          type: javascript
          expr: flow_input.qemu?.configuration
        build:
          type: javascript
          expr: flow_input.qemu?.build
        devtools:
          type: javascript
          expr: flow_input.qemu?.devtools
        installation:
          type: javascript
          expr: flow_input.qemu?.installation
        prebuilt:
          type: javascript
          expr: flow_input.qemu?.prebuilt
  - id: boot
    summary: Render + boot the VM (f/qsu/boot)
    value:
      type: flow
      path: f/qsu/boot
      input_transforms:
        vm:
          type: javascript
          expr: '({vm_name: (flow_input.vm?.vm_target === "refresh" ? flow_input.vm?.refresh_vm : flow_input.vm?.vm_name), auto_vm_name: (flow_input.vm?.vm_target === "refresh" ? false : flow_input.vm?.auto_vm_name)})'
        networking:
          type: javascript
          expr: flow_input.boot_networking
        nvme:
          type: javascript
          expr: flow_input.boot_nvme
        orchestration:
          type: javascript
          expr: flow_input.boot_orchestration
        qemu:
          type: javascript
          expr: '({...flow_input.boot_qemu, qemu_source: (flow_input.qemu?.mode === "build" || flow_input.qemu?.mode === "reuse") ? "qemu-build" : "nixpkgs", qemu_binary: flow_input.qemu?.mode === "build" ? results.build_qemu?.qemu_binary : (flow_input.qemu?.mode === "reuse" ? results.resolve?.qemu_binary : null)})'
        sharing:
          type: javascript
          expr: '(flow_input.closure?.mode === "reuse" && results.resolve?.sharing && Object.keys(results.resolve.sharing).length > 0 ? ({ ...results.resolve.sharing, ...flow_input.boot_sharing }) : ({ ...flow_input.boot_sharing, fstests: (flow_input.closure?.closure?.test_suites || []).includes("fstests"), home_share: (flow_input.closure?.guest?.home === true), home_share_readwrite: (flow_input.closure?.guest?.home === true) }))'
        kernel_boot:
          type: javascript
          expr: '({kernel: flow_input.kernel?.mode === "build" ? results.build_kernel : results.resolve?.kernel, closure: flow_input.closure?.mode === "build" ? results.build_nix : results.resolve?.closure})'
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  x-windmill-dyn-select-code: "import os\nfrom pathlib import Path\n\n\ndef list_kernel_index(filterText: str = \"\", **_: object) -> list:\n    from f.common import store\n\n    return [\n        {\"label\": n, \"value\": n}\n        for n in store.list_index(\"kernel-\")\n        if not n.startswith(\"kernel-devel-\") and filterText.lower() in n.lower()\n    ]\n\n\ndef list_qemu_index(filterText: str = \"\", **_: object) -> list:\n    from f.common import store\n\n    return [\n        {\"label\": n, \"value\": n}\n        for n in store.list_index(\"qemu-\")\n        if filterText.lower() in n.lower()\n    ]\n\n\ndef list_deployed_vms(filterText: str = \"\", **_: object) -> list:\n    d = Path(os.environ[\"WORKERS_DIR\"]) / \"shared/vm\"\n    vms = sorted(p.name.removesuffix(\".vars.json\") for p in d.glob(\"*.vars.json\")) if d.is_dir() else []\n    return [{\"label\": v, \"value\": v} for v in vms if filterText.lower() in v.lower()]\n\n\ndef list_iommu(filterText: str = \"\", **_: object) -> list:\n    # Bringup boots a build/reuse/nixpkgs qemu, but only nixpkgs is guaranteed to\n    # exist at form-fill time (build runs later in the flow), so query it for the\n    # vIOMMU set. Device names are stable across qemu builds and the template\n    # constrains to the supported four regardless.\n    from f.qsu.binaries import iommu_options\n    return iommu_options({}, filterText)\n"
  x-windmill-dyn-select-lang: python3
  order:
  - kernel
  - closure
  - qemu
  - boot_qemu
  - boot_networking
  - boot_sharing
  - boot_nvme
  - boot_orchestration
  - vm
  properties:
    kernel:
      type: object
      title: Kernel
      default: {}
      order:
      - mode
      - kernel_pick
      - worktree
      - configuration
      - build
      - devtools
      - installation
      - prebuilt
      properties:
        mode:
          title: Kernel
          type: string
          description: '`build` runs `f/kernel/build`; `reuse` selects a built kernel (image + modules together) from this host''s Nix-store index. The initrd and kernel cmdline are not set here: they come from the closure.'
          default: build
          enum:
          - build
          - reuse
        kernel_pick:
          title: Reuse kernel
          type: string
          format: dynselect-list_kernel_index
          description: Built kernel run layer to boot (`kernel-<release>` in the store index, local or fetched from a peer).
          default: ''
          showExpr: fields.mode === "reuse"
        worktree:
          type: object
          description: Source ref, optional patch series, and warm-tree lifecycle.
          default: {}
          order:
          - git_ref
          - recreate_build_worktree
          - wipe_build
          - b4_series
          - deploy_developer_worktree
          - worktree_group
          - recreate_developer_worktree
          properties:
            b4_series:
              type: string
              description: 'Optional lore series (message-id/URL) to apply on top of the

                checkout via `b4 shazam`, published to the Bare as `b4/<slug>`.'
              default: ''
              title: b4 Series
            deploy_developer_worktree:
              type: boolean
              description: 'After the build, lay or refresh a developer group worktree under

                WORKTREES_DIR and fetch this build''s devel layer into it for clangd,

                rust-analyzer and GDB indexing. The build itself is unaffected by

                this toggle.'
              default: false
              title: Deploy Developer Worktree
            git_ref:
              type: string
              description: 'Branch, tag or commit in the Bare to build (a tag, an upstream ref

                via the mirror, or a developer branch).'
              default: v7.1-rc7
            recreate_build_worktree:
              type: boolean
              description: 'Re-cut the worker''s build-site checkout (rm the warm tree, its build

                dir and destdir too, first) instead of reusing it. This hits only

                the worker sandbox and never a developer worktree. Default off keeps

                the warm tree for incremental rebuilds.'
              default: false
              title: Recreate Build Worktree
            recreate_developer_worktree:
              type: boolean
              description: 'Re-cut the developer group worktree (rm the existing checkout first)

                instead of reusing it. This hits only the developer worktree and

                never the worker build site.'
              default: false
              showExpr: fields.deploy_developer_worktree === true
              title: Recreate Developer Worktree
            wipe_build:
              type: boolean
              description: 'Wipe the build dir before building (default off = incremental

                reuse). Hidden when Recreate Build Worktree is on, which already

                removes the build dir as a child of the worktree.'
              default: false
              showExpr: fields.recreate_build_worktree !== true
            worktree_group:
              type: string
              description: 'Developer group to deploy into, at WORKTREES_DIR/<group>/linux. Used

                only when Deploy Developer Worktree is on.'
              default: vanilla
              showExpr: fields.deploy_developer_worktree === true
              title: Developer Group
          title: Worktree
          showExpr: fields.mode === "build"
        configuration:
          type: object
          description: How the kernel `.config` is produced.
          default: {}
          order:
          - config_method
          - preset
          - defconfig
          - fragments
          - allnoconfig_base
          - build_identity
          properties:
            allnoconfig_base:
              type: boolean
              description: '[method=fragments] Default unset symbols to n (allnoconfig base) for

                a minimal, explicit config.'
              default: true
              showExpr: fields.config_method === 'fragments'
            build_identity:
              type: boolean
              description: 'Bake a hash of the build inputs (config, toolchain, make flags,

                source commit) into kernelrelease, so the image and modules install

                under a unique release and an identical build can be fetched or

                reused instead of rebuilt.'
              default: true
            config_method:
              type: string
              description: 'How to generate .config: preset (a predefined whole-kernel config),

                make (config goals), fragments (curated multiselect), or skip (reuse

                the .config already in the build dir).'
              default: preset
              enum:
              - preset
              - make
              - fragments
              - skip
            defconfig:
              type: array
              description: '[method=make] Config make goals, applied in order (defconfig,

                x86_64_defconfig, tinyconfig, ...). *.config fragments merge onto

                the base.'
              default:
              - defconfig
              items:
                type: string
                enum:
                - defconfig
                - x86_64_defconfig
                - i386_defconfig
                - alldefconfig
                - allyesconfig
                - allmodconfig
                - allnoconfig
                - tinyconfig
                - randconfig
                - kvm_guest.config
                - hardening.config
                - debug.config
                - rust.config
                - xen.config
                - nopm.config
              showExpr: fields.config_method === 'make'
            fragments:
              type: array
              description: '[method=fragments] Curated fragments to merge (canonical order

                applied; builtin/* go last).'
              default:
              - core/64bit.config
              - core/modules.config
              - core/core.config
              - core/systemd.config
              - core/initrd.config
              - core/localversion-noauto.config
              - core/acpi-poweroff.config
              - core/boot-config.config
              - core/iommu-pci.config
              - core/vfio.config
              - core/cgroup-extras.config
              - arch/x86_64.config
              - mem/damon.config
              - security/security.config
              - security/crypto-core.config
              - security/ebpf.config
              - security/lsm-modules.config
              - fs/ext4.config
              - fs/xfs.config
              - fs/xfs-advanced.config
              - fs/xfs-debug.config
              - fs/overlayfs.config
              - fs/encryption.config
              - storage/block-layer.config
              - storage/block-devices.config
              - storage/block-test-devices.config
              - storage/dm-targets.config
              - storage/md-raid.config
              - storage/nvme.config
              - storage/zoned.config
              - storage/scsi-debug.config
              - virt/virtio-net.config
              - virt/virtio-fs.config
              - virt/virtio-extras.config
              - virt/vsock.config
              - virt/kvm.config
              - rust/rust.config
              - rust/rust-samples.config
              - rust/modversions.config
              - rust/gendwarfksyms.config
              - perf/perf-amd.config
              - debug/debug-heavy.config
              - builtin/virt/virtio-fs.config
              items:
                type: string
                enum:
                - arch/arm64_16k_pages.config
                - arch/arm64_4k_pages.config
                - arch/arm64_64k_pages.config
                - arch/arm64.config
                - arch/x86_64.config
                - arch/x86-extras.config
                - builtin/arch/arm64.config
                - builtin/core/efi.config
                - builtin/core/systemd.config
                - builtin/core/vfio.config
                - builtin/fs/9p.config
                - builtin/fs/btrfs.config
                - builtin/fs/exfat.config
                - builtin/fs/ext4.config
                - builtin/fs/fat.config
                - builtin/fs/nfs.config
                - builtin/fs/overlayfs.config
                - builtin/fs/xfs.config
                - builtin/net/moby.config
                - builtin/net/netfilter-nat.config
                - builtin/net/nftables.config
                - builtin/perf/perf-amd.config
                - builtin/rust/rust-samples.config
                - builtin/security/crypto-algorithms.config
                - builtin/security/crypto-core.config
                - builtin/security/security.config
                - builtin/storage/block-test-devices.config
                - builtin/storage/dm-targets.config
                - builtin/storage/md-raid.config
                - builtin/storage/nvme.config
                - builtin/storage/nvme-fabrics.config
                - builtin/virt/kvm.config
                - builtin/virt/virtio-fs.config
                - builtin/virt/virtio-net.config
                - builtin/virt/vsock.config
                - core/64bit.config
                - core/acpi-extras.config
                - core/acpi-poweroff.config
                - core/boot-config.config
                - core/cgroup-extras.config
                - core/compression.config
                - core/core.config
                - core/cpufreq.config
                - core/crash.config
                - core/efi.config
                - core/hardening.config
                - core/initrd.config
                - core/iommu-pci.config
                - core/localversion.config
                - core/localversion-noauto.config
                - core/mitigations.config
                - core/modules.config
                - core/preempt.config
                - core/systemd.config
                - core/vfio.config
                - debug/blktrace.config
                - debug/codetagging.config
                - debug/debug-heavy.config
                - debug/gdb.config
                - debug/kasan.config
                - debug/kmemleak.config
                - debug/modules-debug.config
                - fs/9p.config
                - fs/btrfs.config
                - fs/encryption.config
                - fs/exfat.config
                - fs/ext4.config
                - fs/f2fs.config
                - fs/fat.config
                - fs/iso9660.config
                - fs/nfs.config
                - fs/nfsd-advanced.config
                - fs/nls.config
                - fs/overlayfs.config
                - fs/xfs-advanced.config
                - fs/xfs.config
                - fs/xfs-debug.config
                - mem/damon.config
                - mem/ksm.config
                - mem/numa.config
                - mem/zram.config
                - net/moby.config
                - net/netfilter-nat.config
                - net/netfilter-xtables.config
                - net/nftables.config
                - perf/perf-amd.config
                - rust/gendwarfksyms.config
                - rust/modversions.config
                - rust/rust.config
                - rust/rust-samples.config
                - security/crypto-accel.config
                - security/crypto-algorithms.config
                - security/crypto-core.config
                - security/ebpf.config
                - security/ima-full.config
                - security/lsm-modules.config
                - security/security.config
                - storage/block-devices.config
                - storage/block-layer.config
                - storage/block-test-devices.config
                - storage/cxl.config
                - storage/dm-targets.config
                - storage/md-raid.config
                - storage/nvdimm.config
                - storage/nvme.config
                - storage/nvme-fabrics.config
                - storage/nvme-tls.config
                - storage/scsi-debug.config
                - storage/zoned.config
                - test/kunit.config
                - test/modules-testing.config
                - test/selftests.config
                - test/xarray.config
                - test/xarray-no-multi.config
                - virt/kvm.config
                - virt/virtio-extras.config
                - virt/virtio-fs.config
                - virt/virtio-net.config
                - virt/vsock.config
              showExpr: fields.config_method === 'fragments'
            preset:
              type: string
              description: '[method=preset] Predefined whole-kernel config from the library

                (applied via KCONFIG_ALLCONFIG).'
              default: imageless_defconfig
              enum:
              - imageless_defconfig
              showExpr: fields.config_method === 'preset'
          title: Configuration
          showExpr: fields.mode === "build"
        build:
          type: object
          description: 'Compile knobs: targets, toolchain, reproducibility, ccache.'
          default: {}
          order:
          - targets
          - make_flags
          - compiler
          - reproducible
          - timestamp_from_commit
          - ccache
          - ccache_max_size
          properties:
            ccache:
              type: boolean
              description: Compile through ccache (`CC="ccache <cc>"`, shared `CCACHE_DIR`).
              default: true
            ccache_max_size:
              type: integer
              description: ccache max cache size in GiB (written to ccache.conf max_size).
              default: 10
              showExpr: fields.ccache !== false
            compiler:
              type: string
              description: 'Toolchain to build with: GCC, or clang/LLVM (LLVM=1 with the

                devShell''s unwrapped clang).'
              default: gcc
              enum:
              - gcc
              - clang
            make_flags:
              type: string
              description: 'Extra make variables/flags, space-separated, appended verbatim (e.g.

                "W=1 KCFLAGS=-O2").'
              default: ''
            reproducible:
              type: boolean
              description: 'Reproducible build (fixed `KBUILD_BUILD_TIMESTAMP`/`USER`/`HOST`,

                `LOCALVERSION=`).'
              default: true
            targets:
              type: string
              description: 'Space-separated make targets. Empty (default) builds the default

                goal: vmlinux, the boot image, and modules.'
              default: ''
            timestamp_from_commit:
              type: boolean
              description: 'Derive `KBUILD_BUILD_TIMESTAMP` from the commit date instead of the

                fixed default.'
              default: false
          title: Build
          showExpr: fields.mode === "build"
        devtools:
          type: object
          description: Optional IDE/debug artifacts produced after compile.
          default: {}
          order:
          - compile_commands
          - scripts_gdb
          - rust_analyzer
          properties:
            compile_commands:
              type: boolean
              description: 'Generate `compile_commands.json` (clangd/IDE C index) in the source

                tree.'
              default: true
            rust_analyzer:
              type: boolean
              description: Generate `rust-project.json` (rust-analyzer) when `CONFIG_RUST=y`.
              default: true
            scripts_gdb:
              type: boolean
              description: 'Build kernel GDB helpers (`vmlinux-gdb.py` + `lx-*`) into the build

                dir.'
              default: true
              title: Scripts GDB
          title: Developer tools
          showExpr: fields.mode === "build"
        installation:
          type: object
          description: Optional install steps and their destination.
          default: {}
          order:
          - reuse
          - install
          - modules_install
          - source_symlink
          properties:
            install:
              type: boolean
              description: 'Install the built kernel image into the slot `destdir` (`make

                install`).'
              default: true
            modules_install:
              type: boolean
              description: 'Install kernel modules into the slot `destdir` (make

                modules_install). Skip for an all-built-in kernel.'
              default: true
            reuse:
              type: boolean
              description: 'Skip compile and install when this build identity is already built

                and present: in the worker destdir, or in this host''s Nix store

                (where a local build published it, or `fetch_identity` left a

                peer''s). This is the Store transport''s local hit, not a binary

                cache. Reuse points the manifest at that copy; off forces a rebuild.'
              default: true
            source_symlink:
              type: boolean
              description: 'Add the canonical /lib/modules/<release>/source symlink after

                modules_install.'
              default: true
          title: Install
          showExpr: fields.mode === "build"
        prebuilt:
          type: object
          description: 'Reuse a prebuilt identity from a registered peer before building. When a

            peer already published this build identity to its Nix store, its run

            layer (image + modules) is fetched into the local store so the build is

            reused instead of repeated.'
          default: {}
          order:
          - use_peers
          properties:
            use_peers:
              type: boolean
              description: 'Fetch this build identity''s run layer from a registered peer''s Nix

                store before building, when one already published it (the peers

                registry at `$SYSTEM_DIR/peers`). Off builds locally only.'
              default: true
              title: Use Peers
          title: Prebuilt
          showExpr: fields.mode === "build"
    closure:
      type: object
      title: NixOS closure
      default: {}
      order:
      - mode
      - guest
      - closure
      - lock
      properties:
        mode:
          title: NixOS closure
          type: string
          description: '`build` runs `f/nix/build` (Nix content-addresses it, so an unchanged profiles/test-suites set rebuilds instantly); `reuse` replays the `init`/`initrd` and shares the Refresh VM recorded (set the VM group to refresh that VM).'
          default: build
          enum:
          - build
          - reuse
        guest:
          type: object
          description: Guest identity, access, and virtiofs mounts.
          default: {}
          order:
          - vm_name
          - user_name
          - ssh_keys
          - shares
          - home
          - home_dir
          properties:
            home:
              type: boolean
              description: 'Land in your home: mount the operator''s host home at `/home/<you>`

                AND make it root''s home, so `ssh <vm>` drops you straight into your

                files (writable: root maps to your host uid via virtiofsd). One

                toggle wires the closure mount, root''s home, and the host serving.'
              default: true
            home_dir:
              type: string
              description: 'Advanced: override the guest mount point + root''s home (else

                `/home/<host operator>`, auto-discovered). The served *content* is

                always the operator''s host home; an override only relocates where it

                appears in the guest.'
              default: ''
              title: Home Dir
            shares:
              type: object
              description: 'virtiofs shares keyed by guest mount point, e.g. {"/mnt/home":

                {"tag": "home", "options": ["ro"]}}. The `fstests` mount is

                auto-added when Test Suites include `fstests`; `home` adds the

                operator''s home. Both coexist.'
              default: {}
            ssh_keys:
              type: array
              description: Authorized SSH keys for the root and unprivileged accounts.
              default: []
              items:
                type: string
              title: SSH Keys
            user_name:
              type: string
              description: Unprivileged account name in the guest (nixos-flake.user.name).
              default: kdevops
            vm_name:
              type: string
              description: Guest hostname and per-VM config directory name.
              default: nixos
              title: VM Name
          required:
          - vm_name
          title: Guest
          showExpr: fields.mode === "build"
        closure:
          type: object
          description: What nix builds into the toplevel closure.
          default: {}
          order:
          - profiles
          - test_suites
          - overrides
          properties:
            overrides:
              type: array
              description: 'Per-package source overrides, e.g. [{"pkg": "fio", "src":

                "/path/to/fio"}].'
              default: []
              items:
                type: object
            profiles:
              type: array
              description: 'nixos-flake profile modules to import (fully featured by default;

                pare back for a lighter closure). controller is a host role and off

                by default.'
              default:
              - devel
              - build-tools
              - monitoring
              items:
                type: string
                enum:
                - build-tools
                - controller
                - devel
                - monitoring
            test_suites:
              type: array
              description: 'nixos-flake testSuite modules to import (all by default; pare back

                for a lighter closure).'
              default:
              - blktests
              - fstests
              - gitr
              - ltp
              - mmtests
              - pynfs
              - selftests
              - sysbench
              items:
                type: string
                enum:
                - blktests
                - fstests
                - gitr
                - ltp
                - mmtests
                - pynfs
                - selftests
                - sysbench
          title: Closure
          showExpr: fields.mode === "build"
        lock:
          type: object
          description: flake.lock pinning behaviour.
          default: {}
          order:
          - update_lock
          properties:
            update_lock:
              type: boolean
              description: 'Re-pin the vendored nixos-flake input instead of only filling

                missing lock entries.'
              default: false
          title: Lock
          showExpr: fields.mode === "build"
    qemu:
      type: object
      title: QEMU
      default: {}
      order:
      - mode
      - qemu_pick
      - worktree
      - configuration
      - build
      - devtools
      - installation
      - prebuilt
      properties:
        mode:
          title: QEMU
          type: string
          description: '`build` runs `f/qemu/build`; `reuse` boots a QEMU picked from this host''s Nix-store index; `nixpkgs` boots the `qemu` package from `nixpkgs` (via the vendored `nixos-flake`).'
          default: nixpkgs
          enum:
          - build
          - reuse
          - nixpkgs
        qemu_pick:
          title: Reuse QEMU
          type: string
          format: dynselect-list_qemu_index
          description: Published QEMU install tree to boot (`qemu-<identity>` in the store index, local or fetched from a peer).
          default: ''
          showExpr: fields.mode === "reuse"
        worktree:
          type: object
          description: Source ref, optional patch series, and warm-tree lifecycle.
          default: {}
          order:
          - qemu_ref
          - b4_series
          - recreate_worktree
          - wipe_build
          properties:
            b4_series:
              type: string
              description: 'Optional lore series (message-id/URL) to apply on top of the

                checkout via `b4 shazam`, published to the Bare as `b4/<slug>`.'
              default: ''
              title: b4 Series
            qemu_ref:
              type: string
              description: 'Branch, tag or commit in the Bare to build (a tag, an upstream ref

                via the mirror, or a developer branch).'
              default: v11.0.0
              title: QEMU Ref
            recreate_worktree:
              type: boolean
              description: 'Lay a fresh detached checkout (rm the warm tree, its build dir and

                destdir too, first) instead of reusing it. Default off keeps the

                warm tree for incremental rebuilds.'
              default: false
              title: Recreate Worktree
            wipe_build:
              type: boolean
              description: 'Wipe the build dir before building (default off = incremental

                reuse). Hidden when Recreate Worktree is on, which already removes

                the build dir as a child of the worktree.'
              default: false
              showExpr: fields.recreate_worktree !== true
          title: Worktree
          showExpr: fields.mode === "build"
        configuration:
          type: object
          description: 'What QEMU is configured to build: targets and configure flags.'
          default: {}
          order:
          - target_list
          - configure_args
          - skip_configure
          properties:
            configure_args:
              type: string
              description: 'Extra configure flags appended verbatim. Older QEMU may need

                `--disable-werror` against the bleeding-edge nixpkgs toolchain.'
              default: ''
            skip_configure:
              type: boolean
              description: 'Skip configure and recompile the existing build dir (incremental

                rebuild: the build dir is already configured).'
              default: false
            target_list:
              type: array
              description: 'QEMU emulator targets to build (`--target-list`). *-softmmu = system

                emulation (VMs); *-linux-user/*-bsd-user = user-mode.'
              default:
              - x86_64-softmmu
              items:
                type: string
                enum:
                - aarch64_be-linux-user
                - aarch64-bsd-user
                - aarch64-linux-user
                - aarch64-softmmu
                - alpha-linux-user
                - alpha-softmmu
                - arm-bsd-user
                - armeb-linux-user
                - arm-linux-user
                - arm-softmmu
