                - sparc64-linux-user
                - sparc64-softmmu
                - sparc-linux-user
                - sparc-softmmu
                - tricore-softmmu
                - x86_64-bsd-user
                - x86_64-linux-user
                - x86_64-softmmu
                - xtensaeb-linux-user
                - xtensaeb-softmmu
                - xtensa-linux-user
                - xtensa-softmmu
          title: Configuration
          showExpr: fields.mode === "build"
        build:
          type: object
          description: 'Compile knobs: toolchain, reproducibility and ccache.'
          default: {}
          order:
          - compiler
          - reproducible
          - ccache
          - ccache_max_size
          properties:
            ccache:
              type: boolean
              description: Compile through ccache (`--cc="ccache <cc>"`, shared `ccache.conf`).
              default: true
            ccache_max_size:
              type: integer
              description: ccache max cache size in GiB (written to ccache.conf max_size).
              default: 10
              showExpr: fields.ccache !== false
            compiler:
              type: string
              description: 'Toolchain to build QEMU with (pinned via configure `--cc/--cxx`,

                which beats the devShell''s `CC`). GCC is clean; clang adds

                `-Qunused-arguments`.'
              default: gcc
              enum:
              - gcc
              - clang
            reproducible:
              type: boolean
              description: 'Reproducible build: add one `-ffile-prefix-map=<prefix>=/qemu` to

                `--extra-cflags`/`--extra-cxxflags` so the host build path stops

                leaking into the binary.'
              default: true
          title: Build
          showExpr: fields.mode === "build"
        devtools:
          type: object
          description: Optional IDE artifacts produced after compile.
          default: {}
          order:
          - compile_commands
          properties:
            compile_commands:
              type: boolean
              description: 'Copy meson''s `compile_commands.json` into the source root

                (clangd/IDE index).'
              default: true
          title: Developer tools
          showExpr: fields.mode === "build"
        installation:
          type: object
          description: Install the emulator and manage the destdir.
          default: {}
          order:
          - reuse
          - install
          properties:
            install:
              type: boolean
              description: 'Install the built emulator into destdir (make install). Off = build

                only (e.g. a dev worktree).'
              default: true
            reuse:
              type: boolean
              description: 'Skip configure/compile/install when this build identity is already

                installed under its prefix (reuse the prior build). Off forces a

                rebuild without wiping the destdir.'
              default: true
          title: Install
          showExpr: fields.mode === "build"
        prebuilt:
          type: object
          description: 'Reuse a prebuilt identity from a registered peer before building. When a

            peer already published this build identity to its Nix store, its whole

            install tree is fetched into the local store so the build is reused

            instead of repeated.'
          default: {}
          order:
          - use_peers
          properties:
            use_peers:
              type: boolean
              description: 'Fetch this build identity''s install tree from a registered peer''s

                Nix store before building, when one already published it (the peers

                registry at `$SYSTEM_DIR/peers`). Off builds locally only.'
              default: true
              title: Use Peers
          title: Prebuilt
          showExpr: fields.mode === "build"
