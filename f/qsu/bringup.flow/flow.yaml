                - mipsel-softmmu
                - mips-linux-user
                - mipsn32el-linux-user
                - mipsn32-linux-user
                - mips-softmmu
                - or1k-linux-user
                - or1k-softmmu
                - ppc64le-linux-user
                - ppc64-linux-user
