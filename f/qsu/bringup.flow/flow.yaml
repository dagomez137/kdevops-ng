    boot_networking:
      type: object
      description: 'Host vsock/SSH forwarding; the base + a per-VM offset (`vm_index`, or a

        hash of the VM name when `vm_index` is 0) pick the CID/port unless an

        explicit override is enabled.'
      default: {}
      order:
      - vsock_cid_base
      - custom_vsock_cid
      - vsock_cid
      - ssh_port_base
      - custom_ssh_port
      - ssh_port
      - vm_index
      properties:
        custom_ssh_port:
          type: boolean
          description: Set an explicit host port instead of `ssh_port_base + vm_index`.
          default: false
          title: Custom SSH Port
        custom_vsock_cid:
          type: boolean
          description: Set an explicit vsock CID instead of `vsock_cid_base + vm_index`.
          default: false
          title: Custom VSOCK CID
        ssh_port:
          type: integer
          description: Host port forwarded to guest `:22` (`-nic user,hostfwd=`).
          showExpr: fields.custom_ssh_port === true
          title: SSH Port
        ssh_port_base:
          type: integer
          description: Base host port; guest N forwards `ssh_port_base + vm_index`.
          default: 10022
          title: SSH Port Base
        vm_index:
          type: integer
          description: 'Offset added to `vsock_cid_base`/`ssh_port_base`. `0` (default)

            derives a stable offset from the VM name so concurrent auto-named

            VMs don''t collide on the host port/CID; set a non-zero value for

            deterministic manual allocation.'
          default: 0
          title: VM Index
        vsock_cid:
          type: integer
          description: vsock context id for `-device vhost-vsock`.
          showExpr: fields.custom_vsock_cid === true
          title: VSOCK CID
        vsock_cid_base:
          type: integer
          description: Base vsock cid; guest N uses `vsock_cid_base + vm_index`.
          default: 100
          title: VSOCK CID Base
      title: Networking
    boot_sharing:
      type: object
      description: virtiofs shares (modules, controller) and the virtiofsd binary.
      default: {}
      order:
      - custom_virtiofsd
      - virtiofsd_binary
      - home_share
      - home_share_readwrite
      - controller_share
      - controller_share_tag
      - controller_share_dir
      - controller_share_guest_mount
      - controller_share_readwrite
      properties:
        controller_share:
          type: boolean
          description: 'Append one operator-defined virtiofs share exposing a controller

            directory to the guest.'
          default: false
        controller_share_dir:
          type: string
          description: Absolute controller path to share. Empty = `$HOME`.
          default: ''
          showExpr: fields.controller_share === true
        controller_share_guest_mount:
          type: string
          description: 'Guest mount point for the controller share. Empty = same as the

            controller path.'
          default: ''
          showExpr: fields.controller_share === true
        controller_share_readwrite:
          type: boolean
          description: Mount the controller share read-write (default read-only).
          default: false
          showExpr: fields.controller_share === true
        controller_share_tag:
          type: string
          description: virtiofs tag for the controller share.
          default: controller-share
          showExpr: fields.controller_share === true
        custom_virtiofsd:
          type: boolean
          description: 'Use a custom `virtiofsd` instead of the reproducible `nixos-flake`

            one.'
          default: false
          title: Custom virtiofsd
        home_share:
          type: boolean
          description: 'Predefined `home` share (host serving): serve the operator''s host

            `$HOME` into the guest at the same absolute path (tag `home`). Pair

            with `NixOS: Guest → home` so the guest mounts it.'
          default: false
          title: Home Share
        home_share_readwrite:
          type: boolean
          description: Mount the home share read-write (default read-only).
          default: false
          showExpr: fields.home_share === true
          title: Home Share Readwrite
        virtiofsd_binary:
          type: string
          description: 'Path to a custom `virtiofsd` (e.g. a nix derivation output or your

            own build).'
          default: ''
          showExpr: fields.custom_virtiofsd === true
          title: virtiofsd Binary
      title: File sharing
    boot_nvme:
      type: object
      description: 'Emulated NVMe drives (`-device nvme`/`nvme-ns` + a qcow2 per drive). The

        per-drive knobs are the QEMU device properties verbatim; see

        `qemu-system-x86_64 -device nvme,help` and `-device nvme-ns,help`.'
      default: {}
      order:
      - nvme_drive_count
      - nvme_drive_size_gb
      - customize_drives
      - logical_block_size
      - physical_block_size
      - min_io_size
      - opt_io_size
      - discard_granularity
      - write_cache
      - mdts
      - cmb_size_mb
      - legacy_cmb
      - pmr_size
      - pmr_share
      - pmr_pmem
      - atomic_dn
      - atomic_awun
      - atomic_awupf
      - atomic_nawun
      - atomic_nawupf
      - atomic_nabsn
      - atomic_nabspf
      - atomic_nabo
      properties:
        atomic_awun:
          type: string
          description: 'Atomic Write Unit Normal (AWUN), 0-based, in logical blocks:

            `-device nvme,atomic.awun=`. Empty = QEMU default. Single value or

            per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Atomic Write Unit Normal (AWUN)
        atomic_awupf:
          type: string
          description: 'Atomic Write Unit Power Fail (AWUPF), 0-based: `-device

            nvme,atomic.awupf=`. Empty = QEMU default. Single value or per-drive

            comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Atomic Write Unit Power Fail (AWUPF)
        atomic_dn:
          type: boolean
          description: 'Disable Normal (DN): `-device nvme,atomic.dn=`. Set = AWUN/NAWUN

            disabled, so AWUPF/NAWUPF govern atomicity for all writes. Off =

            QEMU default.'
          default: false
          showExpr: fields.customize_drives === true
          title: Disable Normal (DN)
        atomic_nabo:
          type: string
          description: 'Namespace Atomic Boundary Offset (NABO): `-device

            nvme-ns,atomic.nabo=`. Forces explicit-namespace mode. Empty = QEMU

            default. Single value or per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Boundary Offset (NABO)
        atomic_nabsn:
          type: string
          description: 'Namespace Atomic Boundary Size Normal (NABSN): `-device

            nvme-ns,atomic.nabsn=`. Forces explicit-namespace mode. Empty = QEMU

            default. Single value or per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Boundary Size Normal (NABSN)
        atomic_nabspf:
          type: string
          description: 'Namespace Atomic Boundary Size Power Fail (NABSPF): `-device

            nvme-ns,atomic.nabspf=`. Forces explicit-namespace mode. Empty =

            QEMU default. Single value or per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Boundary Size Power Fail (NABSPF)
        atomic_nawun:
          type: string
          description: 'Namespace Atomic Write Unit Normal (NAWUN), 0-based: `-device

            nvme-ns,atomic.nawun=`. Setting any per-namespace atomic switches

            the drive to explicit `-device nvme` + `-device nvme-ns`. Empty =

            QEMU default. Single value or per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Write Unit Normal (NAWUN)
        atomic_nawupf:
          type: string
          description: 'Namespace Atomic Write Unit Power Fail (NAWUPF), 0-based: `-device

            nvme-ns,atomic.nawupf=`. Forces explicit-namespace mode. Empty =

            QEMU default. Single value or per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Write Unit Power Fail (NAWUPF)
        cmb_size_mb:
          type: string
          description: 'Controller Memory Buffer size in MiB: `-device nvme,cmb_size_mb=`

            (host RAM on PCI BAR 2; coexists with PMR on BAR 4/5). Empty = no

            CMB. Single value or per-drive comma-list (`64,0` = drive 0 only).'
          default: ''
          showExpr: fields.customize_drives === true
          title: CMB Size (MiB)
        customize_drives:
          type: boolean
          description: 'Expose the per-drive NVMe device knobs below. Off = 4Kn drives

            (4096-byte blocks) with QEMU defaults for everything else. Each knob

            takes a single value applied to every drive, or a comma-list

            assigned by drive index (`4096,512` → drive 0 = 4096, drive 1 =

            512).'
          default: false
          title: Customize Drives
        discard_granularity:
          type: string
          description: 'Discard granularity in bytes: `-device nvme-ns,discard_granularity=`

            (BlockConf). Single value or per-drive comma-list.'
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Discard Granularity
        legacy_cmb:
          type: boolean
          description: 'Use the NVMe 1.3 CMB register scheme (CMBLOC/CMBSZ always enabled):

            `-device nvme,legacy-cmb=on`. Off = the 1.4 scheme. Applies to every

            CMB-enabled drive; no effect without `cmb_size_mb`.'
          default: false
          showExpr: fields.customize_drives === true
          title: Legacy CMB (v1.3)
        logical_block_size:
          type: string
          description: 'Logical block (LBA) size in bytes: `-device

            nvme-ns,logical_block_size=` (BlockConf). `4096` = 4Kn, `512` =

            512-byte sectors. Single value or per-drive comma-list.'
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Logical Block Size
        mdts:
          type: string
          description: 'Maximum Data Transfer Size (MDTS) as a power of two in MPSMIN units:

            `-device nvme,mdts=`. Empty = QEMU default. Single value or

            per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Maximum Data Transfer Size (MDTS)
        min_io_size:
          type: string
          description: 'Minimum I/O size hint in bytes: `-device nvme-ns,min_io_size=`

            (BlockConf). Single value or per-drive comma-list.'
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Minimum I/O Size
        nvme_drive_count:
          type: integer
          description: Number of NVMe drives (`-device nvme` + a qcow2 file each).
          default: 4
          title: Drive Count
        nvme_drive_size_gb:
          type: integer
          description: Virtual size in GiB for each qcow2 NVMe backing file.
          default: 20
          title: Drive Size (GiB)
        opt_io_size:
          type: string
          description: 'Optimal I/O size hint in bytes: `-device nvme-ns,opt_io_size=`

            (BlockConf). Single value or per-drive comma-list.'
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Optimal I/O Size
        physical_block_size:
          type: string
          description: 'Physical block size in bytes: `-device nvme-ns,physical_block_size=`

            (BlockConf). Single value or per-drive comma-list.'
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Physical Block Size
        pmr_pmem:
          type: boolean
          description: 'Real persistent-memory flush semantics for the PMR backing file

            (`-object memory-backend-file,pmem=on`). Off = QEMU default. Applies

            to every PMR-enabled drive.'
          default: false
          showExpr: fields.customize_drives === true
          title: PMR pmem
        pmr_share:
          type: boolean
          description: 'Write guest PMR contents through to the backing file (`-object

            memory-backend-file,share=on`) so they survive a restart, stored in

            the per-VM state dir. Off = volatile (`share=off`). Applies to every

            PMR-enabled drive.'
          default: true
          showExpr: fields.customize_drives === true
          title: PMR Persistent (share=on)
        pmr_size:
          type: string
          description: 'Persistent Memory Region size in bytes: `-object

            memory-backend-file,size=` linked from `-device nvme,pmrdev=` (BAR

            4/5; coexists with CMB). Must be a power of 2 and at least 16. Empty

            = no PMR. Single value or per-drive comma-list (`16777216,0` = drive

            0 only).'
          default: ''
          showExpr: fields.customize_drives === true
          title: PMR Size (bytes)
        write_cache:
          type: string
          description: 'Volatile Write Cache (VWC): `-device nvme-ns,write-cache=`

            (BlockConf): `on`, `off` or `auto`. Empty = QEMU default. Single

            value or per-drive comma-list.'
          default: ''
          showExpr: fields.customize_drives === true
          title: Write Cache (VWC)
      title: NVMe
    boot_orchestration:
      type: object
      description: Flow-level boot wait and debug snapshot.
      default: {}
      order:
      - wait_timeout
      - emit_vars_yaml_snapshot
      properties:
        emit_vars_yaml_snapshot:
          type: boolean
          description: Also write the debug `<vm>.yaml` vars snapshot.
          default: false
          title: Emit Vars YAML Snapshot
        wait_timeout:
          type: integer
          description: Seconds to poll `127.0.0.1:<ssh_port>` for the guest sshd banner.
          default: 300
      title: Orchestration
    vm:
      type: object
      title: VM
      description: 'Deploy target: a fresh VM, or refresh a deployed one in place (re-render with the selected kernel/QEMU/closure and restart).'
      default: {}
      order:
      - vm_target
      - refresh_vm
      - auto_vm_name
      - vm_name
      properties:
        vm_target:
          title: Target
          type: string
          description: '`new` boots a fresh VM; `refresh` re-renders a deployed VM (its name, ports and CID kept) and restarts it with the new artifacts.'
          default: new
          enum:
          - new
          - refresh
        refresh_vm:
          title: Refresh VM
          type: string
          format: dynselect-list_deployed_vms
          description: Deployed VM to refresh (the render-sidecar registry).
          default: ''
          showExpr: fields.vm_target === "refresh"
        auto_vm_name:
          type: boolean
          description: 'Derive the VM name from the flow job id (`vm-<job-id>`) so each run

            is unique and collision-free. Off = use `vm_name`.'
          default: true
          title: Auto VM Name
          showExpr: fields.vm_target === "new"
        vm_name:
          type: string
          description: 'Guest name: the systemd instance (`qemu-system@<vm_name>`) and

            machined machine name. Used when `auto_vm_name` is off.'
          default: nixos
          showExpr: fields.vm_target === "new" && fields.auto_vm_name === false
          title: VM Name
  required: []
