summary: "QEMU/systemd: render the cloud-init seed (DEFERRED)"
description: |
  **Deferred scaffold.** Will render the cloud-init templates (`user-data.j2`,
  `meta-data.j2`, and the `files/network-config` seed) into a NoCloud seed image that
  `vm.env.j2` attaches as the `seed` drive, for image-backed guests that provision over
  cloud-init instead of the imageless closure. Currently returns `{"deferred": true}`.
kind: script
tag: vm
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
  properties:
    vm_name:
      title: VM Name
      type: string
      description: Guest the seed provisions.
      default: ""
  required: []
