summary: Render the cloud-init seed (deferred)
description: |-
  **Deferred scaffold.** Will render the cloud-init templates (`user-data.j2`,
  `meta-data.j2`, and the `files/network-config` seed) into a NoCloud seed image
  that `vm.env.j2` attaches as the `seed` drive, for image-backed guests that
  provision over cloud-init instead of the imageless closure. Currently returns
  `{"deferred": true}`.
lock: '!inline f/qsu/cloud-init/render.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
  properties:
    vm_name:
      type: string
      description: Guest the seed provisions.
      default: ''
      title: VM Name
  required: []
tag: vm
