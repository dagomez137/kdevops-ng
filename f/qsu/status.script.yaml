summary: 'Show a VM''s status'
description: |-
  Report one VM's status against the host `systemd --user` manager: `systemctl
  --user is-active qemu-system@<vm>` for liveness, a best-effort `machinectl
  --user status <vm>` for the machined registration view, and the SSH / vsock /
  console access command lines. Read-only: probes the manager and mutates
  nothing.
lock: '!inline f/qsu/status.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
    - ssh_port
    - vsock_cid
  properties:
    ssh_port:
      type: integer
      description: |-
        Forwarded host port, surfaced in the `ssh -p <port>` access line.
      title: SSH Port
    vm_name:
      type: object
      description: |-
        VM to query (`qemu-system@<vm_name>`). The dropdown lists the running
        VMs (`systemctl --user list-units 'qemu-system@*'`, across the local
        host and registered peers) plus any with a rendered `<vm>.env`.
      format: dynselect-list_vms
      title: VM Name
    vsock_cid:
      type: integer
      description: |-
        Guest vsock cid, surfaced in the `ssh root@vsock/<cid>` access line.
      title: VSOCK CID
  required:
    - vm_name
tag: vm
