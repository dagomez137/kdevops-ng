            - "pc-q35-7.1"
            - "pc-q35-7.0"
            - "pc-q35-6.2"
            - "pc-q35-6.1"
            - "pc-q35-6.0"
            - "pc-q35-5.2"
            - "pc-q35-5.1"
            - "pc-q35-5.0"
            - "q35"
            - "pc-q35-10.2"
            - "pc-q35-10.1"
            - "pc-q35-10.0"
            - "isapc"
            - "none"
            - "x-remote"
        iommu:
          title: IOMMU
          type: object
          description: vIOMMU device, queried from the chosen qemu's `-device help` and narrowed to what the template renders (`intel-iommu`, `amd-iommu`, `virtio-iommu-pci`, `arm-smmuv3`). `none` = no vIOMMU.
          format: dynselect-list_iommu
          default: ""
    networking:
      title: Networking
      type: object
      description: Host vsock/SSH forwarding; the base + a per-VM offset (`vm_index`, or a hash of the VM name when `vm_index` is 0) pick the CID/port unless an explicit override is enabled.
      default: {}
      order:
        - vsock_cid_base
        - custom_vsock_cid
        - vsock_cid
        - ssh_port_base
        - custom_ssh_port
        - ssh_port
        - vm_index
      properties:
        vsock_cid_base:
          title: VSOCK CID Base
          type: integer
          description: Base vsock cid; guest N uses `vsock_cid_base + vm_index`.
          default: 100
        custom_vsock_cid:
          title: Custom VSOCK CID
          type: boolean
          description: Set an explicit vsock CID instead of `vsock_cid_base + vm_index`.
          default: false
        vsock_cid:
          title: VSOCK CID
          type: integer
          description: vsock context id for `-device vhost-vsock`.
          showExpr: "fields.custom_vsock_cid === true"
        ssh_port_base:
          title: SSH Port Base
          type: integer
          description: Base host port; guest N forwards `ssh_port_base + vm_index`.
          default: 10022
        custom_ssh_port:
          title: Custom SSH Port
          type: boolean
          description: Set an explicit host port instead of `ssh_port_base + vm_index`.
          default: false
        ssh_port:
          title: SSH Port
          type: integer
          description: Host port forwarded to guest `:22` (`-nic user,hostfwd=`).
          showExpr: "fields.custom_ssh_port === true"
        vm_index:
          title: VM Index
          type: integer
          description: Offset added to `vsock_cid_base`/`ssh_port_base`. `0` (default) derives a stable offset from the VM name so concurrent auto-named VMs don't collide on the host port/CID; set a non-zero value for deterministic manual allocation.
          default: 0
    kernel_boot:
      title: Kernel boot
      type: object
      description: Direct kernel boot (`-kernel`/`-initrd`/`-append`) from the build manifests or explicit overrides.
      default: {}
      order:
        - kernel
        - closure
        - kernel_image
        - kernel_initrd
        - kernel_append
      properties:
        kernel:
          type: object
          description: The `f/kernel/build` result manifest (`vmlinuz`/`bzImage`, `modules_dir`, `uts_release`) — supplies `-kernel` and the `/lib/modules` share.
          default: {}
        closure:
          type: object
          description: The `f/nix/build_closure` result manifest (`toplevel`, `init`, `initrd`) — supplies `-initrd` and the `init=` in `-append`.
          default: {}
        kernel_image:
          type: string
          description: Override the `-kernel` image (else from `kernel`).
          default: ""
        kernel_initrd:
          type: string
          description: Override the `-initrd` (else from `closure`).
          default: ""
        kernel_append:
          type: string
          description: Override the kernel cmdline (`-append`; else `root=tmpfs ... init=<closure.init>`).
          default: ""
    sharing:
      title: File sharing
      type: object
      description: virtiofs shares (modules, controller) and the virtiofsd binary.
      default: {}
      order:
        - modules_dir
        - custom_virtiofsd
        - virtiofsd_binary
        - home_share
        - home_share_readwrite
        - controller_share
        - controller_share_tag
        - controller_share_dir
        - controller_share_guest_mount
        - controller_share_readwrite
      properties:
        modules_dir:
          type: string
          description: Override the host modules tree shared at `/lib/modules` (else from `kernel`).
          default: ""
        custom_virtiofsd:
          title: Custom virtiofsd
          type: boolean
          description: Use a custom `virtiofsd` instead of the reproducible `nixos-flake` one.
          default: false
        home_share:
          title: Home Share
          type: boolean
          description: "Predefined `home` share (host serving): serve the operator's host `$HOME` into the guest at the same absolute path (tag `home`). Pair with `NixOS: Guest → home` so the guest mounts it."
          default: false
        home_share_readwrite:
          title: Home Share Readwrite
          type: boolean
          description: "Mount the home share read-write (default read-only)."
          default: false
          showExpr: "fields.home_share === true"
        virtiofsd_binary:
          title: virtiofsd Binary
          type: string
          description: Path to a custom `virtiofsd` (e.g. a nix derivation output or your own build).
          default: ""
          showExpr: "fields.custom_virtiofsd === true"
        controller_share:
          type: boolean
          description: Append one operator-defined virtiofs share exposing a controller directory to the guest.
          default: false
        controller_share_tag:
          type: string
          description: virtiofs tag for the controller share.
          default: controller-share
          showExpr: "fields.controller_share === true"
        controller_share_dir:
          type: string
          description: Absolute controller path to share. Empty = `$HOME`.
          default: ""
          showExpr: "fields.controller_share === true"
        controller_share_guest_mount:
          type: string
          description: Guest mount point for the controller share. Empty = same as the controller path.
          default: ""
          showExpr: "fields.controller_share === true"
        controller_share_readwrite:
          type: boolean
          description: Mount the controller share read-write (default read-only).
          default: false
          showExpr: "fields.controller_share === true"
    nvme:
      title: NVMe
      type: object
      description: Emulated NVMe drives (`-device nvme`/`nvme-ns` + a qcow2 per drive). The per-drive knobs are the QEMU device properties verbatim — see `qemu-system-x86_64 -device nvme,help` and `-device nvme-ns,help`.
      default: {}
      order:
        - nvme_drive_count
        - nvme_drive_size_gb
        - customize_drives
        - logical_block_size
        - physical_block_size
        - min_io_size
        - opt_io_size
        - discard_granularity
        - write_cache
        - mdts
        - cmb_size_mb
        - legacy_cmb
        - pmr_size
        - pmr_share
        - pmr_pmem
        - atomic_dn
        - atomic_awun
        - atomic_awupf
        - atomic_nawun
        - atomic_nawupf
        - atomic_nabsn
        - atomic_nabspf
        - atomic_nabo
      properties:
        nvme_drive_count:
          title: Drive Count
          type: integer
          description: Number of NVMe drives (`-device nvme` + a qcow2 file each).
          default: 4
        nvme_drive_size_gb:
          title: Drive Size (GiB)
          type: integer
          description: Virtual size in GiB for each qcow2 NVMe backing file.
          default: 20
        customize_drives:
          title: Customize Drives
          type: boolean
          description: Expose the per-drive NVMe device knobs below. Off = 4Kn drives (4096-byte blocks) with QEMU defaults for everything else. Each knob takes a single value applied to every drive, or a comma-list assigned by drive index (`4096,512` → drive 0 = 4096, drive 1 = 512).
          default: false
        logical_block_size:
          title: Logical Block Size
          type: string
          description: "Logical block (LBA) size in bytes — `-device nvme-ns,logical_block_size=` (BlockConf). `4096` = 4Kn, `512` = 512-byte sectors. Single value or per-drive comma-list."
          default: "4096"
          showExpr: "fields.customize_drives === true"
        physical_block_size:
          title: Physical Block Size
          type: string
          description: "Physical block size in bytes — `-device nvme-ns,physical_block_size=` (BlockConf). Single value or per-drive comma-list."
          default: "4096"
          showExpr: "fields.customize_drives === true"
        min_io_size:
          title: Minimum I/O Size
          type: string
          description: "Minimum I/O size hint in bytes — `-device nvme-ns,min_io_size=` (BlockConf). Single value or per-drive comma-list."
          default: "4096"
          showExpr: "fields.customize_drives === true"
        opt_io_size:
          title: Optimal I/O Size
          type: string
          description: "Optimal I/O size hint in bytes — `-device nvme-ns,opt_io_size=` (BlockConf). Single value or per-drive comma-list."
          default: "4096"
          showExpr: "fields.customize_drives === true"
        discard_granularity:
          title: Discard Granularity
          type: string
          description: "Discard granularity in bytes — `-device nvme-ns,discard_granularity=` (BlockConf). Single value or per-drive comma-list."
          default: "4096"
          showExpr: "fields.customize_drives === true"
        write_cache:
          title: Write Cache (VWC)
          type: string
          description: "Volatile Write Cache (VWC) — `-device nvme-ns,write-cache=` (BlockConf): `on`, `off` or `auto`. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        mdts:
          title: Maximum Data Transfer Size (MDTS)
          type: string
          description: "Maximum Data Transfer Size (MDTS) as a power of two in MPSMIN units — `-device nvme,mdts=`. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        cmb_size_mb:
          title: CMB Size (MiB)
          type: string
          description: "Controller Memory Buffer size in MiB — `-device nvme,cmb_size_mb=` (host RAM on PCI BAR 2; coexists with PMR on BAR 4/5). Empty = no CMB. Single value or per-drive comma-list (`64,0` = drive 0 only)."
          default: ""
          showExpr: "fields.customize_drives === true"
        legacy_cmb:
          title: Legacy CMB (v1.3)
          type: boolean
          description: "Use the NVMe 1.3 CMB register scheme (CMBLOC/CMBSZ always enabled) — `-device nvme,legacy-cmb=on`. Off = the 1.4 scheme. Applies to every CMB-enabled drive; no effect without `cmb_size_mb`."
          default: false
          showExpr: "fields.customize_drives === true"
        pmr_size:
          title: PMR Size (bytes)
          type: string
          description: "Persistent Memory Region size in bytes — `-object memory-backend-file,size=` linked from `-device nvme,pmrdev=` (BAR 4/5; coexists with CMB). Must be a power of 2 and at least 16. Empty = no PMR. Single value or per-drive comma-list (`16777216,0` = drive 0 only)."
          default: ""
          showExpr: "fields.customize_drives === true"
        pmr_share:
          title: PMR Persistent (share=on)
          type: boolean
          description: "Write guest PMR contents through to the backing file (`-object memory-backend-file,share=on`) so they survive a restart, stored in the per-VM state dir. Off = volatile (`share=off`). Applies to every PMR-enabled drive."
          default: true
          showExpr: "fields.customize_drives === true"
        pmr_pmem:
          title: PMR pmem
          type: boolean
          description: "Real persistent-memory flush semantics for the PMR backing file (`-object memory-backend-file,pmem=on`). Off = QEMU default. Applies to every PMR-enabled drive."
          default: false
          showExpr: "fields.customize_drives === true"
        atomic_dn:
          title: Disable Normal (DN)
          type: boolean
          description: "Disable Normal (DN) — `-device nvme,atomic.dn=`. Set = AWUN/NAWUN disabled, so AWUPF/NAWUPF govern atomicity for all writes. Off = QEMU default."
          default: false
          showExpr: "fields.customize_drives === true"
        atomic_awun:
          title: Atomic Write Unit Normal (AWUN)
          type: string
          description: "Atomic Write Unit Normal (AWUN), 0-based, in logical blocks — `-device nvme,atomic.awun=`. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        atomic_awupf:
          title: Atomic Write Unit Power Fail (AWUPF)
          type: string
          description: "Atomic Write Unit Power Fail (AWUPF), 0-based — `-device nvme,atomic.awupf=`. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        atomic_nawun:
          title: Namespace Atomic Write Unit Normal (NAWUN)
          type: string
          description: "Namespace Atomic Write Unit Normal (NAWUN), 0-based — `-device nvme-ns,atomic.nawun=`. Setting any per-namespace atomic switches the drive to explicit `-device nvme` + `-device nvme-ns`. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        atomic_nawupf:
          title: Namespace Atomic Write Unit Power Fail (NAWUPF)
          type: string
          description: "Namespace Atomic Write Unit Power Fail (NAWUPF), 0-based — `-device nvme-ns,atomic.nawupf=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        atomic_nabsn:
          title: Namespace Atomic Boundary Size Normal (NABSN)
          type: string
          description: "Namespace Atomic Boundary Size Normal (NABSN) — `-device nvme-ns,atomic.nabsn=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        atomic_nabspf:
          title: Namespace Atomic Boundary Size Power Fail (NABSPF)
          type: string
          description: "Namespace Atomic Boundary Size Power Fail (NABSPF) — `-device nvme-ns,atomic.nabspf=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
        atomic_nabo:
          title: Namespace Atomic Boundary Offset (NABO)
          type: string
          description: "Namespace Atomic Boundary Offset (NABO) — `-device nvme-ns,atomic.nabo=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
          default: ""
          showExpr: "fields.customize_drives === true"
    orchestration:
      title: Orchestration
      type: object
      description: Flow-level boot wait and debug snapshot.
      default: {}
      order:
        - wait_timeout
        - emit_vars_yaml_snapshot
      properties:
        wait_timeout:
          type: integer
          description: Seconds to poll `127.0.0.1:<ssh_port>` for the guest sshd banner.
          default: 300
        emit_vars_yaml_snapshot:
          title: Emit Vars YAML Snapshot
          type: boolean
          description: Also write the debug `<vm>.yaml` vars snapshot.
          default: false
  required: []
  x-windmill-dyn-select-lang: python3
  x-windmill-dyn-select-code: |
    def list_iommu(filterText: str = "", qemu: dict = None, **_: object) -> list:
        # vIOMMUs the chosen qemu reports, narrowed to what vm.env.j2 renders. `qemu`
        # is the group holding qemu_source/qemu_binary, so the query hits that exact
        # binary; a missing/unbuilt qemu falls back to the full supported set.
        from f.qsu.binaries import iommu_options
        return iommu_options(qemu or {}, filterText)
