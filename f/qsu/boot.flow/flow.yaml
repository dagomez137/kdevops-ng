summary: "QEMU/systemd VM Boot"
description: |
  Boot a QEMU-in-systemd VM — the orchestrate half that pairs an `f/kernel/build`
  kernel and an `f/nix/build` imageless closure into a running, machined-registered
  guest. The Windmill reimplementation of kdevops's `qsu` role (render-units +
  render-per-vm + bringup); see `docs/windmill/qsu-execution-model.md`.

  Every step is `tag_override: vm`, so it runs on the dedicated `vm` worker (the only
  one mounting the host `~/.config/systemd` + `~/.local/state/qemu-system` the renders
  write into). NOT `same_worker`: that pins a flow to whatever worker runs it and
  bypasses the per-step tag, which would land the renders on a build worker without
  those mounts. The host-forked unit reads `/nix/store` + `WORKERS_DIR` regardless of
  worker, so the kernel/closure may be built on `default`.

  1. `render_qemu_system` — `qemu-system@.service` (once), `<vm>.env`, the per-VM
     `qemu-system@<vm>.service.d/override.conf`, and the `qmp-powerdown` helper.
  2. `render_virtiofsd` — `virtiofsd@.service`/`.socket` (once) and per-share env +
     drop-in for each composed share (wired from the qemu-system step's `shares`).
  3. `create_nvme` — `qemu-img create --format qcow2` the per-VM qcow2 backing files
     (qemu-img from the same store output as the emulator).
  4. `boot` — `daemon-reload`, restart the share sockets, start `qemu-system@<vm>`,
     wait for the guest sshd banner.

  Properties are upstream **QEMU flag names** (the rendered units' variable surface). Pass the
  `kernel`/`closure` build manifests to supply `-kernel`/`-initrd`/`-append` and the
  `/lib/modules` share. Returns the `boot` step's access manifest.

  Equivalent manual workflow, once the units are rendered, against the host
  `systemd --user` manager (long-form, mirroring qsu's README quick-start):

      systemctl --user daemon-reload
      systemctl --user start qemu-system@<vm>
      machinectl --user list
      journalctl --user-unit=qemu-system@<vm>.service
      systemctl --user stop qemu-system@<vm>
value:
  modules:
    - id: render_qemu_system
      summary: Render qemu-system@.service + <vm>.env + drop-in
      value:
        type: script
        path: f/qsu/qemu-system/render
        tag_override: vm
        input_transforms:
          vm_name:
            type: javascript
            expr: flow_input.vm?.vm_name
          auto_vm_name:
            type: javascript
            expr: flow_input.vm?.auto_vm_name
          cpu:
            type: javascript
            expr: flow_input.qemu?.cpu
          accel:
            type: javascript
            expr: flow_input.qemu?.accel
          ram:
            type: javascript
            expr: flow_input.qemu?.ram
          cpus:
            type: javascript
            expr: flow_input.qemu?.cpus
          machine_type:
            type: javascript
            expr: flow_input.qemu?.machine_type
          ssh_port:
            type: javascript
            expr: 'flow_input.networking?.custom_ssh_port ? flow_input.networking?.ssh_port : null'
          vsock_cid:
            type: javascript
            expr: 'flow_input.networking?.custom_vsock_cid ? flow_input.networking?.vsock_cid : null'
          ssh_port_base:
            type: javascript
            expr: flow_input.networking?.ssh_port_base
          vsock_cid_base:
            type: javascript
            expr: flow_input.networking?.vsock_cid_base
          vm_index:
            type: javascript
            expr: flow_input.networking?.vm_index
          iommu:
            type: javascript
            expr: flow_input.qemu?.iommu
          qemu_source:
            type: javascript
            expr: flow_input.qemu?.qemu_source
          qemu_binary:
            type: javascript
            expr: flow_input.qemu?.qemu_binary
          custom_virtiofsd:
            type: javascript
            expr: flow_input.sharing?.custom_virtiofsd
          virtiofsd_binary:
            type: javascript
            expr: flow_input.sharing?.virtiofsd_binary
          kernel_image:
            type: javascript
            expr: flow_input.kernel_boot?.kernel_image
          kernel_initrd:
            type: javascript
            expr: flow_input.kernel_boot?.kernel_initrd
          kernel_append:
            type: javascript
            expr: flow_input.kernel_boot?.kernel_append
          modules_dir:
            type: javascript
            expr: flow_input.sharing?.modules_dir
          shares:
            type: javascript
            expr: flow_input.sharing?.shares
          fstests:
            type: javascript
            expr: flow_input.sharing?.fstests
          home_share:
            type: javascript
            expr: flow_input.sharing?.home_share
          home_share_readwrite:
            type: javascript
            expr: flow_input.sharing?.home_share_readwrite
          controller_share:
            type: javascript
            expr: flow_input.sharing?.controller_share
          controller_share_tag:
            type: javascript
            expr: flow_input.sharing?.controller_share_tag
          controller_share_dir:
            type: javascript
            expr: flow_input.sharing?.controller_share_dir
          controller_share_guest_mount:
            type: javascript
            expr: flow_input.sharing?.controller_share_guest_mount
          controller_share_readwrite:
            type: javascript
            expr: flow_input.sharing?.controller_share_readwrite
          nvme_drive_count:
            type: javascript
            expr: flow_input.nvme?.nvme_drive_count
          logical_block_size:
            type: javascript
            expr: flow_input.nvme?.logical_block_size
          physical_block_size:
            type: javascript
            expr: flow_input.nvme?.physical_block_size
          min_io_size:
            type: javascript
            expr: flow_input.nvme?.min_io_size
          opt_io_size:
            type: javascript
            expr: flow_input.nvme?.opt_io_size
          discard_granularity:
            type: javascript
            expr: flow_input.nvme?.discard_granularity
          write_cache:
            type: javascript
            expr: flow_input.nvme?.write_cache
          mdts:
            type: javascript
            expr: flow_input.nvme?.mdts
          cmb_size_mb:
            type: javascript
            expr: flow_input.nvme?.cmb_size_mb
          legacy_cmb:
            type: javascript
            expr: flow_input.nvme?.legacy_cmb
          pmr_size:
            type: javascript
            expr: flow_input.nvme?.pmr_size
          pmr_share:
            type: javascript
            expr: flow_input.nvme?.pmr_share
          pmr_pmem:
            type: javascript
            expr: flow_input.nvme?.pmr_pmem
          atomic_dn:
            type: javascript
            expr: flow_input.nvme?.atomic_dn
          atomic_awun:
            type: javascript
            expr: flow_input.nvme?.atomic_awun
          atomic_awupf:
            type: javascript
            expr: flow_input.nvme?.atomic_awupf
          atomic_nawun:
            type: javascript
            expr: flow_input.nvme?.atomic_nawun
          atomic_nawupf:
            type: javascript
            expr: flow_input.nvme?.atomic_nawupf
          atomic_nabsn:
            type: javascript
            expr: flow_input.nvme?.atomic_nabsn
          atomic_nabspf:
            type: javascript
            expr: flow_input.nvme?.atomic_nabspf
          atomic_nabo:
            type: javascript
            expr: flow_input.nvme?.atomic_nabo
          kernel:
            type: javascript
            expr: flow_input.kernel_boot?.kernel
          closure:
            type: javascript
            expr: flow_input.kernel_boot?.closure
          emit_vars_yaml_snapshot:
            type: javascript
            expr: flow_input.orchestration?.emit_vars_yaml_snapshot
      timeout:
        type: static
        value: 120
    - id: render_virtiofsd
      summary: Render virtiofsd@ units + per-share env/drop-in
      value:
        type: script
        path: f/qsu/virtiofsd/render
        tag_override: vm
        input_transforms:
          vm_name:
            type: javascript
            expr: results.render_qemu_system.vm_name
          shares:
            type: javascript
            expr: results.render_qemu_system.shares
          custom_virtiofsd:
            type: javascript
            expr: flow_input.sharing?.custom_virtiofsd
          virtiofsd_binary:
            type: javascript
            expr: flow_input.sharing?.virtiofsd_binary
          machine_type:
            type: javascript
            expr: flow_input.qemu?.machine_type
      timeout:
        type: static
        value: 120
    - id: create_nvme
      summary: qemu-img create the per-VM qcow2 drives
      value:
        type: script
        path: f/qsu/nvme/create
        tag_override: vm
        input_transforms:
          vm_name:
            type: javascript
            expr: results.render_qemu_system.vm_name
          nvme_drive_count:
            type: javascript
            expr: flow_input.nvme?.nvme_drive_count
          nvme_drive_size_gb:
            type: javascript
            expr: flow_input.nvme?.nvme_drive_size_gb
      retry:
        constant:
          attempts: 2
          seconds: 5
      timeout:
        type: static
        value: 300
    - id: boot
      summary: daemon-reload, start, wait for SSH
      value:
        type: script
        path: f/qsu/boot
        tag_override: vm
        input_transforms:
          vm_name:
            type: javascript
            expr: results.render_qemu_system.vm_name
          ssh_port:
            type: javascript
            expr: results.render_qemu_system.ssh_port
          vsock_cid:
            type: javascript
            expr: results.render_qemu_system.vsock_cid
          wait_timeout:
            type: javascript
            expr: flow_input.orchestration?.wait_timeout
      timeout:
        type: static
        value: 600
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm
    - qemu
    - networking
    - kernel_boot
    - sharing
    - nvme
    - orchestration
  properties:
    vm:
      title: VM
      type: object
      description: Guest name and how it is assigned.
      default: {}
      order:
        - vm_name
        - auto_vm_name
      required:
        - vm_name
      properties:
        vm_name:
          title: VM Name
          type: string
          description: Guest name — the systemd instance (`qemu-system@<vm_name>`) and machined machine name. Used when `auto_vm_name` is off.
          default: nixos
          showExpr: "fields.auto_vm_name === false"
        auto_vm_name:
          title: Auto VM Name
          type: boolean
          description: Derive the VM name from the flow job id (`vm-<job-id>`) so each run is unique and collision-free. Off = use `vm_name`.
          default: true
    qemu:
      title: QEMU
      type: object
      description: Emulator source and machine model — `-cpu`/`-accel`/`-m`/`-smp`/`-machine`.
      default: {}
      order:
        - qemu_source
        - qemu_binary
        - cpu
        - accel
        - ram
        - cpus
        - machine_type
        - iommu
      properties:
        qemu_source:
          title: QEMU Source
          type: string
          description: "Where the `qemu-system-*` binary comes from: `nixpkgs` is the `qemu` package from `nixpkgs`, provided by the vendored `nixos-flake` (the same QEMU the NixOS closure is built against; `qemu-img` shares its `/nix/store` output); `qemu-build` is a QEMU you built from source with the `f/qemu/build` flow."
          default: nixpkgs
          enum:
            - nixpkgs
            - qemu-build
        qemu_binary:
          title: QEMU Binary
          type: string
          description: Path to the `qemu-system-*` from `f/qemu/build` (its destdir `bin/`).
          default: ""
          showExpr: "fields.qemu_source === \"qemu-build\""
        cpu:
          title: CPU
          type: string
          description: Select CPU model (`-cpu`; `-cpu help` for the list and additional feature selection). Enum reflects the default reproducible QEMU.
          default: "host"
          enum:
            - "486"
            - "486-v1"
