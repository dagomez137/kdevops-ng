        qemu_binary:
          type: string
          description: |-
            Path to the `qemu-system-*` from `f/qemu/build` (its destdir
            `bin/`).
          default: ''
          showExpr: fields.qemu_source === "qemu-build"
          title: QEMU Binary
        qemu_source:
          type: string
          description: |-
            Where the `qemu-system-*` binary comes from: `nixpkgs` is the `qemu`
            package from `nixpkgs`, provided by the vendored `nixos-flake` (the
            same QEMU the NixOS closure is built against; `qemu-img` shares its
            `/nix/store` output); `qemu-build` is a QEMU you built from source
            with the `f/qemu/build` flow.
          default: nixpkgs
          enum:
            - nixpkgs
            - qemu-build
          title: QEMU Source
        ram:
          type: integer
          description: |-
            Sets guest startup RAM size to `megs` megabytes (`-m`). Default is
            128 MiB.
          default: 4096
          title: RAM
      title: QEMU
    sharing:
      type: object
      description: |-
        virtiofs shares (modules, controller) and the virtiofsd binary.
      default: {}
      order:
        - modules_dir
        - custom_virtiofsd
        - virtiofsd_binary
        - home_share
        - home_share_readwrite
        - controller_share
        - controller_share_tag
        - controller_share_dir
        - controller_share_guest_mount
        - controller_share_readwrite
      properties:
        controller_share:
          type: boolean
          description: |-
            Append one operator-defined virtiofs share exposing a controller
            directory to the guest.
          default: false
        controller_share_dir:
          type: string
          description: Absolute controller path to share. Empty = `$HOME`.
          default: ''
          showExpr: fields.controller_share === true
        controller_share_guest_mount:
          type: string
          description: |-
            Guest mount point for the controller share. Empty = same as the
            controller path.
          default: ''
          showExpr: fields.controller_share === true
        controller_share_readwrite:
          type: boolean
          description: |-
            Mount the controller share read-write (default read-only).
          default: false
          showExpr: fields.controller_share === true
        controller_share_tag:
          type: string
          description: virtiofs tag for the controller share.
          default: controller-share
          showExpr: fields.controller_share === true
        custom_virtiofsd:
          type: boolean
          description: |-
            Use a custom `virtiofsd` instead of the reproducible `nixos-flake`
            one.
          default: false
          title: Custom virtiofsd
        home_share:
          type: boolean
          description: |-
            Predefined `home` share (host serving): serve the operator's host
            `$HOME` into the guest at the same absolute path (tag `home`). Pair
            with `NixOS: Guest → home` so the guest mounts it.
          default: false
          title: Home Share
        home_share_readwrite:
          type: boolean
          description: Mount the home share read-write (default read-only).
          default: false
          showExpr: fields.home_share === true
          title: Home Share Readwrite
        modules_dir:
          type: string
          description: |-
            Override the host modules tree shared at `/lib/modules` (else from
            `kernel`).
          default: ''
        virtiofsd_binary:
          type: string
          description: |-
            Path to a custom `virtiofsd` (e.g. a nix derivation output or your
            own build).
          default: ''
          showExpr: fields.custom_virtiofsd === true
          title: virtiofsd Binary
      title: File sharing
    vm:
      type: object
      description: Guest name and how it is assigned.
      default: {}
      order:
        - vm_name
        - auto_vm_name
      properties:
        auto_vm_name:
          type: boolean
          description: |-
            Derive the VM name from the flow job id (`vm-<job-id>`) so each run
            is unique and collision-free. Off = use `vm_name`.
          default: true
          title: Auto VM Name
        vm_name:
          type: string
          description: |-
            Guest name: the systemd instance (`qemu-system@<vm_name>`) and
            machined machine name. Used when `auto_vm_name` is off.
          default: nixos
          showExpr: fields.auto_vm_name === false
          title: VM Name
      required:
        - vm_name
      title: VM
  required: []
  x-windmill-dyn-select-code: >
    def list_iommu(filterText: str = "", qemu: dict = None, **_: object) ->
    list:
        # vIOMMUs the chosen qemu reports, narrowed to what vm.env.j2 renders. `qemu`
        # is the group holding qemu_source/qemu_binary, so the query hits that exact
        # binary; a missing/unbuilt qemu falls back to the full supported set.
        from f.qsu.binaries import iommu_options
        return iommu_options(qemu or {}, filterText)
  x-windmill-dyn-select-lang: python3
