            - "qemu64"
            - "qemu64-v1"
            - "base"
            - "host"
            - "max"
        accel:
          type: string
          description: Enable an accelerator (`-accel`). Depending on the target, `kvm`, `mshv` or `tcg` can be available; by default `tcg` is used.
          default: "kvm"
          enum:
            - "tcg"
            - "mshv"
            - "kvm"
        ram:
          title: RAM
          type: integer
          description: Sets guest startup RAM size to `megs` megabytes (`-m`). Default is 128 MiB.
          default: 4096
        cpus:
          title: CPUs
          type: integer
          description: Simulate an SMP system with `n` CPUs initially present on the machine type board (`-smp`).
          default: 4
        machine_type:
          type: string
          description: Select the emulated machine by name (`-machine type=`; `-machine help` lists available machines).
          default: "q35"
          enum:
            - "microvm"
            - "nitro-enclave"
            - "pc-i440fx-9.2"
            - "pc-i440fx-9.1"
            - "pc-i440fx-9.0"
            - "pc-i440fx-8.2"
            - "pc-i440fx-8.1"
