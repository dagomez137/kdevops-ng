summary: Boot a VM
description: |-
  Boot a QEMU-in-systemd VM: the orchestrate half that pairs an `f/kernel/build`
  kernel and an `f/nix/build` imageless closure into a running,
  machined-registered guest. The Windmill reimplementation of kdevops's `qsu`
  role (render-units + render-per-vm + bringup); see
  `notes/windmill/qsu-execution-model.md`.

  Every step is `tag_override: vm`, so it runs on the dedicated `vm` worker (the
  only one mounting the host `~/.config/systemd` + `~/.local/state/qemu-system`
  the renders write into). NOT `same_worker`: that pins a flow to whatever
  worker runs it and bypasses the per-step tag, which would land the renders on
  a build worker without those mounts. The host-forked unit reads `/nix/store` +
  `WORKERS_DIR` regardless of worker, so the kernel/closure may be built on
  `default`.

  1. `render_qemu_system`: `qemu-system@.service` (once), `<vm>.env`, the per-VM
  `qemu-system@<vm>.service.d/override.conf`, and the `qmp-powerdown` helper. 2.
  `render_virtiofsd`: `virtiofsd@.service`/`.socket` (once) and per-share env +
  drop-in for each composed share (wired from the qemu-system step's `shares`).
  3. `create_nvme`: `qemu-img create --format qcow2` the per-VM qcow2 backing
  files (qemu-img from the same store output as the emulator). 4. `boot`:
  `daemon-reload`, restart the share sockets, start `qemu-system@<vm>`, wait for
  the guest sshd banner.

  Properties are upstream **QEMU flag names** (the rendered units' variable
  surface). Pass the `kernel`/`closure` build manifests to supply
  `-kernel`/`-initrd`/`-append` and the `/lib/modules` share. Returns the `boot`
  step's access manifest.

  Equivalent manual workflow, once the units are rendered, against the host
  `systemd --user` manager (long-form, mirroring qsu's README quick-start):

  systemctl --user daemon-reload systemctl --user start qemu-system@<vm>
  systemctl --user list-units 'qemu-system@*' journalctl
  --user-unit=qemu-system@<vm>.service systemctl --user stop qemu-system@<vm>
value:
  modules:
    - id: render_qemu_system
      summary: Render qemu-system@.service + <vm>.env + drop-in
      value:
        type: script
        input_transforms:
          accel:
            type: javascript
            expr: flow_input.qemu?.accel
          atomic_awun:
            type: javascript
            expr: flow_input.nvme?.atomic_awun
          atomic_awupf:
            type: javascript
            expr: flow_input.nvme?.atomic_awupf
          atomic_dn:
            type: javascript
            expr: flow_input.nvme?.atomic_dn
          atomic_nabo:
            type: javascript
            expr: flow_input.nvme?.atomic_nabo
          atomic_nabsn:
            type: javascript
            expr: flow_input.nvme?.atomic_nabsn
          atomic_nabspf:
            type: javascript
            expr: flow_input.nvme?.atomic_nabspf
          atomic_nawun:
            type: javascript
            expr: flow_input.nvme?.atomic_nawun
          atomic_nawupf:
            type: javascript
            expr: flow_input.nvme?.atomic_nawupf
          auto_vm_name:
            type: javascript
            expr: flow_input.vm?.auto_vm_name
          closure:
            type: javascript
            expr: flow_input.kernel_boot?.closure
          cmb_size_mb:
            type: javascript
            expr: flow_input.nvme?.cmb_size_mb
          controller_share:
            type: javascript
            expr: flow_input.sharing?.controller_share
          controller_share_dir:
            type: javascript
            expr: flow_input.sharing?.controller_share_dir
          controller_share_guest_mount:
            type: javascript
            expr: flow_input.sharing?.controller_share_guest_mount
          controller_share_readwrite:
            type: javascript
            expr: flow_input.sharing?.controller_share_readwrite
          controller_share_tag:
            type: javascript
            expr: flow_input.sharing?.controller_share_tag
          cpu:
            type: javascript
            expr: flow_input.qemu?.cpu
          cpus:
            type: javascript
            expr: flow_input.qemu?.cpus
          custom_virtiofsd:
            type: javascript
            expr: flow_input.sharing?.custom_virtiofsd
          discard_granularity:
            type: javascript
            expr: flow_input.nvme?.discard_granularity
          emit_vars_yaml_snapshot:
            type: javascript
            expr: flow_input.orchestration?.emit_vars_yaml_snapshot
          fstests:
            type: javascript
            expr: flow_input.sharing?.fstests
          home_share:
            type: javascript
            expr: flow_input.sharing?.home_share
          home_share_readwrite:
            type: javascript
            expr: flow_input.sharing?.home_share_readwrite
          iommu:
            type: javascript
            expr: flow_input.qemu?.iommu
          kernel:
            type: javascript
            expr: flow_input.kernel_boot?.kernel
          kernel_append:
            type: javascript
            expr: flow_input.kernel_boot?.kernel_append
          kernel_image:
            type: javascript
            expr: flow_input.kernel_boot?.kernel_image
          kernel_initrd:
            type: javascript
            expr: flow_input.kernel_boot?.kernel_initrd
          legacy_cmb:
            type: javascript
            expr: flow_input.nvme?.legacy_cmb
          logical_block_size:
            type: javascript
            expr: flow_input.nvme?.logical_block_size
          machine_type:
            type: javascript
            expr: flow_input.qemu?.machine_type
          mdts:
            type: javascript
            expr: flow_input.nvme?.mdts
          min_io_size:
            type: javascript
            expr: flow_input.nvme?.min_io_size
          modules_dir:
            type: javascript
            expr: flow_input.sharing?.modules_dir
          nvme_drive_count:
            type: javascript
            expr: flow_input.nvme?.nvme_drive_count
          opt_io_size:
            type: javascript
            expr: flow_input.nvme?.opt_io_size
          physical_block_size:
            type: javascript
            expr: flow_input.nvme?.physical_block_size
          pmr_pmem:
            type: javascript
            expr: flow_input.nvme?.pmr_pmem
          pmr_share:
            type: javascript
            expr: flow_input.nvme?.pmr_share
          pmr_size:
            type: javascript
            expr: flow_input.nvme?.pmr_size
          qemu_binary:
            type: javascript
            expr: flow_input.qemu?.qemu_binary
          qemu_source:
            type: javascript
            expr: flow_input.qemu?.qemu_source
          ram:
            type: javascript
            expr: flow_input.qemu?.ram
          shares:
            type: javascript
            expr: flow_input.sharing?.shares
          ssh_port:
            type: javascript
            expr: 'flow_input.networking?.custom_ssh_port ? flow_input.networking?.ssh_port
              : null'
          ssh_port_base:
            type: javascript
            expr: flow_input.networking?.ssh_port_base
          virtiofsd_binary:
            type: javascript
            expr: flow_input.sharing?.virtiofsd_binary
          vm_index:
            type: javascript
            expr: flow_input.networking?.vm_index
          vm_name:
            type: javascript
            expr: flow_input.vm?.vm_name
          vsock_cid:
            type: javascript
            expr: 'flow_input.networking?.custom_vsock_cid ?
              flow_input.networking?.vsock_cid : null'
          vsock_cid_base:
            type: javascript
            expr: flow_input.networking?.vsock_cid_base
          write_cache:
            type: javascript
            expr: flow_input.nvme?.write_cache
        path: f/qsu/qemu-system/render
        tag_override: vm
      timeout:
        type: static
        value: 120
    - id: render_virtiofsd
      summary: Render virtiofsd@ units + per-share env/drop-in
      value:
        type: script
        input_transforms:
          custom_virtiofsd:
            type: javascript
            expr: flow_input.sharing?.custom_virtiofsd
          machine_type:
            type: javascript
            expr: flow_input.qemu?.machine_type
          shares:
            type: javascript
            expr: results.render_qemu_system.shares
          virtiofsd_binary:
            type: javascript
            expr: flow_input.sharing?.virtiofsd_binary
          vm_name:
            type: javascript
            expr: results.render_qemu_system.vm_name
        path: f/qsu/virtiofsd/render
        tag_override: vm
      timeout:
        type: static
        value: 120
    - id: create_nvme
      summary: qemu-img create the per-VM qcow2 drives
      value:
        type: script
        input_transforms:
          nvme_drive_count:
            type: javascript
            expr: flow_input.nvme?.nvme_drive_count
          nvme_drive_size_gb:
            type: javascript
            expr: flow_input.nvme?.nvme_drive_size_gb
          vm_name:
            type: javascript
            expr: results.render_qemu_system.vm_name
        path: f/qsu/nvme/create
        tag_override: vm
      retry:
        constant:
          attempts: 2
          seconds: 5
      timeout:
        type: static
        value: 300
    - id: boot
      summary: daemon-reload, start, wait for SSH
      value:
        type: script
        input_transforms:
          ssh_port:
            type: javascript
            expr: results.render_qemu_system.ssh_port
          vm_name:
            type: javascript
            expr: results.render_qemu_system.vm_name
          vsock_cid:
            type: javascript
            expr: results.render_qemu_system.vsock_cid
          wait_timeout:
            type: javascript
            expr: flow_input.orchestration?.wait_timeout
        path: f/qsu/boot
        tag_override: vm
      timeout:
        type: static
        value: 600
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm
    - qemu
    - networking
    - kernel_boot
    - sharing
    - nvme
    - orchestration
  properties:
    kernel_boot:
      type: object
      description: |-
        Direct kernel boot (`-kernel`/`-initrd`/`-append`) from the build
        manifests or explicit overrides.
      default: {}
      order:
        - kernel
        - closure
        - kernel_image
        - kernel_initrd
        - kernel_append
      properties:
        closure:
          type: object
          description: |-
            The `f/nix/build_closure` result manifest (`toplevel`, `init`,
            `initrd`); supplies `-initrd` and the `init=` in `-append`.
          default: {}
        kernel:
          type: object
          description: |-
            The `f/kernel/build` result manifest (`vmlinuz`/`bzImage`,
            `modules_dir`, `uts_release`); supplies `-kernel` and the
            `/lib/modules` share.
          default: {}
        kernel_append:
          type: string
          description: |-
            Override the kernel cmdline (`-append`; else `root=tmpfs ...
            init=<closure.init>`).
          default: ''
        kernel_image:
          type: string
          description: Override the `-kernel` image (else from `kernel`).
          default: ''
        kernel_initrd:
          type: string
          description: Override the `-initrd` (else from `closure`).
          default: ''
      title: Kernel boot
    networking:
      type: object
      description: |-
        Host vsock/SSH forwarding; the base + a per-VM offset (`vm_index`, or a
        hash of the VM name when `vm_index` is 0) pick the CID/port unless an
        explicit override is enabled.
      default: {}
      order:
        - vsock_cid_base
        - custom_vsock_cid
        - vsock_cid
        - ssh_port_base
        - custom_ssh_port
        - ssh_port
        - vm_index
      properties:
        custom_ssh_port:
          type: boolean
          description: |-
            Set an explicit host port instead of `ssh_port_base + vm_index`.
          default: false
          title: Custom SSH Port
        custom_vsock_cid:
          type: boolean
          description: |-
            Set an explicit vsock CID instead of `vsock_cid_base + vm_index`.
          default: false
          title: Custom VSOCK CID
        ssh_port:
          type: integer
          description: |-
            Host port forwarded to guest `:22` (`-nic user,hostfwd=`).
          showExpr: fields.custom_ssh_port === true
          title: SSH Port
        ssh_port_base:
          type: integer
          description: |-
            Base host port; guest N forwards `ssh_port_base + vm_index`.
          default: 10022
          title: SSH Port Base
        vm_index:
          type: integer
          description: |-
            Offset added to `vsock_cid_base`/`ssh_port_base`. `0` (default)
            derives a stable offset from the VM name so concurrent auto-named
            VMs don't collide on the host port/CID; set a non-zero value for
            deterministic manual allocation.
          default: 0
          title: VM Index
        vsock_cid:
          type: integer
          description: vsock context id for `-device vhost-vsock`.
          showExpr: fields.custom_vsock_cid === true
          title: VSOCK CID
        vsock_cid_base:
          type: integer
          description: Base vsock cid; guest N uses `vsock_cid_base + vm_index`.
          default: 100
          title: VSOCK CID Base
      title: Networking
    nvme:
      type: object
      description: |-
        Emulated NVMe drives (`-device nvme`/`nvme-ns` + a qcow2 per drive). The
        per-drive knobs are the QEMU device properties verbatim; see
        `qemu-system-x86_64 -device nvme,help` and `-device nvme-ns,help`.
      default: {}
      order:
        - nvme_drive_count
        - nvme_drive_size_gb
        - customize_drives
        - logical_block_size
        - physical_block_size
        - min_io_size
        - opt_io_size
        - discard_granularity
        - write_cache
        - mdts
        - cmb_size_mb
        - legacy_cmb
        - pmr_size
        - pmr_share
        - pmr_pmem
        - atomic_dn
        - atomic_awun
        - atomic_awupf
        - atomic_nawun
        - atomic_nawupf
        - atomic_nabsn
        - atomic_nabspf
        - atomic_nabo
      properties:
        atomic_awun:
          type: string
          description: |-
            Atomic Write Unit Normal (AWUN), 0-based, in logical blocks:
            `-device nvme,atomic.awun=`. Empty = QEMU default. Single value or
            per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Atomic Write Unit Normal (AWUN)
        atomic_awupf:
          type: string
          description: |-
            Atomic Write Unit Power Fail (AWUPF), 0-based: `-device
            nvme,atomic.awupf=`. Empty = QEMU default. Single value or per-drive
            comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Atomic Write Unit Power Fail (AWUPF)
        atomic_dn:
          type: boolean
          description: |-
            Disable Normal (DN): `-device nvme,atomic.dn=`. Set = AWUN/NAWUN
            disabled, so AWUPF/NAWUPF govern atomicity for all writes. Off =
            QEMU default.
          default: false
          showExpr: fields.customize_drives === true
          title: Disable Normal (DN)
        atomic_nabo:
          type: string
          description: |-
            Namespace Atomic Boundary Offset (NABO): `-device
            nvme-ns,atomic.nabo=`. Forces explicit-namespace mode. Empty = QEMU
            default. Single value or per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Boundary Offset (NABO)
        atomic_nabsn:
          type: string
          description: |-
            Namespace Atomic Boundary Size Normal (NABSN): `-device
            nvme-ns,atomic.nabsn=`. Forces explicit-namespace mode. Empty = QEMU
            default. Single value or per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Boundary Size Normal (NABSN)
        atomic_nabspf:
          type: string
          description: |-
            Namespace Atomic Boundary Size Power Fail (NABSPF): `-device
            nvme-ns,atomic.nabspf=`. Forces explicit-namespace mode. Empty =
            QEMU default. Single value or per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Boundary Size Power Fail (NABSPF)
        atomic_nawun:
          type: string
          description: |-
            Namespace Atomic Write Unit Normal (NAWUN), 0-based: `-device
            nvme-ns,atomic.nawun=`. Setting any per-namespace atomic switches
            the drive to explicit `-device nvme` + `-device nvme-ns`. Empty =
            QEMU default. Single value or per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Write Unit Normal (NAWUN)
        atomic_nawupf:
          type: string
          description: |-
            Namespace Atomic Write Unit Power Fail (NAWUPF), 0-based: `-device
            nvme-ns,atomic.nawupf=`. Forces explicit-namespace mode. Empty =
            QEMU default. Single value or per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Namespace Atomic Write Unit Power Fail (NAWUPF)
        cmb_size_mb:
          type: string
          description: |-
            Controller Memory Buffer size in MiB: `-device nvme,cmb_size_mb=`
            (host RAM on PCI BAR 2; coexists with PMR on BAR 4/5). Empty = no
            CMB. Single value or per-drive comma-list (`64,0` = drive 0 only).
          default: ''
          showExpr: fields.customize_drives === true
          title: CMB Size (MiB)
        customize_drives:
          type: boolean
          description: |-
            Expose the per-drive NVMe device knobs below. Off = 4Kn drives
            (4096-byte blocks) with QEMU defaults for everything else. Each knob
            takes a single value applied to every drive, or a comma-list
            assigned by drive index (`4096,512` → drive 0 = 4096, drive 1 =
            512).
          default: false
          title: Customize Drives
        discard_granularity:
          type: string
          description: |-
            Discard granularity in bytes: `-device nvme-ns,discard_granularity=`
            (BlockConf). Single value or per-drive comma-list.
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Discard Granularity
        legacy_cmb:
          type: boolean
          description: |-
            Use the NVMe 1.3 CMB register scheme (CMBLOC/CMBSZ always enabled):
            `-device nvme,legacy-cmb=on`. Off = the 1.4 scheme. Applies to every
            CMB-enabled drive; no effect without `cmb_size_mb`.
          default: false
          showExpr: fields.customize_drives === true
          title: Legacy CMB (v1.3)
        logical_block_size:
          type: string
          description: |-
            Logical block (LBA) size in bytes: `-device
            nvme-ns,logical_block_size=` (BlockConf). `4096` = 4Kn, `512` =
            512-byte sectors. Single value or per-drive comma-list.
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Logical Block Size
        mdts:
          type: string
          description: |-
            Maximum Data Transfer Size (MDTS) as a power of two in MPSMIN units:
            `-device nvme,mdts=`. Empty = QEMU default. Single value or
            per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Maximum Data Transfer Size (MDTS)
        min_io_size:
          type: string
          description: |-
            Minimum I/O size hint in bytes: `-device nvme-ns,min_io_size=`
            (BlockConf). Single value or per-drive comma-list.
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Minimum I/O Size
        nvme_drive_count:
          type: integer
          description: |-
            Number of NVMe drives (`-device nvme` + a qcow2 file each).
          default: 4
          title: Drive Count
        nvme_drive_size_gb:
          type: integer
          description: Virtual size in GiB for each qcow2 NVMe backing file.
          default: 20
          title: Drive Size (GiB)
        opt_io_size:
          type: string
          description: |-
            Optimal I/O size hint in bytes: `-device nvme-ns,opt_io_size=`
            (BlockConf). Single value or per-drive comma-list.
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Optimal I/O Size
        physical_block_size:
          type: string
          description: |-
            Physical block size in bytes: `-device nvme-ns,physical_block_size=`
            (BlockConf). Single value or per-drive comma-list.
          default: '4096'
          showExpr: fields.customize_drives === true
          title: Physical Block Size
        pmr_pmem:
          type: boolean
          description: |-
            Real persistent-memory flush semantics for the PMR backing file
            (`-object memory-backend-file,pmem=on`). Off = QEMU default. Applies
            to every PMR-enabled drive.
          default: false
          showExpr: fields.customize_drives === true
          title: PMR pmem
        pmr_share:
          type: boolean
          description: |-
            Write guest PMR contents through to the backing file (`-object
            memory-backend-file,share=on`) so they survive a restart, stored in
            the per-VM state dir. Off = volatile (`share=off`). Applies to every
            PMR-enabled drive.
          default: true
          showExpr: fields.customize_drives === true
          title: PMR Persistent (share=on)
        pmr_size:
          type: string
          description: |-
            Persistent Memory Region size in bytes: `-object
            memory-backend-file,size=` linked from `-device nvme,pmrdev=` (BAR
            4/5; coexists with CMB). Must be a power of 2 and at least 16. Empty
            = no PMR. Single value or per-drive comma-list (`16777216,0` = drive
            0 only).
          default: ''
          showExpr: fields.customize_drives === true
          title: PMR Size (bytes)
        write_cache:
          type: string
          description: |-
            Volatile Write Cache (VWC): `-device nvme-ns,write-cache=`
            (BlockConf): `on`, `off` or `auto`. Empty = QEMU default. Single
            value or per-drive comma-list.
          default: ''
          showExpr: fields.customize_drives === true
          title: Write Cache (VWC)
      title: NVMe
    orchestration:
      type: object
      description: Flow-level boot wait and debug snapshot.
      default: {}
      order:
        - wait_timeout
        - emit_vars_yaml_snapshot
      properties:
        emit_vars_yaml_snapshot:
          type: boolean
          description: Also write the debug `<vm>.yaml` vars snapshot.
          default: false
          title: Emit Vars YAML Snapshot
        wait_timeout:
          type: integer
          description: |-
            Seconds to poll `127.0.0.1:<ssh_port>` for the guest sshd banner.
          default: 300
      title: Orchestration
    qemu:
      type: object
      description: |-
        Emulator source and machine model:
        `-cpu`/`-accel`/`-m`/`-smp`/`-machine`.
      default: {}
      order:
        - qemu_source
        - qemu_binary
        - cpu
        - accel
        - ram
        - cpus
        - machine_type
        - iommu
      properties:
        accel:
          type: string
          description: |-
            Enable an accelerator (`-accel`). Depending on the target, `kvm`,
            `mshv` or `tcg` can be available; by default `tcg` is used.
          default: kvm
          enum:
            - tcg
            - mshv
            - kvm
        cpu:
          type: string
          description: |-
            Select CPU model (`-cpu`; `-cpu help` for the list and additional
            feature selection). Enum reflects the default reproducible QEMU.
          default: host
          enum:
            - '486'
            - 486-v1
            - Broadwell
            - Broadwell-IBRS
            - Broadwell-noTSX
            - Broadwell-noTSX-IBRS
            - Broadwell-v1
            - Broadwell-v2
            - Broadwell-v3
            - Broadwell-v4
            - Cascadelake-Server
            - Cascadelake-Server-noTSX
            - Cascadelake-Server-v1
            - Cascadelake-Server-v2
            - Cascadelake-Server-v3
            - Cascadelake-Server-v4
            - Cascadelake-Server-v5
            - ClearwaterForest
            - ClearwaterForest-v1
            - Conroe
            - Conroe-v1
            - Cooperlake
            - Cooperlake-v1
            - Cooperlake-v2
            - Denverton
            - Denverton-v1
            - Denverton-v2
            - Denverton-v3
            - Dhyana
            - Dhyana-v1
            - Dhyana-v2
            - EPYC
            - EPYC-Genoa
            - EPYC-Genoa-v1
            - EPYC-Genoa-v2
            - EPYC-IBPB
            - EPYC-Milan
            - EPYC-Milan-v1
            - EPYC-Milan-v2
            - EPYC-Milan-v3
            - EPYC-Rome
            - EPYC-Rome-v1
            - EPYC-Rome-v2
            - EPYC-Rome-v3
            - EPYC-Rome-v4
            - EPYC-Rome-v5
            - EPYC-Turin
            - EPYC-Turin-v1
            - EPYC-v1
            - EPYC-v2
            - EPYC-v3
            - EPYC-v4
            - EPYC-v5
            - GraniteRapids
