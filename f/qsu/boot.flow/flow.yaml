            - "pc-i440fx-7.1"
            - "pc-i440fx-7.0"
            - "pc-i440fx-6.2"
            - "pc-i440fx-6.1"
            - "pc-i440fx-6.0"
            - "pc-i440fx-5.2"
            - "pc-i440fx-5.1"
            - "pc-i440fx-5.0"
            - "pc"
            - "pc-i440fx-10.2"
            - "pc-i440fx-10.1"
            - "pc-i440fx-10.0"
            - "pc-q35-9.2"
            - "pc-q35-9.1"
            - "pc-q35-9.0"
            - "pc-q35-8.2"
            - "pc-q35-8.1"
