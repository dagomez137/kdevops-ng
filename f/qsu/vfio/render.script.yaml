summary: Render the VFIO passthrough (deferred)
description: |-
  **Deferred scaffold.** Will render the VFIO templates
  (`vfio-bind@.service.j2`, which binds a host PCI device to `vfio-pci` before
  VM start, pulled in by the per-VM drop-in's `Requires=vfio-bind@<addr>`,
  `vfio-udev.rules.j2`, and the `files/vfio-pci.conf` modprobe drop) once the
  MVP imageless boot path lands. Currently returns `{"deferred": true}`.
lock: '!inline f/qsu/vfio/render.script.lock'
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  order:
    - vm_name
  properties:
    vm_name:
      type: string
      description: VM the passthrough devices attach to.
      default: ''
      title: VM Name
  required: []
tag: vm
