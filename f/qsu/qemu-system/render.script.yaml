      title: CPU
    cpus:
      type: integer
      description: Guest vCPU count, passed to QEMU `-smp`.
      default: 4
      title: CPUs
    custom_virtiofsd:
      type: boolean
      description: Use a custom `virtiofsd` instead of the reproducible `nixos-flake` one.
      default: false
      title: Custom virtiofsd
    discard_granularity:
      type: string
      description: 'Discard granularity in bytes: `-device
        nvme-ns,discard_granularity=` (BlockConf). Single value or per-drive
        comma-list.'
      default: '4096'
      title: Discard Granularity
    emit_vars_yaml_snapshot:
      type: boolean
      description: Also write the debug `<vm>.yaml` vars snapshot under the qsu vars dir.
      default: false
      title: Emit Vars YAML Snapshot
    fstests:
      type: boolean
      description: "Predefined `fstests` share (auto): serve
        `$WORKERS_DIR/shared/fstests/<vm>` at `/var/lib/xfstests` (rw), tag
        `fstests`. Set automatically by `f/qsu/bringup` when the closure's test
        suites include `fstests`; no manual knob."
      default: false
    home_share:
      type: boolean
      description: "Predefined `home` share: serve the operator's host `$HOME` into
        the guest at the same absolute path, tag `home`. Tag/dir/guest-mount are
        inferred; only read-write is configurable."
      default: false
      title: Home Share
    home_share_readwrite:
      type: boolean
      description: Mount the home share read-write (default read-only).
      default: false
      title: Home Share Readwrite
    iommu:
      type: object
      description: vIOMMU device for `-device`, queried from the chosen qemu's
        `-device help` and narrowed to what the template renders (`intel-iommu`,
        `amd-iommu`, `virtio-iommu-pci`, `arm-smmuv3`). `none` = no vIOMMU.
      default: ''
      format: dynselect-list_iommu
      title: IOMMU
    kernel:
      type: object
      description: The `f/kernel/build` result manifest (`vmlinuz`/`bzImage`,
        `modules_dir`, `uts_release`).
      default: {}
    kernel_append:
      type: string
      description: Kernel cmdline for `-append`. Empty = `root=tmpfs ...
        init=<closure.init>`.
      default: ''
    kernel_image:
      type: string
      description: Kernel image for `-kernel`. Empty =
        `kernel.vmlinuz`/`kernel.bzImage` from the build manifest.
      default: ''
    kernel_initrd:
      type: string
      description: initrd for `-initrd`. Empty = `closure.initrd` (the imageless
        closure's bootspec initrd).
      default: ''
    legacy_cmb:
      type: boolean
      description: 'Use the NVMe 1.3 CMB register scheme (CMBLOC/CMBSZ always
        enabled): `-device nvme,legacy-cmb=on`. Off = the 1.4 CMB scheme.
        Applies to every CMB-enabled drive; no effect without `cmb_size_mb`.'
      default: false
      title: Legacy CMB (v1.3)
    logical_block_size:
      type: string
      description: 'Logical block (LBA) size in bytes: `-device
        nvme-ns,logical_block_size=` (BlockConf). `4096` = 4Kn, `512` = 512-byte
        sectors. Single value (all drives) or per-drive comma-list
        (`4096,512`).'
      default: '4096'
      title: Logical Block Size
    machine_type:
      type: string
      description: Machine type (`-machine type=`); `q35` is the modern PC, `microvm`
        is a minimal machine, `pc-i440fx-*` are legacy boards.
      default: q35
      enum:
        - microvm
        - nitro-enclave
        - pc-i440fx-9.2
        - pc-i440fx-9.1
        - pc-i440fx-9.0
        - pc-i440fx-8.2
        - pc-i440fx-8.1
        - pc-i440fx-8.0
        - pc-i440fx-7.2
        - pc-i440fx-7.1
        - pc-i440fx-7.0
        - pc-i440fx-6.2
        - pc-i440fx-6.1
        - pc-i440fx-6.0
        - pc-i440fx-5.2
        - pc-i440fx-5.1
        - pc-i440fx-5.0
        - pc
        - pc-i440fx-10.2
        - pc-i440fx-10.1
        - pc-i440fx-10.0
        - pc-q35-9.2
        - pc-q35-9.1
        - pc-q35-9.0
        - pc-q35-8.2
        - pc-q35-8.1
        - pc-q35-8.0
        - pc-q35-7.2
        - pc-q35-7.1
        - pc-q35-7.0
        - pc-q35-6.2
        - pc-q35-6.1
        - pc-q35-6.0
        - pc-q35-5.2
        - pc-q35-5.1
        - pc-q35-5.0
        - q35
        - pc-q35-10.2
        - pc-q35-10.1
        - pc-q35-10.0
        - isapc
        - none
        - x-remote
    mdts:
      type: string
      description: 'Maximum Data Transfer Size (MDTS) as a power of two in MPSMIN
        units: `-device nvme,mdts=`. Empty = QEMU default. Single value or
        per-drive comma-list.'
      default: ''
      title: Maximum Data Transfer Size (MDTS)
    min_io_size:
      type: string
      description: 'Minimum I/O size hint in bytes: `-device nvme-ns,min_io_size=`
        (BlockConf). Single value or per-drive comma-list.'
      default: '4096'
      title: Minimum I/O Size
    modules_dir:
      type: string
      description: Host modules tree shared into the guest at `/lib/modules`. Empty =
        `kernel.modules_dir`.
      default: ''
    nvme_drive_count:
      type: integer
      description: Number of NVMe `-device nvme` drives to emit (qcow2 files created
        by nvme/create).
      default: 4
      title: NVMe Drive Count
    opt_io_size:
      type: string
      description: 'Optimal I/O size hint in bytes: `-device nvme-ns,opt_io_size=`
        (BlockConf). Single value or per-drive comma-list.'
      default: '4096'
      title: Optimal I/O Size
    physical_block_size:
      type: string
      description: 'Physical block size in bytes: `-device
        nvme-ns,physical_block_size=` (BlockConf). Single value or per-drive
        comma-list.'
      default: '4096'
      title: Physical Block Size
    pmr_pmem:
      type: boolean
      description: Real persistent-memory flush semantics for the PMR backing file
        (`-object memory-backend-file,pmem=on`). Off = QEMU default. Applies to
        every PMR-enabled drive.
      default: false
      title: PMR pmem
    pmr_share:
      type: boolean
      description: Write guest PMR contents through to the backing file (`-object
        memory-backend-file,share=on`) so they survive a restart. Off = volatile
        (`share=off`, MAP_PRIVATE). Applies to every PMR-enabled drive.
      default: true
      title: PMR Persistent (share=on)
    pmr_size:
      type: string
      description: 'Persistent Memory Region size in bytes: `-object
        memory-backend-file,size=` linked from `-device nvme,pmrdev=`. Must be a
        power of 2 and at least 16. Empty = no PMR. Single value or per-drive
        comma-list (`16777216,0` = drive 0 only).'
      default: ''
      title: PMR Size (bytes)
    qemu_binary:
      type: string
      description: Path to the `qemu-system-*` from `f/qemu/build` (its destdir `bin/`).
      default: ''
      showExpr: fields.qemu_source === "qemu-build"
      title: QEMU Binary
    qemu_source:
      type: string
      description: 'Where the emulator comes from: `nixpkgs` (the `qemu` package from
        `nixpkgs`, provided by the vendored `nixos-flake`) or `qemu-build` (a
        binary from `f/qemu/build`).'
      default: nixpkgs
      enum:
        - nixpkgs
        - qemu-build
      title: QEMU Source
    ram:
      type: integer
      description: Guest RAM in MB, passed to QEMU `-m`.
      default: 4096
      title: RAM
    shares:
      type: array
      description: Explicit virtiofs shares (`{tag,dir,mount,options}`); overrides the
        composed store/modules/fstests/home/controller set.
      default: []
      items:
        type: object
    ssh_port:
      type: integer
      description: Host port forwarded to guest `:22` via `-nic user,hostfwd=`. Empty
        = `ssh_port_base + vm_index`.
      title: SSH Port
    ssh_port_base:
      type: integer
      description: Base host port; guest N forwards `ssh_port_base + vm_index`.
      default: 10022
      title: SSH Port Base
    virtiofsd_binary:
      type: string
      description: Path to a custom `virtiofsd` (e.g. a nix derivation output or your
        own build).
      default: ''
      showExpr: fields.custom_virtiofsd === true
      title: virtiofsd Binary
    vm_index:
      type: integer
      description: Index added to `ssh_port_base`/`vsock_cid_base` when the explicit
        port/cid is unset.
      default: 0
      title: VM Index
    vm_name:
      type: string
      description: systemd instance name (`qemu-system@<vm_name>`) and machined
        machine name. Used when `auto_vm_name` is off.
      showExpr: fields.auto_vm_name === false
      title: VM Name
    vsock_cid:
      type: integer
      description: vsock context id for `-device vhost-vsock`. Empty = `vsock_cid_base
        + vm_index`.
      title: VSOCK CID
    vsock_cid_base:
      type: integer
      description: Base vsock cid; guest N uses `vsock_cid_base + vm_index`.
      default: 100
      title: VSOCK CID Base
    write_cache:
      type: string
      description: 'Volatile Write Cache (VWC): `-device nvme-ns,write-cache=`
        (BlockConf): `on`, `off` or `auto`. Empty = QEMU default. Single value
        or per-drive comma-list.'
      default: ''
      title: Write Cache (VWC)
  required:
    - vm_name
tag: vm
