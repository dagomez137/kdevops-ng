    - iommu
    - qemu_source
    - qemu_binary
    - custom_virtiofsd
    - virtiofsd_binary
    - kernel_image
    - kernel_initrd
    - kernel_append
    - modules_dir
    - shares
    - fstests
    - home_share
    - home_share_readwrite
    - controller_share
    - controller_share_tag
    - controller_share_dir
    - controller_share_guest_mount
    - controller_share_readwrite
    - nvme_drive_count
    - logical_block_size
    - physical_block_size
    - min_io_size
    - opt_io_size
    - discard_granularity
    - write_cache
    - mdts
    - cmb_size_mb
    - legacy_cmb
    - pmr_size
    - pmr_share
    - pmr_pmem
