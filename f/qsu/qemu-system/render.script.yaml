    ssh_port:
      title: SSH Port
      type: integer
      description: Host port forwarded to guest `:22` via `-nic user,hostfwd=`. Empty = `ssh_port_base + vm_index`.
    vsock_cid:
      title: VSOCK CID
      type: integer
      description: vsock context id for `-device vhost-vsock`. Empty = `vsock_cid_base + vm_index`.
    ssh_port_base:
      title: SSH Port Base
      type: integer
      description: Base host port; guest N forwards `ssh_port_base + vm_index`.
      default: 10022
    vsock_cid_base:
      title: VSOCK CID Base
      type: integer
      description: Base vsock cid; guest N uses `vsock_cid_base + vm_index`.
      default: 100
    vm_index:
      title: VM Index
      type: integer
      description: Index added to `ssh_port_base`/`vsock_cid_base` when the explicit port/cid is unset.
      default: 0
    iommu:
      title: IOMMU
      type: string
      description: vIOMMU device for `-device` (`intel-iommu`, `amd-iommu`, `virtio-iommu-pci`, `arm-smmuv3`). Empty = none.
      default: ""
    qemu_source:
      title: QEMU Source
      type: string
      description: Where the emulator comes from — `nixpkgs` (the `qemu` package from `nixpkgs`, provided by the vendored `nixos-flake`) or `qemu-build` (a binary from `f/qemu/build`).
      default: nixpkgs
      enum:
        - nixpkgs
        - qemu-build
    qemu_binary:
      title: QEMU Binary
      type: string
      description: Path to the `qemu-system-*` from `f/qemu/build` (its destdir `bin/`).
      default: ""
      showExpr: "fields.qemu_source === \"qemu-build\""
    custom_virtiofsd:
      title: Custom virtiofsd
      type: boolean
      description: Use a custom `virtiofsd` instead of the reproducible `nixos-flake` one.
      default: false
    virtiofsd_binary:
      title: virtiofsd Binary
      type: string
      description: Path to a custom `virtiofsd` (e.g. a nix derivation output or your own build).
      default: ""
      showExpr: "fields.custom_virtiofsd === true"
    kernel_image:
      type: string
      description: Kernel image for `-kernel`. Empty = `kernel.vmlinuz`/`kernel.bzImage` from the build manifest.
      default: ""
    kernel_initrd:
      type: string
      description: initrd for `-initrd`. Empty = `closure.initrd` (the imageless closure's bootspec initrd).
      default: ""
    kernel_append:
      type: string
      description: Kernel cmdline for `-append`. Empty = `root=tmpfs ... init=<closure.init>`.
      default: ""
    modules_dir:
      type: string
      description: Host modules tree shared into the guest at `/lib/modules`. Empty = `kernel.modules_dir`.
      default: ""
    shares:
      type: array
      description: Explicit virtiofs shares (`{tag,dir,mount,options}`); overrides the composed store/modules/fstests/home/controller set.
      default: []
      items:
        type: object
    fstests:
      type: boolean
      description: "Predefined `fstests` share (auto): serve `$WORKERS_DIR/shared/fstests/<vm>` at `/var/lib/xfstests` (rw), tag `fstests`. Set automatically by `f/qsu/bringup` when the closure's test suites include `fstests`; no manual knob."
      default: false
    home_share:
      title: Home Share
      type: boolean
      description: "Predefined `home` share: serve the operator's host `$HOME` into the guest at the same absolute path, tag `home`. Tag/dir/guest-mount are inferred; only read-write is configurable."
      default: false
    home_share_readwrite:
      title: Home Share Readwrite
      type: boolean
      description: "Mount the home share read-write (default read-only)."
      default: false
    controller_share:
      type: boolean
      description: Append one operator-defined virtiofs share exposing a controller directory to the guest.
      default: false
    controller_share_tag:
      type: string
      description: virtiofs tag for the controller share (must be unique across the guest's shares).
      default: controller-share
    controller_share_dir:
      type: string
      description: Absolute controller path to share. Empty = `$HOME`.
      default: ""
    controller_share_guest_mount:
      type: string
      description: Guest mount point for the controller share. Empty = same as the controller path.
      default: ""
    controller_share_readwrite:
      type: boolean
      description: Mount the controller share read-write (default read-only).
      default: false
    nvme_drive_count:
      title: NVMe Drive Count
      type: integer
      description: Number of NVMe `-device nvme` drives to emit (qcow2 files created by nvme/create).
      default: 4
    logical_block_size:
      title: Logical Block Size
      type: string
      description: "Logical block (LBA) size in bytes — `-device nvme-ns,logical_block_size=` (BlockConf). `4096` = 4Kn, `512` = 512-byte sectors. Single value (all drives) or per-drive comma-list (`4096,512`)."
      default: "4096"
    physical_block_size:
      title: Physical Block Size
      type: string
      description: "Physical block size in bytes — `-device nvme-ns,physical_block_size=` (BlockConf). Single value or per-drive comma-list."
      default: "4096"
    min_io_size:
      title: Minimum I/O Size
      type: string
      description: "Minimum I/O size hint in bytes — `-device nvme-ns,min_io_size=` (BlockConf). Single value or per-drive comma-list."
      default: "4096"
    opt_io_size:
      title: Optimal I/O Size
      type: string
      description: "Optimal I/O size hint in bytes — `-device nvme-ns,opt_io_size=` (BlockConf). Single value or per-drive comma-list."
      default: "4096"
    discard_granularity:
      title: Discard Granularity
      type: string
      description: "Discard granularity in bytes — `-device nvme-ns,discard_granularity=` (BlockConf). Single value or per-drive comma-list."
      default: "4096"
    write_cache:
      title: Write Cache (VWC)
      type: string
      description: "Volatile Write Cache (VWC) — `-device nvme-ns,write-cache=` (BlockConf): `on`, `off` or `auto`. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    mdts:
      title: Maximum Data Transfer Size (MDTS)
      type: string
      description: "Maximum Data Transfer Size (MDTS) as a power of two in MPSMIN units — `-device nvme,mdts=`. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    cmb_size_mb:
      title: CMB Size (MiB)
      type: string
      description: "Controller Memory Buffer size in MiB — `-device nvme,cmb_size_mb=` (host RAM exposed on PCI BAR 2; coexists with PMR on BAR 4/5). Empty = no CMB. Single value or per-drive comma-list (`64,0` = drive 0 only)."
      default: ""
    legacy_cmb:
      title: Legacy CMB (v1.3)
      type: boolean
      description: "Use the NVMe 1.3 CMB register scheme (CMBLOC/CMBSZ always enabled) — `-device nvme,legacy-cmb=on`. Off = the 1.4 CMB scheme. Applies to every CMB-enabled drive; no effect without `cmb_size_mb`."
      default: false
    pmr_size:
      title: PMR Size (bytes)
      type: string
      description: "Persistent Memory Region size in bytes — `-object memory-backend-file,size=` linked from `-device nvme,pmrdev=`. Must be a power of 2 and at least 16. Empty = no PMR. Single value or per-drive comma-list (`16777216,0` = drive 0 only)."
      default: ""
    pmr_share:
      title: PMR Persistent (share=on)
      type: boolean
      description: "Write guest PMR contents through to the backing file (`-object memory-backend-file,share=on`) so they survive a restart. Off = volatile (`share=off`, MAP_PRIVATE). Applies to every PMR-enabled drive."
      default: true
    pmr_pmem:
      title: PMR pmem
      type: boolean
      description: "Real persistent-memory flush semantics for the PMR backing file (`-object memory-backend-file,pmem=on`). Off = QEMU default. Applies to every PMR-enabled drive."
      default: false
    atomic_dn:
      title: Disable Normal (DN)
      type: boolean
      description: "Disable Normal (DN) — `-device nvme,atomic.dn=`. Set = AWUN/NAWUN disabled, so AWUPF/NAWUPF govern atomicity for all writes. Off = QEMU default."
      default: false
    atomic_awun:
      title: Atomic Write Unit Normal (AWUN)
      type: string
      description: "Atomic Write Unit Normal (AWUN), 0-based, in logical blocks — `-device nvme,atomic.awun=`. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    atomic_awupf:
      title: Atomic Write Unit Power Fail (AWUPF)
      type: string
      description: "Atomic Write Unit Power Fail (AWUPF), 0-based — `-device nvme,atomic.awupf=`. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    atomic_nawun:
      title: Namespace Atomic Write Unit Normal (NAWUN)
      type: string
      description: "Namespace Atomic Write Unit Normal (NAWUN), 0-based — `-device nvme-ns,atomic.nawun=`. Setting any per-namespace atomic switches the drive to explicit `-device nvme` + `-device nvme-ns`. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    atomic_nawupf:
      title: Namespace Atomic Write Unit Power Fail (NAWUPF)
      type: string
      description: "Namespace Atomic Write Unit Power Fail (NAWUPF), 0-based — `-device nvme-ns,atomic.nawupf=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    atomic_nabsn:
      title: Namespace Atomic Boundary Size Normal (NABSN)
      type: string
      description: "Namespace Atomic Boundary Size Normal (NABSN) — `-device nvme-ns,atomic.nabsn=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    atomic_nabspf:
      title: Namespace Atomic Boundary Size Power Fail (NABSPF)
      type: string
      description: "Namespace Atomic Boundary Size Power Fail (NABSPF) — `-device nvme-ns,atomic.nabspf=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    atomic_nabo:
      title: Namespace Atomic Boundary Offset (NABO)
      type: string
      description: "Namespace Atomic Boundary Offset (NABO) — `-device nvme-ns,atomic.nabo=`. Forces explicit-namespace mode. Empty = QEMU default. Single value or per-drive comma-list."
      default: ""
    kernel:
      type: object
      description: The `f/kernel/build` result manifest (`vmlinuz`/`bzImage`, `modules_dir`, `uts_release`).
      default: {}
    closure:
      type: object
      description: The `f/nix/build_closure` result manifest (`toplevel`, `init`, `initrd`).
      default: {}
    emit_vars_yaml_snapshot:
      title: Emit Vars YAML Snapshot
      type: boolean
      description: Also write the debug `<vm>.yaml` vars snapshot under the qsu vars dir.
      default: false
  required:
    - vm_name
