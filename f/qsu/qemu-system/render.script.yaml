    accel:
      type: string
      description: Accelerator (`-accel`); `kvm` needs `/dev/kvm`, `tcg` is pure software, `mshv` is the Microsoft Hypervisor.
      default: "kvm"
      enum:
        - "tcg"
        - "mshv"
        - "kvm"
    ram:
      title: RAM
      type: integer
      description: Guest RAM in MB, passed to QEMU `-m`.
      default: 4096
    cpus:
      title: CPUs
      type: integer
      description: Guest vCPU count, passed to QEMU `-smp`.
      default: 4
    machine_type:
      type: string
      description: Machine type (`-machine type=`); `q35` is the modern PC, `microvm` is a minimal machine, `pc-i440fx-*` are legacy boards.
      default: "q35"
      enum:
        - "microvm"
        - "nitro-enclave"
        - "pc-i440fx-9.2"
